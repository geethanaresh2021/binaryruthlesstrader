<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --red: #ff0000; --green: #00ffcc; --bg: #050505; --neon: 0 0 15px var(--red); }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; overflow-x: hidden; touch-action: pan-y; }

        /* Header */
        .header-container {
            width: 100%; padding: 15px 50px; display: grid; grid-template-columns: 180px 1fr 250px;
            align-items: center; border-bottom: 2px solid var(--red); background: #000; position: sticky; top: 0; z-index: 1000;
        }
        .logo-img { width: 110px; height: auto; }
        .brand-name-img { width: 550px; height: auto; max-width: 95%; filter: drop-shadow(0 0 12px var(--red)); }
        .social-links { display: flex; gap: 15px; justify-content: flex-end; }
        .social-links a { color: #fff; text-decoration: none; font-size: 11px; border: 1px solid #333; padding: 8px 15px; border-radius: 5px; font-family: 'Roboto Mono'; transition: 0.3s; }
        .social-links a:hover { border-color: var(--red); box-shadow: var(--neon); }

        /* Main Content */
        .main-content { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 30px; padding: 60px 20px; width: 100%; max-width: 1400px; margin: 0 auto; }
        .small-container { flex: 1; max-width: 380px; min-height: 500px; background: #0a0a0a; border: 1px solid var(--red); padding: 30px; border-radius: 20px; box-shadow: var(--neon); display: flex; flex-direction: column; transition: 0.4s; }
        .small-container:hover { transform: translateY(-15px); box-shadow: 0 0 30px var(--red); }
        .small-container h3 { text-align: center; color: var(--red); margin-bottom: 25px; font-size: 18px; border-bottom: 1px solid #222; padding-bottom: 15px; }

        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: var(--green); border-radius: 8px; font-family: 'Roboto Mono'; font-weight: bold; outline: none; }
        .action-btn { background: var(--red); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-weight: 900; margin-top: auto; transition: 0.3s; }
        .action-btn:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        /* Footer */
        .footer-container { width: 100%; padding: 30px 50px; background: #000; border-top: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; }
        .footer-item { font-family: 'Roboto Mono'; font-size: 11px; color: #666; flex: 1; }

        @media (max-width: 1150px) { .main-content { flex-wrap: wrap; } .small-container { width: 340px; } .header-container { grid-template-columns: 1fr 1fr; } .header-right { display: none; } }
        @media (max-width: 768px) { .header-container { display: flex; flex-direction: column; padding: 20px; } .brand-name-img { width: 320px; } .main-content { flex-direction: column; } .footer-container { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="header-left"><img src="logo.png" alt="Logo" class="logo-img"></div>
        <div class="header-center"><img src="brand-name.png" alt="Binary Ruthless" class="brand-name-img"></div>
        <div class="header-right"><div class="social-links"><a href="#">TELEGRAM</a><a href="#">YOUTUBE</a></div></div>
    </header>

    <main class="main-content">
        <div class="small-container">
            <h3>LOGIN</h3>
            <input type="email" id="loginEmail" placeholder="EMAIL ADDRESS">
            <input type="text" id="loginId" placeholder="ACCOUNT ID">
            <button class="action-btn" onclick="sendData('Login')">LOGIN</button>
        </div>

        <div class="small-container">
            <h3>SIGNUP</h3>
            <input type="email" id="signupEmail" placeholder="NEW EMAIL">
            <select id="signupBroker"><option value="">SELECT BROKER</option><option>QUOTEX</option><option>POCKET OPTION</option></select>
            <button class="action-btn" onclick="sendData('Signup')">GET LINK</button>
        </div>

        <div class="small-container">
            <h3>VERIFY ID</h3>
            <input type="email" id="verifyEmail" placeholder="REGISTERED EMAIL">
            <input type="text" id="verifyId" placeholder="BROKER ID">
            <button class="action-btn" onclick="sendData('Verify')">VERIFY NOW</button>
        </div>
    </main>

    <footer class="footer-container">
        <div class="footer-item"><b>NOTE:</b> Trading involves risk.</div>
        <div class="footer-item" style="text-align: center;">@BinaryRuthlessAdmin</div>
        <div class="footer-item" style="text-align: right;">© 2026 BINARY RUTHLESS TRADER™</div>
    </footer>

    <script>
        // మీ Firebase Config ఇక్కడ సెట్ చేశాను
        const firebaseConfig = {
            apiKey: "AIzaSyByxYsoP5zq9MUaraHGSc2ZwO_85IXzfIw",
            authDomain: "binary-ruthless-trader.firebaseapp.com",
            databaseURL: "https://binary-ruthless-trader-default-rtdb.firebaseio.com",
            projectId: "binary-ruthless-trader",
            storageBucket: "binary-ruthless-trader.firebasestorage.app",
            messagingSenderId: "363803749428",
            appId: "1:363803749428:web:e380cb1a86fc0c53476e61"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function sendData(type) {
            let email, id, extra = "";
            if(type === 'Login') { email = document.getElementById('loginEmail').value; id = document.getElementById('loginId').value; }
            if(type === 'Signup') { email = document.getElementById('signupEmail').value; id = "NEW_USER"; extra = document.getElementById('signupBroker').value; }
            if(type === 'Verify') { email = document.getElementById('verifyEmail').value; id = document.getElementById('verifyId').value; }

            if(!email || !id) return alert("Please fill all details!");

            // డేటాబేస్‌లోకి డేటా పంపడం
            database.ref('requests/' + Date.now()).set({
                type: type,
                email: email,
                traderId: id,
                broker: extra,
                status: 'pending',
                time: new Date().toLocaleString()
            }).then(() => {
                alert(type + " Request Sent Successfully!");
                // Input ఫీల్డ్స్ క్లియర్ చేయడం
                if(type === 'Login') { document.getElementById('loginEmail').value = ""; document.getElementById('loginId').value = ""; }
                if(type === 'Signup') { document.getElementById('signupEmail').value = ""; document.getElementById('signupBroker').value = ""; }
                if(type === 'Verify') { document.getElementById('verifyEmail').value = ""; document.getElementById('verifyId').value = ""; }
            }).catch((error) => {
                alert("Error: " + error.message);
            });
        }

        // Zoom & Control Lock
        document.addEventListener('wheel', e => e.ctrlKey && e.preventDefault(), { passive: false });
        document.addEventListener('keydown', e => { if (e.ctrlKey && [61, 107, 173, 109, 187, 189].includes(e.keyCode)) e.preventDefault(); });
    </script>
</body>
</html>
