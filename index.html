<div class="admin-card" style="border: 1px solid var(--red); padding: 25px; margin-bottom: 30px; background: #0a0a0a;">
    <h2 style="color: var(--red); font-size: 20px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px;">SIGNAL WEBHOOK CONFIG</h2>
    
    <div class="control-row" style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
        <div style="flex: 1;">
            <label style="font-size: 12px; color: #888;">QUOTEX WEBHOOK URL (Must match MT5 URL)</label>
            <input type="text" id="quotexUrl" placeholder="binaryruthlesstrader.com/quotex" style="width: 100%; margin-top: 5px;">
        </div>
        <div style="text-align: center;">
            <label style="font-size: 10px;">DROP-DOWN</label><br>
            <input type="checkbox" id="quotexToggle" onchange="toggleSignalVisibility('Quotex')" class="toggle-switch">
        </div>
        <button class="action-btn" onclick="saveSignalSettings('Quotex')" style="width: 120px; margin-top: 15px; font-size: 12px; padding: 12px;">SAVE</button>
    </div>

    <div class="control-row" style="display: flex; align-items: center; gap: 20px;">
        <div style="flex: 1;">
            <label style="font-size: 12px; color: #888;">TOXA WEBHOOK URL (Must match MT5 URL)</label>
            <input type="text" id="toxaUrl" placeholder="binaryruthlesstrader.com/toxa" style="width: 100%; margin-top: 5px;">
        </div>
        <div style="text-align: center;">
            <label style="font-size: 10px;">DROP-DOWN</label><br>
            <input type="checkbox" id="toxaToggle" onchange="toggleSignalVisibility('Toxa')" class="toggle-switch">
        </div>
        <button class="action-btn" onclick="saveSignalSettings('Toxa')" style="width: 120px; margin-top: 15px; font-size: 12px; padding: 12px;">SAVE</button>
    </div>
</div>

<div class="admin-card" style="border: 1px solid var(--red); padding: 25px; background: #0a0a0a;">
    <h2 style="color: var(--red); font-size: 20px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px;">TOOLS REGISTRY</h2>
    
    <button class="action-btn" onclick="openNewToolForm()" style="margin-bottom: 20px; width: 200px; font-size: 12px;">+ ADD NEW TOOL</button>

    <div id="toolForm" style="display:none; background: #000; padding: 20px; border: 1px solid #333; margin-bottom: 25px;">
        <input type="text" id="toolName" placeholder="ENTER TOOL NAME">
        <textarea id="toolCode" placeholder="PASTE HTML/CSS/JS CODE HERE..." style="width: 100%; height: 200px; background: #111; color: var(--green); border: 1px solid #333; padding: 15px; font-family: 'Roboto Mono'; margin-top: 10px;"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="action-btn" onclick="confirmSaveTool()">SAVE & DEPLOY</button>
            <button class="sub-btn" onclick="closeToolForm()" style="border: 1px solid #444; color: #666; background: none; padding: 10px 20px; cursor: pointer;">CANCEL</button>
        </div>
    </div>

    <div id="toolsListContainer">
        <div class="tool-item" style="display: flex; justify-content: space-between; align-items: center; background: #111; padding: 15px; border-left: 3px solid var(--red); margin-bottom: 10px;">
            <span style="font-weight: bold; letter-spacing: 1px;">MONEY MANAGEMENT TOOL</span>
            <div style="display: flex; gap: 15px; align-items: center;">
                <label style="font-size: 10px;">ENABLE</label>
                <input type="checkbox" checked onchange="autoSaveTool('mm_tool')" class="toggle-switch">
                <button class="edit-btn" onclick="editExistingTool('mm_tool')">EDIT</button>
                <button class="delete-btn" onclick="deleteTool('mm_tool')" style="color: var(--red); background: none; border: none; cursor: pointer; font-family: 'Roboto Mono';">DELETE</button>
            </div>
        </div>
    </div>
</div>

<style>
    .toggle-switch { width: 40px; height: 20px; accent-color: var(--red); cursor: pointer; }
    input[type="text"] { background: #000; border: 1px solid #333; color: var(--green); padding: 15px; border-radius: 5px; font-family: 'Roboto Mono'; font-weight: bold; }
    .edit-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 15px; cursor: pointer; font-size: 11px; font-family: 'Orbitron'; }
    .action-btn:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }
</style>

<script>
    // Signals Logic
    function saveSignalSettings(type) {
        const urlValue = document.getElementById(type.toLowerCase() + 'Url').value;
        const isEnabled = document.getElementById(type.toLowerCase() + 'Toggle').checked;
        
        // This will sync with Firebase so the Home Page knows which signals to fetch
        console.log(`System: Mapping MT5 Path [${urlValue}] to ${type} Container. Status: ${isEnabled}`);
        alert(`${type} Configuration Saved Successfully.`);
    }

    function toggleSignalVisibility(type) {
        const isEnabled = document.getElementById(type.toLowerCase() + 'Toggle').checked;
        // Immediate database update to show/hide in Home Page dropdown
        console.log(`${type} visibility updated to: ${isEnabled}`);
    }

    // Tools Logic
    function openNewToolForm() {
        document.getElementById('toolForm').style.display = 'block';
        document.getElementById('toolName').value = '';
        document.getElementById('toolCode').value = '';
    }

    function confirmSaveTool() {
        const name = document.getElementById('toolName').value;
        if(!name) return alert("Tool Name Required!");
        
        // Logic to push HTML code to database
        // Home page dropdown will automatically fetch this name
        alert(`${name} has been added to the System.`);
        document.getElementById('toolForm').style.display = 'none';
    }

    function autoSaveTool(toolId) {
        // Toggle switch logic for Tools
        console.log(`Tool ${toolId} status toggled in Firebase.`);
    }
</script>
