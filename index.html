<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader | System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --red: #ff0000; --green: #00ffcc; --bg: #050505; --neon: 0 0 15px var(--red); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* Header */
        .header { width: 100%; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid var(--red); background: #000; gap: 10px; }
        .brand-img { width: 100%; max-width: 420px; filter: drop-shadow(0 0 10px var(--red)); }

        .page-content { display: flex; flex-direction: column; align-items: center; padding: 20px; width: 100%; }

        /* Ad Containers */
        .ad-box { background: #0a0a0a; border: 1px dashed #222; display: flex; align-items: center; justify-content: center; color: #333; font-family: 'Roboto Mono'; font-size: 10px; border-radius: 4px; }
        .ad-h { width: 100%; height: 90px; }
        .ad-v { width: 160px; height: 500px; }

        /* Desktop Layout Logic */
        .desktop-row { display: flex; gap: 20px; width: 100%; max-width: 1400px; margin-bottom: 20px; justify-content: center; }
        .main-layout { display: flex; gap: 20px; width: 100%; max-width: 1400px; align-items: flex-start; justify-content: center; }
        .content-area { display: flex; gap: 20px; flex: 1; justify-content: center; }

        /* Widgets */
        .widget { flex: 1; max-width: 500px; display: flex; flex-direction: column; }
        .display-box { 
            width: 100%; height: 450px; background: #080808; border: 2px solid var(--red); 
            box-shadow: var(--neon); overflow-y: auto; padding: 20px; position: relative;
        }
        select { width: 100%; padding: 18px; background: #111; border: 1px solid #333; color: var(--green); font-family: 'Roboto Mono'; font-weight: bold; font-size: 15px; border-radius: 8px; margin-bottom: 10px; outline: none; }
        .wait-note { display: flex; height: 100%; align-items: center; justify-content: center; color: #444; font-size: 12px; font-family: 'Roboto Mono'; text-transform: lowercase; }

        /* Hide Mobile Elements on Desktop */
        .mobile-only { display: none; }

        /* --- MOBILE VIEW (MAX 768px) --- */
        @media (max-width: 768px) {
            .page-content { padding: 10px 0; }
            .desktop-row, .main-layout, .content-area { flex-direction: column; width: 100%; gap: 15px; align-items: center; }
            .side-ad { display: none; } /* Hide Side Ads */
            
            .mobile-only { display: flex !important; flex-direction: column; width: 100%; gap: 10px; padding: 0 10px; }
            .mobile-side-by-side { display: flex !important; flex-direction: row !important; gap: 10px; padding: 0 10px; width: 100%; }
            .mobile-side-by-side .ad-v { flex: 1; height: 250px; }

            .widget { max-width: 100%; width: 100%; padding: 0 5px; } /* Borders touch edges but visible */
            .display-box { border-radius: 0; } 
            
            select { width: 96%; margin: 0 auto 10px; }
        }
    </style>
</head>
<body>

    <header class="header">
    <div style="display: flex; align-items: center; justify-content: center; width: 100%; position: relative;">
        <img src="brand-name.png" alt="BINARY RUTHLESS TRADER" class="brand-img">
        <button onclick="adminLogin()" style="margin-left: 15px; background: transparent; border: 1px solid #333; color: #444; padding: 5px 10px; cursor: pointer; font-family: 'Roboto Mono'; font-size: 10px; border-radius: 4px; font-weight: bold;">ADMIN</button>
    </div>
    <div class="social-links" style="display: flex; gap: 25px; margin-top: 15px;">
        <a href="#" style="color: #fff;"><i class="fab fa-telegram"></i></a>
        <a href="#" style="color: #fff;"><i class="fab fa-youtube"></i></a>
        <a href="#" style="color: #fff;"><i class="fab fa-facebook"></i></a>
        <a href="#" style="color: #fff;"><i class="fab fa-instagram"></i></a>
    </div>
</header>

    <div class="page-content">
        
        <div class="desktop-row side-ad">
            <div class="ad-box ad-h">HORIZONTAL AD 1</div>
            <div class="ad-box ad-h">HORIZONTAL AD 2</div>
        </div>

        <div class="mobile-only">
            <div class="ad-box ad-h">HORIZONTAL AD 1</div>
            <div class="ad-box ad-h">HORIZONTAL AD 2</div>
        </div>

        <div class="main-layout">
            <div class="ad-box ad-v side-ad">VERTICAL AD 1</div>

            <div class="content-area">
                <div class="widget">
                    <select id="sigSelect"><option value="">-- SELECT SIGNAL --</option><option>QUOTEX</option><option>TOXA</option></select>
                    <div class="display-box" id="sigScreen"><div class="wait-note">wait for signals...</div></div>
                </div>

                <div class="mobile-only">
                    <div class="ad-box ad-h">HORIZONTAL AD 3</div>
                    <div class="ad-box ad-h">HORIZONTAL AD 4</div>
                </div>

                <div class="widget">
                    <select id="toolSelect"><option value="">-- SELECT TOOL --</option></select>
                    <div class="display-box" id="toolScreen"></div>
                </div>
            </div>

            <div class="ad-box ad-v side-ad">VERTICAL AD 2</div>
        </div>

        <div class="desktop-row side-ad">
            <div class="ad-box ad-h">HORIZONTAL AD 3</div>
            <div class="ad-box ad-h">HORIZONTAL AD 4</div>
        </div>

        <div class="mobile-side-by-side mobile-only">
            <div class="ad-box ad-v">VERTICAL AD 1</div>
            <div class="ad-box ad-v">VERTICAL AD 2</div>
        </div>

    </div>
<script>
    function adminLogin() {
        const pass = prompt("ENTER ACCESS KEY:");
        if(pass === "0000") {
            window.location.href = "admin.html";
        } else if (pass !== null) {
            alert("ACCESS DENIED");
        }
    }
</script>
<script>
    function adminLogin() {
        const pass = prompt("ENTER ACCESS KEY:");
        if(pass === "0000") { window.location.href = "admin.html"; }
        else if (pass !== null) { alert("ACCESS DENIED"); }
    }
// 1. Firebase initialize cheyadam (Memory nundi config ni teesukuntundi)
const savedConfig = localStorage.getItem('ruthless_fb_config');
if (savedConfig) {
    const config = JSON.parse(savedConfig);
    if (!firebase.apps.length) {
        firebase.initializeApp(config);
    }

    // 2. Database lo unna 'ads' section ni monitor cheyadam
    firebase.database().ref('ads').on('value', (snap) => {
        const ads = snap.val();
        
        // Patha dynamic ads (old ones) ni clear chesi kothavi add chesthunnam
        document.querySelectorAll('.dynamic-ad-container').forEach(el => el.remove());

        if (ads) {
            Object.keys(ads).forEach(id => {
                const ad = ads[id];
                
                // Ad hidden kakunda unte mathrame chupistham
                if (!ad.hidden) {
                    const adDiv = document.createElement('div');
                    adDiv.className = 'dynamic-ad-container';
                    
                    // Styling: Layout disturb avvakunda centralize chesthunnam
                    adDiv.style.width = ad.width + 'px';
                    adDiv.style.height = ad.height + 'px';
                    adDiv.style.margin = '30px auto'; // Containers madhya gap kosam
                    adDiv.style.display = 'flex';
                    adDiv.style.justifyContent = 'center';
                    adDiv.style.align = 'center';
                    adDiv.style.overflow = 'hidden';

                    // Ad snippet ni inject chesthunnam
                    adDiv.innerHTML = ad.snippet;

                    // Page content area chivarlo ad ni append chesthunnam
                    document.querySelector('.page-content').appendChild(adDiv);
                }
            });
        }
    });
}
</script>
</body>
</html>
