<!-- IMPORTANT: Only script part below replace if UI already undi -->

<script type="module">
import { db, auth } from './firebase-logic.js';
import { doc, onSnapshot, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

signInAnonymously(auth);

// ===== SIGNALS =====
const sigSelect = document.getElementById('sigSelect');
const sigScreen = document.getElementById('sigScreen');
let currentSub = null;

sigSelect.addEventListener('change', (e) => {
    const platform = e.target.value;
    if (currentSub) currentSub();

    if (!platform) {
        sigScreen.innerHTML = 'AWAITING SIGNAL DATA...';
        return;
    }

    const q = query(collection(db, platform), orderBy("timestamp", "desc"), limit(50));

    currentSub = onSnapshot(q, (snapshot) => {
        const signals = snapshot.docs.map(d => d.data());

        sigScreen.innerHTML = signals.map(sig => `
            <div style="padding:20px;border-bottom:1px solid #111;display:flex;justify-content:space-between;">
                <span>${sig.pair || '---'}</span>
                <span style="color:#00ffcc">${sig.action || 'ITM'}</span>
            </div>
        `).join('');
    });
});

// ===== GIVEAWAY =====
onSnapshot(doc(db, "site_settings", "giveaway"), (snap) => {
    const bar = document.getElementById('giveaway-bar');

    if (snap.exists()) {
        const data = snap.data();

        if (data.status === true) {
            bar.style.display = 'flex';

            const speed = parseInt(data.speed) || 0;
            const msg = data.content || "WINNER PENDING...";

            bar.innerHTML = speed === 0
                ? `<span>${msg}</span>`
                : `<marquee scrollamount="${speed}">${msg}</marquee>`;
        } else {
            bar.style.display = 'none';
        }
    }
});

// ===== WARNING NOTE =====
onSnapshot(doc(db, "site_settings", "warning_note"), (snap) => {
    const wrap = document.getElementById('warning-wrapper');
    const text = document.getElementById('live-warning-text');

    if (snap.exists()) {
        const d = snap.data();

        if (d.status === true) {
            wrap.style.display = 'flex';
            text.innerHTML = `<marquee scrollamount="${d.speed || 3}">
            ⚠ ${d.text || ''}
            </marquee>`;
        } else {
            wrap.style.display = 'none';
        }
    }
});
</script>
