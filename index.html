<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <div id="home-view">
        <header class="top-nav">
            <div class="logo-area">
                <span class="brand-name">RUTHLESS TRADER V7</span>
            </div>
            <div class="social-links">
                <i class="fab fa-telegram"></i>
                <i class="fab fa-youtube"></i>
            </div>
        </header>

        <main class="home-main">
            <div class="stats-container">
                <div class="h-card">
                    <h5>LIVE ACCURACY</h5>
                    <p id="live-acc" class="neon-text">98.2%</p>
                </div>
                <div class="h-card">
                    <h5>TOTAL PROFIT</h5>
                    <p class="neon-text">+$1,440</p>
                </div>
            </div>

            <div class="signal-box">
                <h5>SELECT BROKER</h5>
                <select id="broker-select" class="ruthless-input">
                    </select>
                <button onclick="handleJoin()" class="join-btn">JOIN & GET SIGNALS</button>
            </div>

            <div class="ads-grid">
                <div class="ad-slot">AD 1</div>
                <div class="ad-slot">AD 2</div>
            </div>
        </main>

        <footer class="footer-strip">
            <p>© 2026 BINARY RUTHLESS TRADER</p>
        </footer>
    </div>

    <div id="admin-wrapper" style="display: none;">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>ADMIN PANEL</h2>
            </div>
            <nav id="menu-list">
                </nav>
            <button onclick="logout()" class="nav-btn logout">LOGOUT</button>
        </aside>

        <main id="content-area">
            <div id="admin-welcome">
                <h1>COMMAND CENTER</h1>
                <p>Select a setting from the sidebar to modify.</p>
            </div>
            </main>
    </div>

    <script>
        // Check Access on Load
        window.onload = function() {
            if(window.location.hash === "#9700224305") {
                showAdmin();
            } else {
                showHome();
            }
            loadBrokerList();
        };

        function showAdmin() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('admin-wrapper').style.display = 'flex';
        }

        function showHome() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('admin-wrapper').style.display = 'none';
        }

        function loadBrokerList() {
            const savedSigs = localStorage.getItem('ruthless_sigs') || "QUOTEX, BINOMO, POCKET OPTION";
            const dropdown = document.getElementById('broker-select');
            dropdown.innerHTML = '';
            savedSigs.split(',').forEach(sig => {
                let opt = document.createElement('option');
                opt.text = sig.trim();
                dropdown.add(opt);
            });
        }

        function handleJoin() {
            const link = localStorage.getItem('ruthless_link') || "#";
            window.open(link, '_blank');
        }

        function logout() {
            window.location.hash = "";
            location.reload();
        }

        // Live Accuracy Sim
        setInterval(() => {
            const acc = (Math.random() * (99.8 - 95.5) + 95.5).toFixed(1);
            document.getElementById('live-acc').innerText = acc + "%";
        }, 5000);
    </script>

</body>
</html>
