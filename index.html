<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader | Official System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index-style.css">
</head>
<body>

    <header class="header">
        <div class="brand-wrapper">
            <img src="brand-name.png" alt="BINARY RUTHLESS TRADER" class="brand-img">
            <div class="social-login-group">
                <div class="social-icons">
                    <a href="#"><i class="fab fa-telegram"></i></a>
                    <a href="#"><i class="fab fa-youtube"></i></a>
                    <button class="join-btn">JOIN</button>
                </div>
                <button class="admin-trigger" onclick="adminLogin()">ADMIN</button>
            </div>
        </div>
    </header>

    <div id="warning-bar" class="info-bar warning-bar">
        <marquee id="warning-text" scrollamount="5">AWAITING SYSTEM UPDATE...</marquee>
    </div>
    <div id="winner-bar" class="info-bar winner-bar">
        <marquee id="winner-text" scrollamount="4">GIVEAWAY DATA LOADING...</marquee>
    </div>

    <div class="page-content">
        <div class="widget-container">
            
            <div class="widget">
                <div class="ad-group top-ads">
                    <div id="ad-1" class="ruthless-ad">AD SLOT #1 (320x50)</div>
                    <div id="ad-2" class="ruthless-ad">AD SLOT #2 (320x50)</div>
                </div>

                <select class="ruthless-select" id="sigSelect">
                    <option value="">-- SELECT SIGNAL --</option>
                    <option value="QUOTEX">QUOTEX SURESHOT</option>
                    <option value="TOXA">TOXA EXPERT</option>
                </select>

                <div class="display-box" id="sigScreen">
                    <div class="loading-msg">AWAITING SIGNAL DATA...</div>
                </div>

                <div class="ad-group bottom-ads">
                    <div id="ad-3" class="ruthless-ad">AD SLOT #3 (320x50)</div>
                    <div id="ad-4" class="ruthless-ad">AD SLOT #4 (320x50)</div>
                </div>
            </div>

            <div class="widget">
                <div class="ad-group desktop-only-ads">
                    <div id="ad-extra-1" class="ruthless-ad ghost-ad">TOOLS AD #1</div>
                    <div id="ad-extra-2" class="ruthless-ad ghost-ad">TOOLS AD #2</div>
                </div>

                <select class="ruthless-select" id="toolSelect">
                    <option value="">-- SELECT TOOL --</option>
                    <option>PROBABILITY CALCULATOR</option>
                    <option>CANDLE ANALYZER</option>
                </select>

                <div class="display-box" id="toolScreen"></div>

                <div class="ad-group bottom-ads">
                    <div id="ad-5" class="ruthless-ad">AD SLOT #5 (320x50)</div>
                    <div id="ad-6" class="ruthless-ad">AD SLOT #6 (320x50)</div>
                </div>
            </div>

        </div>
    </div>

    <footer class="footer">
        <div>© 2026 BINARY RUTHLESS TRADER</div>
        <div class="footer-links">
            <a href="#">CONTACT</a>
            <a href="#">TERMS</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="index-script.js"></script>
</body>
</html>
