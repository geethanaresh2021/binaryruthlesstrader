<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #ff0000; --bg-black: #000000; --neon-cyan: #00ffcc; }
        body { background-color: var(--bg-black); color: var(--main-red); font-family: 'Orbitron', sans-serif; margin: 0; padding: 0; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        #admin-link { display: none; position: fixed; top: 0; left: 0; width: 100%; background: var(--main-red); color: white; text-align: center; padding: 12px; font-size: 14px; cursor: pointer; z-index: 9999; text-transform: uppercase; font-weight: bold; }
        .header { text-align: center; padding: 40px 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .trading-box { background: rgba(15, 15, 15, 0.95); border: none; aspect-ratio: 1 / 1.5; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(255, 0, 0, 0.1); }
        .ad-container { width: 100%; background: transparent; display: flex; justify-content: center; align-items: center; margin: 10px 0; }
        .revenue-num { font-family: 'Roboto Mono', monospace; font-weight: bold; font-size: 32px; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
    </style>
</head>
<body>

<div id="admin-link">Access Admin Dashboard</div>

<header class="header">
    <div id="brand-logo"></div>
    <h1 id="brand-name">BINARY RUTHLESS TRADER</h1>
</header>

<div class="grid-container" id="main-layout">
    <div class="ad-container" id="ad-slot-1"></div>
    
    <div class="trading-box" id="signal-box">
        <select id="signal-selector" style="background:#000; color:red; border:1px solid red; padding:10px;"></select>
        <div id="signal-display">Waiting for Signals...</div>
    </div>

    <div class="ad-container" id="ad-slot-2"></div>
</div>

<script>
    // 1. Secret Path Verification
    const currentPath = window.location.pathname;
    const secretKey = localStorage.getItem('ruthless_path') || '9700224305';
    if(currentPath.includes(secretKey)) {
        document.getElementById('admin-link').style.display = 'block';
        document.getElementById('admin-link').onclick = () => window.location.href = secretKey + '.html';
    }

    // 2. 15s Smart Ad Refresh Logic
    let lastActivity = Date.now();
    const minGap = 15000; 
    function triggerAdRefresh() {
        let now = Date.now();
        if(now - lastActivity > minGap) {
            console.log("Activity detected: Refreshing Ads...");
            // Logic to reload ad scripts
            lastActivity = now;
        }
    }
    window.onscroll = triggerAdRefresh;
    window.onclick = triggerAdRefresh;

    // 3. Today Unique Visitor Logic (IP/Device 1 Count)
    const today = new Date().toDateString();
    if(localStorage.getItem('last_visit_date') !== today) {
        localStorage.setItem('last_visit_date', today);
        // Firebase.database().ref('analytics/unique_visitors').transaction(v => (v || 0) + 1);
    }

    // 4. No-Freeze Redirect Security
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && (e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || e.keyCode == 85)) {
            window.location.replace("about:blank");
            return false;
        }
    };
</script>
</body>
</html>
