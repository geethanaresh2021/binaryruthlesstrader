<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader | Official System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --red: #ff0000; 
            --green: #00ffcc; 
            --bg: #050505; 
            --neon: 0 0 15px var(--red); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- STATIC HEADER (Not Floating) --- */
        .header {
            width: 100%; padding: 20px 5%; display: flex; flex-direction: column;
            align-items: center; border-bottom: 2px solid var(--red); background: #000;
            gap: 15px;
        }
        .brand-img { width: 100%; max-width: 450px; filter: drop-shadow(0 0 10px var(--red)); }
        .social-links { display: flex; gap: 15px; }
        .social-links a { color: #555; text-decoration: none; font-family: 'Roboto Mono'; font-size: 11px; border: 1px solid #222; padding: 5px 10px; border-radius: 4px; }
        .admin-trigger { background: transparent; border: 1px solid #333; color: #444; padding: 5px 15px; cursor: pointer; font-family: 'Roboto Mono'; font-size: 11px; margin-top: 10px; }

        /* --- LAYOUT STRUCTURE --- */
        .home-wrapper { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-grid { display: grid; grid-template-columns: 160px 1fr 160px; gap: 20px; width: 100%; max-width: 1400px; }
        
        /* Containers */
        .section-container { width: 100%; max-width: 500px; margin: 0 auto 30px auto; }
        .dropdown-top { margin-bottom: 10px; }
        
        .display-box {
            width: 100%; min-height: 400px; max-height: 600px;
            background: #0a0a0a; border: 1px solid var(--red);
            border-radius: 10px; box-shadow: var(--neon);
            overflow-y: auto; overflow-x: hidden; position: relative;
            padding: 15px;
        }

        /* Signal Styling */
        .signal-note { font-family: 'Roboto Mono'; font-size: 10px; color: #444; text-transform: lowercase; text-align: center; margin-top: 180px; }
        .signal-post { background: #111; border-left: 3px solid var(--red); padding: 10px; margin-bottom: 10px; font-family: 'Roboto Mono'; font-size: 13px; color: var(--green); }

        /* Dropdown & Tools Styling */
        select {
            width: 100%; padding: 15px; background: #111; border: 1px solid #333;
            color: var(--green); font-family: 'Roboto Mono'; font-weight: bold; border-radius: 5px; outline: none;
        }

        /* Tool Code Reset */
        .tool-content { width: 100%; height: auto; }

        /* --- AD PLACEHOLDERS --- */
        .ad-v { background: #0a0a0a; border: 1px dashed #222; display: flex; align-items: center; justify-content: center; color: #333; font-family: 'Roboto Mono'; font-size: 10px; }
        .ad-h { background: #0a0a0a; border: 1px dashed #222; display: flex; align-items: center; justify-content: center; color: #333; font-family: 'Roboto Mono'; font-size: 10px; }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .desktop-ad { display: none; }
            .section-container { max-width: 100%; }
            .display-box { border-radius: 0; border-left: none; border-right: none; width: 100vw; margin-left: -20px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.png" alt="LOGO" style="width:60px;">
        <img src="brand-name.png" alt="BINARY RUTHLESS TRADER" class="brand-img">
        <div class="social-links">
            <a href="#">TELEGRAM</a>
            <a href="#">YOUTUBE</a>
        </div>
        <button class="admin-trigger" onclick="checkAdmin()">ADMIN ACCESS</button>
    </header>

    <div class="home-wrapper">
        <div class="ad-h" style="width:100%; height:70px; margin-bottom:20px;">TOP AD</div>

        <div class="main-grid">
            <div class="ad-v desktop-ad">SIDE AD</div>

            <div class="content-area">
                
                <div class="section-container">
                    <div class="dropdown-top">
                        <select id="signalSelect" onchange="loadSignalPath()">
                            <option value="">SELECT SIGNAL FEED</option>
                            <option value="quotex">QUOTEX SIGNALS</option>
                            <option value="toxa">TOXA SIGNALS</option>
                        </select>
                    </div>
                    <div class="display-box" id="signalDisplay">
                        <div class="signal-note">wait for signals...</div>
                    </div>
                </div>

                <div class="ad-h" style="width:100%; height:70px; margin-bottom:20px;">MID AD</div>

                <div class="section-container">
                    <div class="dropdown-top">
                        <select id="toolSelect" onchange="renderTool()">
                            <option value="">SELECT TRADING TOOL</option>
                            <option value="mm">MONEY MANAGEMENT</option>
                            <option value="cc">COMPOUNDING CALC</option>
                        </select>
                    </div>
                    <div class="display-box" id="toolDisplay">
                        </div>
                </div>

            </div>

            <div class="ad-v desktop-ad">SIDE AD</div>
        </div>
    </div>

    <script>
        // Admin Password Check
        function checkAdmin() {
            if(prompt("PASSWORD:") === "0000") alert("Redirecting to Admin Panel...");
        }

        // Signal Display Logic (MT5 Hook)
        function loadSignalPath() {
            const select = document.getElementById('signalSelect').value;
            const display = document.getElementById('signalDisplay');
            
            if(!select) {
                display.innerHTML = '<div class="signal-note">wait for signals...</div>';
                return;
            }
            
            // Simulation of receiving MT5 post
            display.innerHTML = '<div class="signal-post">[MT5] '+select.toUpperCase()+' - SELL EURUSD @ 1.0845 (WAITING...)</div>';
        }

        // Tool Injection Logic
        function renderTool() {
            const tool = document.getElementById('toolSelect').value;
            const display = document.getElementById('toolDisplay');
            
            if(tool === 'mm') {
                // Example of injected HTML from Admin
                display.innerHTML = `
                    <div class="tool-content" style="padding:10px;">
                        <h4 style="color:var(--red)">Money Management</h4>
                        <input type="number" placeholder="Balance" style="width:100%; padding:10px; margin:10px 0; background:#000; color:#00ffcc; border:1px solid #333;">
                        <button style="width:100%; padding:15px; background:var(--red); color:#fff; border:none;">CALCULATE</button>
                        <div style="height:800px; margin-top:20px; border:1px dashed #222;">Scrollable Area Test</div>
                    </div>
                `;
            } else if(tool === 'cc') {
                display.innerHTML = '<p style="padding:20px;">Compounding Calculator Loading...</p>';
            } else {
                display.innerHTML = '';
            }
        }
    </script>
</body>
</html>
