<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader</title>
    
    <link rel="stylesheet" href="styles-ruthless.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-nav">
        <button id="admin-entry-btn" class="admin-lock-btn" onclick="openDashboard()">
            <i class="fas fa-user-shield"></i>
        </button>
        
        <div id="h-logo" class="logo-area element">
            <img src="logo.png" alt="Ruthless Logo" class="brand-img">
            <span class="brand-name">RUTHLESS TRADER</span>
        </div>

        <div class="social-icons">
            <a href="#"><i class="fab fa-telegram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </header>

    <main id="home-view">
        <div class="main-content-wrapper">
            <div id="h-main-container-1" class="element main-box">
                <h2 class="glow-text">LIVE SIGNALS</h2>
                <div class="number-glow">98%</div>
            </div>
            
            <div id="h-main-container-2" class="element main-box">
                <h2 class="glow-text">PROFIT TRACKER</h2>
                <div class="number-glow">+$1,240</div>
            </div>
        </div>

        <div class="ads-grid">
            <div id="ad-slot-1" class="element ad-box">AD SLOT 1</div>
            <div id="ad-slot-2" class="element ad-box">AD SLOT 2</div>
            <div id="ad-slot-3" class="element ad-box">AD SLOT 3</div>
            <div id="ad-slot-4" class="element ad-box">AD SLOT 4</div>
        </div>
    </main>

    <footer class="bottom-strip">
        <div class="footer-links">
            <a href="#" onclick="showAbout()">ABOUT US</a>
            <a href="#" onclick="showContact()">CONTACT US</a>
        </div>
        <div class="trademark">
            <p>&copy; 2026 BINARY RUTHLESS TRADER | ALL RIGHTS RESERVED</p>
        </div>
    </footer>

    <script src="security-core.js"></script>
    <script src="master-controller.js"></script>
</body>
</html>
