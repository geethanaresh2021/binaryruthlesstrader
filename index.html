<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background-image: radial-gradient(circle at 50% 50%, #1a0a0a 0%, #000000 70%);
        }

        #app-container {
            width: 100%;
            max-width: 420px;
            background: #000000;
            border: 2px solid #ff0033;
            border-radius: 24px;
            padding: 16px 14px;
            box-shadow: 0 0 40px rgba(255, 0, 51, 0.15);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0;
            margin-bottom: 10px;
            position: relative;
        }
        .header-icon-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            border: none;
            color: #ff0033;
        }
        .header-icon-left:hover { transform: scale(1.3) rotate(45deg); }
        
        .logo-symbol {
            font-size: 36px;
            color: #4a6cf7;
            text-shadow: 0 0 30px rgba(74, 108, 247, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px auto;
            width: fit-content;
        }

        .brand {
            text-align: center;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .brand .binary { color: #ffffff; }
        .brand .ruthless { color: #ff0033; text-shadow: 0 0 15px rgba(255, 0, 51, 0.2); }
        .brand .trader { color: #ffffff; }

        .session-badge {
            display: block;
            margin: 0 auto 10px auto;
            width: fit-content;
            padding: 4px 14px;
            border: none;
            font-size: 11px;
            color: #8892b0;
            letter-spacing: 2px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }

        .timer-container {
            background: #0d0d0d;
            border-radius: 16px;
            padding: 8px 0;
            margin-bottom: 14px;
            border: 1px solid #ff0033;
            text-align: center;
        }
        .live-timer {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Roboto Mono', monospace;
            letter-spacing: 2px;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
        }
        .live-timer .hours, .live-timer .minutes { color: #ffffff; }
        .live-timer .colon { color: rgba(255, 255, 255, 0.2); }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .btn {
            flex: 1;
            padding: 10px 0;
            border: 1px solid #333;
            border-radius: 12px;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }
        .btn:hover { transform: scale(1.03); border-color: #888; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-auto.active {
            border-color: #ff0033; color: #ff0033; background: rgba(255, 0, 51, 0.05);
        }
        .btn-signal.active {
            border-color: #00ffcc; color: #00ffcc; background: rgba(0, 255, 204, 0.05);
        }
        .btn-signal.waiting {
            border-color: #ff0033; color: #ff0033; background: rgba(255, 0, 51, 0.05);
            animation: pulseRed 1.5s ease-in-out infinite;
        }
        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 rgba(255, 0, 51, 0); }
            50% { box-shadow: 0 0 15px rgba(255, 0, 51, 0.15); }
            100% { box-shadow: 0 0 0 rgba(255, 0, 51, 0); }
        }

        .signal-box {
            border: 1px solid #ff0033;
            border-radius: 16px;
            padding: 12px 12px 6px 12px;
            text-align: center;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(255, 0, 51, 0.02);
            position: relative;
            width: 100%;
            transition: all 0.5s ease;
        }
        .signal-box.has-data { border-color: #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.05); }

        .status-message-container, .error-container, .countdown-container, .signal-data {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex-grow: 1;
            gap: 6px;
        }
        .status-message-container.active, .error-container.active, .countdown-container.active, .signal-data.active {
            display: flex;
        }

        .status-icon { font-size: 30px; color: #ff0033; animation: spinPulse 1.5s ease-in-out infinite; }
        @keyframes spinPulse {
            0% { transform: rotate(0deg) scale(1); opacity: 0.6; }
            50% { transform: rotate(180deg) scale(1.3); opacity: 1; text-shadow: 0 0 15px rgba(255,0,51,0.3); }
            100% { transform: rotate(360deg) scale(1); opacity: 0.6; }
        }
        .status-main-text { font-size: 13px; font-weight: 700; color: rgba(255, 255, 255, 0.3); animation: textFade 2s ease-in-out infinite; }
        @keyframes textFade { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
        .status-detail-text { font-size: 10px; color: rgba(255, 255, 255, 0.2); font-family: 'Roboto Mono', monospace; margin-top: 4px; }

        .error-icon { font-size: 30px; color: #ff0033; }
        .error-main-text { font-size: 13px; font-weight: 700; color: #ff0033; }
        .error-detail-text { font-size: 10px; color: rgba(255, 0, 51, 0.7); font-family: 'Roboto Mono', monospace; text-align: center; line-height: 1.4; }

        .ready-text { font-size: 18px; font-weight: 900; color: #ffcc00; text-shadow: 0 0 20px rgba(255, 204, 0, 0.2); animation: readyPulse 0.8s ease-in-out infinite alternate; }
        @keyframes readyPulse { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.1); opacity: 1; } }
        .countdown-number { font-size: 40px; font-weight: 900; color: #ffffff; text-shadow: 0 0 30px rgba(255, 255, 255, 0.2); animation: countPop 0.6s ease-out; }
        @keyframes countPop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

        .pair-container { display: flex; justify-content: center; align-items: baseline; gap: 6px; white-space: nowrap; width: 100%; }
        .signal-pair { font-size: 20px; font-weight: 900; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .signal-payout { font-size: 12px; font-weight: 700; color: #00ffcc; background: rgba(0, 255, 204, 0.08); padding: 2px 8px; border-radius: 6px; border: 1px solid rgba(0, 255, 204, 0.15); white-space: nowrap; }

        .signal-entry { font-size: 18px; font-weight: 900; color: #ffcc00; text-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        .signal-accuracy { font-size: 14px; font-weight: 700; }
        .signal-accuracy.green { color: #00ff00; }
        .signal-accuracy.yellow { color: #ffcc00; }
        .signal-accuracy.red { color: #ff0033; }

        .signal-trend { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
        .signal-trend.uptrend { color: #00ff00; }
        .signal-trend.downtrend { color: #ff0033; }

        .signal-direction { font-size: 26px; font-weight: 900; letter-spacing: 3px; display: inline-block; }
        .signal-direction.up { color: #00ff00; animation: pulseUp 1.2s ease-in-out infinite; }
        .signal-direction.down { color: #ff0033; animation: pulseDown 1.2s ease-in-out infinite; }
        @keyframes pulseUp { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes pulseDown { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .signal-logic { margin-top: 6px; font-size: 10px; color: rgba(255, 255, 255, 0.3); font-family: 'Roboto Mono', monospace; text-align: center; padding-top: 6px; border-top: 1px solid rgba(255, 255, 255, 0.04); line-height: 1.4; width: 100%; }

        .status-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            width: 100%;
            flex-shrink: 0;
            font-size: 9px;
            font-family: 'Roboto Mono', monospace;
            color: rgba(255, 255, 255, 0.3);
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s;
        }
        .status-dot.green {
            background: #00ff00;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        .status-dot.red {
            background: #ff0033;
            box-shadow: 0 0 8px rgba(255, 0, 51, 0.3);
        }
        @keyframes dotPulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(1); }
        }
        .status-label {
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }
        .status-label.green { color: #00ff00; }
        .status-label.red { color: #ff0033; }

        #settingsOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            backdrop-filter: blur(6px);
        }
        #settingsOverlay.active { display: flex; }

        .settings-panel {
            background: #0a0a0a;
            border: 1px solid #ff0033;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 0, 51, 0.1);
            animation: modalIn 0.4s ease-out;
        }
        @keyframes modalIn { 0% { transform: scale(0.9) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .settings-panel h2 { color: #ff0033; text-align: center; font-size: 18px; margin-bottom: 16px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .settings-close { position: absolute; top: 12px; right: 16px; font-size: 20px; color: #555; cursor: pointer; transition: all 0.3s; }
        .settings-close:hover { color: #ff0033; transform: rotate(90deg); }

        .setting-group { margin-bottom: 16px; border: 1px solid #1a1a1a; border-radius: 12px; padding: 14px; background: rgba(255, 255, 255, 0.02); }
        .setting-group label { display: block; font-size: 11px; color: #555; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .setting-group input, .setting-group textarea { width: 100%; padding: 8px 10px; background: #000; border: 1px solid #222; border-radius: 8px; color: #00ffcc; font-family: 'Roboto Mono', monospace; font-size: 13px; outline: none; }
        .setting-group input:focus, .setting-group textarea:focus { border-color: #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.05); }
        .setting-group textarea { min-height: 40px; resize: vertical; }
        .setting-group input[type="file"] { padding: 6px; color: #555; border: 1px dashed #222; }
        .setting-group .save-btn { margin-top: 10px; padding: 6px 16px; background: #00ffcc; color: #000; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 11px; transition: all 0.3s; }
        .setting-group .save-btn:hover { background: #00ddbb; transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        .setting-group .status-msg { font-size: 11px; color: #00ff00; margin-top: 4px; display: none; }

        .setting-group.error { border-color: #ff0033 !important; box-shadow: 0 0 30px rgba(255, 0, 51, 0.2); }
        .setting-group.error input, .setting-group.error textarea { border-color: #ff0033 !important; color: #ff0033; }
        .setting-group .error-msg { font-size: 11px; color: #ff0033; margin-top: 4px; display: none; line-height: 1.4; }
        .setting-group.error .error-msg { display: block; }

        .settings-panel::-webkit-scrollbar { width: 3px; }
        .settings-panel::-webkit-scrollbar-track { background: #0a0a0a; }
        .settings-panel::-webkit-scrollbar-thumb { background: #ff0033; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="header">
            <button class="header-icon-left" id="btnSettings">⚙️</button>
            <div class="logo-symbol" id="appLogoDisplay">◆</div>
        </div>

        <div class="brand">
            <span class="binary">BINARY</span>
            <span class="ruthless">RUTHLESS</span>
            <span class="trader">TRADER</span>
        </div>

        <div class="session-badge" id="sessionBadge">LONDON SESSION</div>

        <div class="timer-container">
            <div class="live-timer" id="liveTimer">
                <span class="hours">00</span><span class="colon"> : </span>
                <span class="minutes">00</span><span class="colon"> : </span>
                <span class="seconds" id="secondsDisplay">00</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-auto" id="btnAuto">AUTO SIGNALS</button>
            <button class="btn btn-signal" id="btnSignal">GET SIGNAL</button>
        </div>

        <div class="signal-box" id="signalBox">
            <div class="status-message-container active" id="statusContainer">
                <div class="status-icon">⟳</div>
                <div class="status-main-text">WAIT FOR SIGNAL</div>
                <div class="status-detail-text">Click GET SIGNAL to start.</div>
            </div>
            <div class="error-container" id="errorContainer">
                <div class="error-icon">✖</div>
                <div class="error-main-text">ERROR</div>
                <div class="error-detail-text">No error details available.</div>
            </div>
            <div class="countdown-container" id="countdownContainer">
                <div class="ready-text">READY</div>
                <div class="countdown-number" id="countdownNumber">5</div>
            </div>
            <div class="signal-data" id="signalDataView">
                <div class="pair-container">
                    <span class="signal-pair" id="sigPair">--</span>
                    <span class="signal-payout" id="sigPayout">--</span>
                </div>
                <div class="signal-entry" id="sigEntry">--:--</div>
                <div class="signal-accuracy green" id="sigAccuracy">--%</div>
                <div class="signal-trend" id="sigTrend">--</div>
                <div class="signal-direction" id="sigDirection">--</div>
                <div class="signal-logic" id="sigLogic">Logic: --</div>
            </div>
        </div>
    </div>

    <div id="settingsOverlay">
        <div class="settings-panel">
            <span class="settings-close" id="closeSettings">✕</span>
            <h2>⚙️ SETTINGS</h2>

            <div class="setting-group" id="tgGroup">
                <label>📨 Telegram</label>
                <input type="text" id="tgToken" placeholder="Bot Token">
                <input type="text" id="tgChatId" placeholder="Chat ID" style="margin-top:6px;">
                <div class="error-msg">❌ Telegram Error: Enter Bot Token and Chat ID.</div>
                <button class="save-btn" onclick="saveSetting('telegram')">Save</button>
                <div class="status-msg" id="statusTelegram">✅ Saved!</div>
            </div>

            <div class="setting-group">
                <label>🖼️ Logo</label>
                <input type="file" id="logoUpload" accept="image/*">
                <button class="save-btn" onclick="saveSetting('logo')">Save</button>
                <div class="status-msg" id="statusLogo">✅ Saved!</div>
            </div>

            <div class="setting-group">
                <label>⏱️ Timer Settings</label>
                <input type="number" id="captureSec" value="52" min="0" max="59">
                <input type="number" id="signalSec" value="57" min="0" max="59" style="margin-top:6px;">
                <input type="number" id="resetSec" value="1" min="0" max="59" style="margin-top:6px;">
                <button class="save-btn" onclick="saveSetting('timer')">Save</button>
                <div class="status-msg" id="statusTimer">✅ Saved!</div>
            </div>

            <div class="setting-group">
                <label>🧠 Gemini AI Prompt</label>
                <textarea id="geminiPrompt">Analyze this trading chart image. Extract the exact selected pair name (e.g. USD/IDR OTC) and its payout percentage (e.g. 93%). Analyze the chart to determine if the signal should be UP or DOWN. Return ONLY a JSON object with these exact keys: "pair", "payout", "accuracy" (0-100), "direction" ("UP" or "DOWN"), "trend" ("UPTREND" or "DOWNTREND"), "logic" (short reason), and "nextEntryTime" (HH:MM format based on current time + 1 minute). Do not add any other text.</textarea>
                <button class="save-btn" onclick="saveSetting('geminiPrompt')">Save Prompt</button>
                <div class="status-msg" id="statusGeminiPrompt">✅ Saved!</div>
            </div>

        </div>
    </div>


    <script>
        // ============================================================
        //  QUOTEX URL (Fixed)
        // ============================================================
        const QUOTEX_URL = "https://qxbroker.com/en/demo-trade";

        // ============================================================
        //  DOM REFS
        // ============================================================
        const liveTimer = document.getElementById('liveTimer');
        const hoursSpan = liveTimer.querySelector('.hours');
        const minutesSpan = liveTimer.querySelector('.minutes');
        const secondsSpan = document.getElementById('secondsDisplay');
        const btnAuto = document.getElementById('btnAuto');
        const btnSignal = document.getElementById('btnSignal');
        const signalBox = document.getElementById('signalBox');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const closeSettings = document.getElementById('closeSettings');
        
        const sigPair = document.getElementById('sigPair');
        const sigPayout = document.getElementById('sigPayout');
        const sigEntry = document.getElementById('sigEntry');
        const sigAccuracy = document.getElementById('sigAccuracy');
        const sigDirection = document.getElementById('sigDirection');
        const sigTrend = document.getElementById('sigTrend');
        const sigLogic = document.getElementById('sigLogic');

        // Status Indicators
        const fbStatusDot = document.getElementById('fbStatusDot');
        const fbStatusLabel = document.getElementById('fbStatusLabel');
        const apiStatusDot = document.getElementById('apiStatusDot');
        const apiStatusLabel = document.getElementById('apiStatusLabel');

        // ============================================================
        //  STATE
        // ============================================================
        let autoMode = false;
        let manualWait = false;
        let signalLocked = false;
        let lastSecond = -1;
        let timerInterval = null;
        let lastSignalData = null;
        let firebaseInitialized = false;
        let firebaseApp = null;
        let firebaseDb = null;
        let countdownActive = false;
        let geminiApiKey = "AQ.Ab8RN6JCH_8YZwVR8iSdkiRBZqi15mxwMmS2Q4ok3iMxtJB8hg";

        let settings = {
            captureSec: 52, signalSec: 57, resetSec: 1,
            geminiPrompt: 'Analyze this trading chart image. Extract the exact selected pair name (e.g. USD/IDR OTC) and its payout percentage (e.g. 93%). Analyze the chart to determine if the signal should be UP or DOWN. Return ONLY a JSON object with these exact keys: "pair", "payout", "accuracy" (0-100), "direction" ("UP" or "DOWN"), "trend" ("UPTREND" or "DOWNTREND"), "logic" (short reason), and "nextEntryTime" (HH:MM format based on current time + 1 minute). Do not add any other text.'
        };

        // ============================================================
        //  STATUS UPDATE FUNCTIONS
        // ============================================================
        function updateStatus() {
            const fbOk = firebaseInitialized && firebaseDb;
            const apiOk = geminiApiKey && geminiApiKey.length > 10;

            if (fbOk) {
                fbStatusDot.className = 'status-dot green';
                fbStatusLabel.className = 'status-label green';
            } else {
                fbStatusDot.className = 'status-dot red';
                fbStatusLabel.className = 'status-label red';
            }

            if (apiOk) {
                apiStatusDot.className = 'status-dot green';
                apiStatusLabel.className = 'status-label green';
            } else {
                apiStatusDot.className = 'status-dot red';
                apiStatusLabel.className = 'status-label red';
            }
        }

        // ============================================================
        //  UI FUNCTIONS
        // ============================================================
        function showStatus(mainText, detailText, icon = '⟳') {
            statusContainer.className = 'status-message-container active';
            errorContainer.className = 'error-container';
            countdownContainer.className = 'countdown-container';
            signalDataView.className = 'signal-data';
            statusIcon.textContent = icon;
            statusMainText.textContent = mainText;
            statusDetailText.textContent = detailText;
            signalBox.classList.remove('has-data');
            updateStatus();
        }

        function showError(mainText, detailText) {
            statusContainer.className = 'status-message-container';
            countdownContainer.className = 'countdown-container';
            signalDataView.className = 'signal-data';
            errorContainer.className = 'error-container active';
            errorMainText.textContent = mainText;
            errorDetailText.textContent = detailText;
            signalBox.classList.remove('has-data');
            updateStatus();
        }

        function showCountdown() {
            statusContainer.className = 'status-message-container';
            errorContainer.className = 'error-container';
            countdownContainer.className = 'countdown-container active';
            signalDataView.className = 'signal-data';
            signalBox.classList.remove('has-data');
            updateStatus();
        }

        function showSignalData() {
            statusContainer.className = 'status-message-container';
            errorContainer.className = 'error-container';
            countdownContainer.className = 'countdown-container';
            signalDataView.className = 'signal-data active';
            signalBox.classList.add('has-data');
            updateStatus();
        }

        function showWait() {
            showStatus('WAIT FOR SIGNAL', 'Click GET SIGNAL to start.', '⟳');
            sigPair.textContent = '--';
            sigPayout.textContent = '--';
            sigEntry.textContent = '--:--';
            sigAccuracy.textContent = '--%';
            sigTrend.textContent = '--';
            sigDirection.textContent = '--';
            sigLogic.textContent = 'Logic: --';
            updateStatus();
        }

        // ============================================================
        //  STORAGE
        // ============================================================
        function saveToStorage(key, value) {
            try {
                const localData = JSON.parse(localStorage.getItem('ruthlessTraderLocal') || '{}');
                localData[key] = value;
                localStorage.setItem('ruthlessTraderLocal', JSON.stringify(localData));
            } catch(e) {}
            if (firebaseInitialized && firebaseDb) {
                firebaseDb.ref('ruthlessTrader/' + key).set(value);
            }
        }

        function loadFromStorage() {
            let localData = {};
            try { localData = JSON.parse(localStorage.getItem('ruthlessTraderLocal') || '{}'); } catch(e) {}
            settings = { ...settings, ...localData };
            geminiApiKey = settings.geminiApiKey || '';

            if (firebaseInitialized && firebaseDb) {
                firebaseDb.ref('ruthlessTrader').once('value').then((snapshot) => {
                    const fbData = snapshot.val();
                    if (fbData) {
                        settings = { ...settings, ...fbData };
                        geminiApiKey = settings.geminiApiKey || '';
                        applySettingsToUI();
                    }
                }).catch(() => { applySettingsToUI(); });
            } else {
                applySettingsToUI();
            }
            updateStatus();
        }

        function applySettingsToUI() {
            document.getElementById('tgToken').value = settings.tgToken || '';
            document.getElementById('tgChatId').value = settings.tgChatId || '';
            document.getElementById('captureSec').value = settings.captureSec || 52;
            document.getElementById('signalSec').value = settings.signalSec || 57;
            document.getElementById('resetSec').value = settings.resetSec || 1;
            document.getElementById('geminiPrompt').value = settings.geminiPrompt || '';
            if (settings.logoData) {
                document.getElementById('appLogoDisplay').innerHTML = `<img src="${settings.logoData}" style="width:50px;height:50px;object-fit:contain;">`;
            }
        }

        function saveSetting(type) {
            document.querySelectorAll('.setting-group').forEach(el => el.classList.remove('error'));
            
            switch(type) {
                case 'telegram':
                    settings.tgToken = document.getElementById('tgToken').value;
                    settings.tgChatId = document.getElementById('tgChatId').value;
                    if (!settings.tgToken || !settings.tgChatId) {
                        document.getElementById('tgGroup').classList.add('error');
                        return;
                    }
                    saveToStorage('tgToken', settings.tgToken);
                    saveToStorage('tgChatId', settings.tgChatId);
                    break;
                case 'logo':
                    const file = document.getElementById('logoUpload').files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            settings.logoData = e.target.result;
                            document.getElementById('appLogoDisplay').innerHTML = `<img src="${settings.logoData}" style="width:50px;height:50px;object-fit:contain;">`;
                            saveToStorage('logoData', settings.logoData);
                        };
                        reader.readAsDataURL(file);
                    } else alert('Select a file');
                    return;
                case 'timer':
                    settings.captureSec = parseInt(document.getElementById('captureSec').value) || 52;
                    settings.signalSec = parseInt(document.getElementById('signalSec').value) || 57;
                    settings.resetSec = parseInt(document.getElementById('resetSec').value) || 1;
                    saveToStorage('captureSec', settings.captureSec);
                    saveToStorage('signalSec', settings.signalSec);
                    saveToStorage('resetSec', settings.resetSec);
                    resetTimerLogic();
                    break;
                case 'geminiPrompt':
                    settings.geminiPrompt = document.getElementById('geminiPrompt').value;
                    saveToStorage('geminiPrompt', settings.geminiPrompt);
                    break;
            }
        }

        btnSettings.onclick = () => {
            settingsOverlay.classList.add('active');
            document.querySelectorAll('.setting-group').forEach(el => el.classList.remove('error'));
            ['tgToken','tgChatId','captureSec','signalSec','resetSec','geminiPrompt'].forEach(id => {
                document.getElementById(id).value = settings[id] || '';
            });
        };
        closeSettings.onclick = () => settingsOverlay.classList.remove('active');
        settingsOverlay.onclick = (e) => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('active'); };

        // ============================================================
        //  TIMER
        // ============================================================
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = new Date();
                const ist = new Date(now.getTime() + (now.getTimezoneOffset()*60000) + 19800000);
                const h = String(ist.getHours()).padStart(2,'0');
                const m = String(ist.getMinutes()).padStart(2,'0');
                const s = String(ist.getSeconds()).padStart(2,'0');
                hoursSpan.textContent = h; minutesSpan.textContent = m; secondsSpan.textContent = s;
                const sec = parseInt(s);
                
                if (sec >= 1 && sec <= 49) {
                    secondsSpan.style.color = '#00ff00';
                    secondsSpan.style.textShadow = '0 0 20px rgba(0, 255, 0, 0.3)';
                } else {
                    secondsSpan.style.color = '#ff0033';
                    secondsSpan.style.textShadow = '0 0 30px rgba(255, 0, 51, 0.4)';
                }

                const captureSec = settings.captureSec;
                const signalSec = settings.signalSec;
                const resetSec = settings.resetSec;

                if (sec === signalSec - 5 && lastSecond !== signalSec - 5 && (autoMode || manualWait)) {
                    startCountdown();
                }

                if (sec === captureSec && lastSecond !== captureSec && (autoMode || manualWait)) {
                    captureFullScreenAndAnalyze();
                }

                if (sec === signalSec && lastSecond !== signalSec && (autoMode || manualWait)) {
                    displaySignalFromAI();
                    if (manualWait) { manualWait = false; btnSignal.textContent = 'GET SIGNAL'; btnSignal.className = 'btn btn-signal'; btnSignal.disabled = false; }
                    signalLocked = false;
                    countdownActive = false;
                }

                if (sec === resetSec && lastSecond !== resetSec && !autoMode) {
                    btnSignal.textContent = 'GET SIGNAL'; btnSignal.className = 'btn btn-signal'; btnSignal.disabled = false; signalLocked = false; manualWait = false;
                }

                lastSecond = sec;
            }, 1000);
        }

        function resetTimerLogic() { startTimer(); }

        function startCountdown() {
            if (countdownActive) return;
            countdownActive = true;
            showCountdown();
            let count = 5;
            countdownNumber.textContent = count;
            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNumber.textContent = count;
                    countdownNumber.style.animation = 'none';
                    setTimeout(() => { countdownNumber.style.animation = 'countPop 0.6s ease-out'; }, 10);
                } else {
                    clearInterval(countInterval);
                }
            }, 1000);
        }

        btnAuto.onclick = () => {
            autoMode = !autoMode;
            if (autoMode) {
                btnAuto.textContent = 'PAUSE SIGNALS'; btnAuto.className = 'btn btn-auto active';
                btnSignal.disabled = true; btnSignal.textContent = 'AUTO MODE'; btnSignal.className = 'btn btn-signal';
                showStatus('AUTO MODE', 'Waiting for next cycle...', '⏳');
            } else {
                btnAuto.textContent = 'AUTO SIGNALS'; btnAuto.className = 'btn btn-auto';
                btnSignal.disabled = false; btnSignal.textContent = 'GET SIGNAL'; btnSignal.className = 'btn btn-signal';
                showWait();
            }
        };
        btnSignal.onclick = () => {
            if (autoMode || signalLocked) return;
            manualWait = true; signalLocked = true;
            btnSignal.textContent = 'WAIT FOR SIGNAL'; btnSignal.className = 'btn btn-signal waiting'; btnSignal.disabled = true;
            showStatus('WAITING', 'Starting capture at next cycle...', '⏳');
        };

        // ============================================================
        //  CAPTURE + AI
        // ============================================================

        async function captureFullScreenAndAnalyze() {
            showStatus('CAPTURING', 'Opening Quotex in new tab...', '📸');
            try {
                // Step 1: Open Quotex in a new tab
                const quotexWindow = window.open(QUOTEX_URL, '_blank');
                if (!quotexWindow) {
                    showError('POPUP BLOCKED', 'Please allow pop-ups in your browser settings.');
                    return;
                }

                // Step 2: Wait for Quotex to load
                await new Promise(resolve => setTimeout(resolve, 3000));

                // Step 3: Capture the new tab using getDisplayMedia
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: true, 
                    audio: false 
                });
                
                if (!stream) {
                    showError('CAPTURE CANCELLED', 'You cancelled the screen share.');
                    return;
                }
                
                const track = stream.getVideoTracks()[0];
                const imageCapture = new ImageCapture(track);
                const bitmap = await imageCapture.grabFrame();
                
                const canvas = document.createElement('canvas');
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(bitmap, 0, 0);
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.95));
                
                track.stop();
                stream.getTracks().forEach(t => t.stop());

                showStatus('ANALYZING', 'Sending image to Gemini AI...', '🧠');
                const signalData = await callGeminiAI(blob);
                if (signalData) {
                    lastSignalData = signalData;
                } else {
                    lastSignalData = null;
                }

            } catch (err) {
                console.error(err);
                if (err.name === 'NotAllowedError' || err.message.includes('Permission denied')) {
                    showError('PERMISSION DENIED', 'You denied screen sharing permission.');
                } else if (err.name === 'NotAllowedError' || err.message.includes('canceled')) {
                    showError('CAPTURE CANCELLED', 'You cancelled the screen share.');
                } else {
                    showError('CAPTURE FAILED', err.message || 'Unknown capture error.');
                }
            }
        }

        async function callGeminiAI(imageBlob) {
            if (!geminiApiKey || geminiApiKey.length < 10) {
                showError('GEMINI KEY MISSING', 'Gemini API Key is invalid or missing.');
                return null;
            }

            const base64Image = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(imageBlob);
            });

            const requestBody = {
                contents: [{
                    parts: [
                        { text: settings.geminiPrompt },
                        { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                    ]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${geminiApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    if (response.status === 403) {
                        showError('INVALID GEMINI KEY', 'Your Gemini API Key is invalid or expired.');
                    } else if (response.status === 429) {
                        showError('GEMINI RATE LIMIT', 'Daily Gemini API limit reached. Try again tomorrow.');
                    } else {
                        showError('GEMINI API ERROR', `Gemini API returned error ${response.status}.`);
                    }
                    return null;
                }

                const data = await response.json();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    const jsonMatch = aiText.replace(/```json/g, '').replace(/```/g, '').match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const parsedData = JSON.parse(jsonMatch[0]);
                        return parsedData;
                    } else {
                        showError('INVALID RESPONSE', 'Gemini did not return valid JSON. Check your AI Prompt.');
                        return null;
                    }
                } else {
                    showError('INVALID RESPONSE', 'Gemini returned an unexpected response structure.');
                    return null;
                }
            } catch (error) {
                showError('NETWORK ERROR', `Failed to connect to Gemini API: ${error.message}`);
                return null;
            }
        }

        function displaySignalFromAI() {
            if (!lastSignalData) {
                showError('NO DATA', 'AI did not return any signal data. Please try again.');
                return;
            }

            const d = lastSignalData;
            showSignalData();
            
            sigPair.textContent = d.pair || '--';
            sigPayout.textContent = d.payout || '--';
            sigEntry.textContent = d.nextEntryTime || '--:--';
            
            const acc = d.accuracy || 0;
            let col = 'green'; if (acc<=75) col='red'; else if (acc<=85) col='yellow';
            sigAccuracy.textContent = acc+'%';
            sigAccuracy.className = `signal-accuracy ${col}`;
            
            sigTrend.textContent = d.trend || '--';
            sigTrend.className = `signal-trend ${(d.trend || '').toLowerCase()}`;
            
            sigDirection.textContent = d.direction || '--';
            sigDirection.className = `signal-direction ${(d.direction || '').toLowerCase()}`;
            
            sigLogic.textContent = `Logic: ${d.logic || '--'}`;
            
            sendTelegram(d);
        }

        function sendTelegram(d) {
            if (!settings.tgToken || !settings.tgChatId) return;
            const emoji = d.accuracy<=75?'🔴':d.accuracy<=85?'🟡':'🟢';
            const msg = `🚨 RUTHLESS SIGNAL 🚨\n` +
                `-----------------------------\n` +
                `Pair: ${d.pair}\nPayout: ${d.payout}\n` +
                `Entry Time: ${d.nextEntryTime || 'N/A'}\n` +
                `Accuracy: ${d.accuracy}% ${emoji}\nSignal: ${d.direction}\nTrend: ${d.trend}\n` +
                `Logic: ${d.logic}\n` +
                `-----------------------------`;
            fetch(`https://api.telegram.org/bot${settings.tgToken}/sendMessage`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({chat_id: settings.tgChatId, text: msg})
            }).catch(console.error);
        }
        
        // ============================================================
        //  INITIALIZATION
        // ============================================================
        initFirebase();
        loadFromStorage();
        startTimer();
        showWait();
        updateStatus();
        console.log('🚀 FIXED VERSION LOADED! Quotex will open automatically.');
    </script>
</body>
