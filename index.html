<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
<title>Binary Ruthless Trader</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root { --bg-primary: #000000; --accent-red: #ff3344; --accent-green: #00ffcc; --text-main: #ffffff; --text-muted: #a0a5b0; --border-color: rgba(255, 255, 255, 0.1); }
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
body { background: radial-gradient(circle at 50% 0%, #1a0a0d 0%, #000000 70%); color: var(--text-main); min-height: 100vh; }
.container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 20px; }
.ruthless-navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border-color); }
.nav-brand h1 { font-family: 'Orbitron', sans-serif; color: var(--text-main); }
.nav-brand h1 span { color: var(--accent-red); }
.runtime-warning-banner-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-weight: 600; }
.tool-card { background: rgba(15,15,20,0.6); padding: 20px; border-radius: 20px; border: 1px solid var(--border-color); }
</style>
</head>
<body>
<div class="ruthless-navbar">
    <div class="nav-brand"><h1>Binary <span>Ruthless</span> Trader</h1></div>
    <button onclick="window.location.href='admin.html'" style="background:var(--accent-red); color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer;">Login</button>
</div>
<div class="container">
    <div class="runtime-warning-banner-box" id="publicRuntimeWarningBannerDisplay">Loading...</div>
    <div class="tool-card">
        <select id="publicToolSelector" style="width:100%; padding:10px; background:black; color:var(--accent-green);"></select>
        <div id="publicWorkspaceEngine" style="margin-top:20px;"></div>
    </div>
    <footer id="publicFooterLegalTextDisplayBlock" style="margin-top:40px; text-align:center; color:var(--text-muted);"></footer>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyA2ILDlxtYs2CT-2mJItRV1NApSIaH4t3g", authDomain: "binary-ruthless-trader-26654.firebaseapp.com", projectId: "binary-ruthless-trader-26654", storageBucket: "binary-ruthless-trader-26654.appspot.com", messagingSenderId: "533209261799", appId: "1:533209261799:web:a398ab21b0f913683ea442" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.collection('settings').doc('brandingControl').onSnapshot(doc => {
        if(doc.exists) {
            const d = doc.data();
            document.getElementById('publicRuntimeWarningBannerDisplay').innerText = d.warningText || "Note: Trading is risky.";
            document.getElementById('publicFooterLegalTextDisplayBlock').innerText = d.footerText || "© 2026 Binary Ruthless Trader.";
        }
    });
</script>
</body>
</html>
