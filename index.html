<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader | Official System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --red: #ff0000; 
            --white: #ffffff; 
            --bg: #050505; 
            --panel: #0a0a0a;
            --neon: 0 0 15px var(--red); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }

        /* --- AD CONTAINERS: AUTO-ADJUST LOGIC --- */
        .ad-wrapper { 
            display: flex; flex-direction: column; gap: 8px; 
            margin: 10px 0; width: 100%; align-items: center; 
        }
        
        .ad-slot {
            width: 100%; /* Mobile lo screen width ki match avthundi */
            max-width: 400px; /* Tablet/Desktop lo limit chesthundhi */
            height: 60px; /* Standard height for mobile ads */
            background: #000; border: 1px dashed #222;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Roboto Mono'; font-size: 10px; color: #333;
            border-radius: 4px;
        }

        /* --- Main Layout --- */
        .page-content { padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .widget-container { 
            display: flex; gap: 25px; width: 100%; max-width: 1200px; 
            justify-content: center; margin-top: 10px; 
        }

        .widget { 
            flex: 1; display: flex; flex-direction: column; gap: 10px; 
            align-items: center; width: 100%; 
        }

        /* --- UI Elements --- */
        .ruthless-select {
            width: 100%; padding: 15px; background: var(--panel); border: 1px solid #222; 
            color: var(--white); font-family: 'Roboto Mono'; font-weight: bold; border-radius: 6px;
        }

        .display-box { 
            width: 100%; height: 400px; background: #000; border: 2px solid var(--red); 
            box-shadow: var(--neon); border-radius: 8px; overflow-y: auto;
        }

        /* --- RESPONSIVE FIXES --- */
        @media (max-width: 768px) {
            .widget-container { flex-direction: column; padding: 0; }
            
            /* Containers & Ads fully match mobile width */
            .widget, .display-box, .ruthless-select, .ad-slot {
                width: 100% !important;
                max-width: none; /* Mobile lo constraints teeyali */
            }

            .page-content { padding: 8px; }
            .header { padding: 15px 10px; }
            .brand-img { width: 240px; }
        }

        /* Standard Header/Footer */
        .header { width: 100%; border-bottom: 2px solid var(--red); padding: 20px; background: #000; text-align: center; }
        .footer { width: 100%; padding: 15px; background: #000; text-align: center; font-size: 10px; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <header class="header">
        <img src="brand-name.png" alt="RUTHLESS TRADER" class="brand-img" style="width: 280px;">
    </header>

    <div class="page-content">
        <div class="widget-container">
            
            <div class="widget">
                <div class="ad-wrapper">
                    <div id="ad-1" class="ad-slot">AD SLOT 1 (AUTO-WIDTH)</div>
                    <div id="ad-2" class="ad-slot">AD SLOT 2 (AUTO-WIDTH)</div>
                </div>

                <select class="ruthless-select" id="sigSelect">
                    <option value="">-- SELECT SIGNAL --</option>
                    <option value="QUOTEX">QUOTEX SURESHOT</option>
                    <option value="TOXA">TOXA EXPERT</option>
                </select>
                
                <div class="display-box" id="sigScreen"></div>

                <div class="ad-wrapper">
                    <div id="ad-3" class="ad-slot">AD SLOT 3 (AUTO-WIDTH)</div>
                    <div id="ad-4" class="ad-slot">AD SLOT 4 (AUTO-WIDTH)</div>
                </div>
            </div>

            <div class="widget">
                <div class="ad-wrapper">
                    <div id="ad-extra-1" class="ad-slot">AD SLOT 7 (AUTO-WIDTH)</div>
                    <div id="ad-extra-2" class="ad-slot">AD SLOT 8 (AUTO-WIDTH)</div>
                </div>

                <select class="ruthless-select" id="toolSelect">
                    <option value="">-- SELECT TOOL --</option>
                    <option>CALCULATOR</option>
                </select>
                
                <div class="display-box" id="toolScreen"></div>

                <div class="ad-wrapper">
                    <div id="ad-5" class="ad-slot">AD SLOT 5 (AUTO-WIDTH)</div>
                    <div id="ad-6" class="ad-slot">AD SLOT 6 (AUTO-WIDTH)</div>
                </div>
            </div>

        </div>
    </div>

    <footer class="footer">
        © 2026 BINARY RUTHLESS TRADER
    </footer>

    <script type="module" src="index-script.js"></script>
</body>
</html>
