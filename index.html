<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader</title>
    <link rel="stylesheet" href="styles-ruthless.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
</head>
<body style="background-color: black;">

    <div id="home-view">
        <header class="top-nav" style="display:flex; justify-content:space-between; padding:20px;">
            <div class="logo-area">
                <span style="color:red; font-family:'Orbitron'; font-size:20px;">RUTHLESS TRADER</span>
            </div>
            <button id="admin-entry-btn" onclick="showAdmin()" style="display:none; background:none; border:none; color:#222;"><i class="fas fa-shield-alt"></i></button>
        </header>

        <div class="main-content-wrapper" style="padding:20px;">
            <div id="h-main-container-1" class="element main-box" style="border:2px solid red; padding:30px; margin-bottom:20px; text-align:center;">
                <h2 style="color:white;">ACCURACY</h2>
                <div id="itm-rate" style="color:red; font-size:32px; font-family:'Roboto Mono';">98%</div>
            </div>
        </div>
        <p style="color:gray; text-align:center;">Site is Loading...</p>
    </div>

    <div id="admin-view" style="display:none; background:#111; padding:20px; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; overflow-y:auto;">
        <h1 style="color:red;">ADMIN PANEL</h1>
        <button onclick="hideAdmin()" style="background:red; color:white; border:none; padding:10px;">EXIT</button>
        </div>

    <script src="builder-engine.js"></script>
    <script src="revenue-calc.js"></script>
    <script src="affiliate-manager.js"></script>
    <script src="security-core.js"></script>
    <script src="signals-sync.js"></script>

    <script>
        // Emergency Script to stop White Screen
        window.onload = function() {
            console.log("Ruthless Booting...");
            
            // Check Secret Path
            if(window.location.hash === "#9700224305") {
                document.getElementById('admin-entry-btn').style.display = 'block';
            }

            // Accuracy Simulation
            setInterval(() => {
                const rate = Math.floor(Math.random() * (99 - 94 + 1)) + 94;
                const el = document.getElementById('itm-rate');
                if(el) el.innerText = rate + "%";
            }, 3000);
        };

        function showAdmin() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
        }
        function hideAdmin() {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
        }
    </script>
</body>
</html>
