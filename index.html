<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader V7</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="home-view">
        <header id="h-header" class="home-header">
            <div class="header-center">
                <div class="brand-group">
                    <img src="logo.png" class="main-logo" alt="L">
                    <img src="brand-name.png" class="brand-img" alt="RUTHLESS">
                </div>
                <div class="top-socials">
                    <i class="fab fa-telegram-plane"></i>
                    <i class="fab fa-youtube"></i>
                </div>
            </div>
            <div class="admin-trigger" onclick="checkAdminAccess()"><i class="fas fa-user-shield"></i></div>
        </header>

        <main class="home-container">
            <div id="h-signal" class="glass-container">
                <div class="container-tag">LIVE SIGNAL</div>
                <div class="signal-direction">EUR/USD CALL</div>
                <button class="join-btn">JOIN NOW</button>
            </div>

            <div id="h-tool" class="glass-container">
                <div class="container-tag">TREND METER</div>
                <div class="signal-direction" style="font-size:20px; color:var(--neon)">STRONG BUY</div>
            </div>
        </main>
    </div>

    <div id="admin-wrapper" style="display:none;">
        <aside id="sidebar">
            <div class="sidebar-header"><h2>ADMIN</h2></div>
            <nav>
                <button class="nav-btn active" onclick="openTab('tab-layout')">Layout Builder</button>
                <button class="nav-btn" onclick="logout()">Logout</button>
            </nav>
        </aside>

        <main id="content-area">
            <section id="tab-layout" class="tab-content">
                <div class="builder-header">
                    <h1>Layout Builder</h1>
                    <div class="toggle-group">
                        <button id="btn-desk" class="tgl-btn active" onclick="setPreview('desktop')">DESKTOP</button>
                        <button id="btn-mob" class="tgl-btn" onclick="setPreview('mobile')">MOBILE</button>
                    </div>
                    <button class="save-btn" onclick="saveAllPositions()">SAVE LAYOUT</button>
                </div>

                <div id="preview-frame" class="p-desktop">
                    <div class="builder-overlay" id="overlay">
                        <div id="drag-header" class="drag-item" data-id="h-header" style="width:100%; height:80px; top:0; left:0;">HEADER</div>
                        <div id="drag-signal" class="drag-item" data-id="h-signal" style="width:280px; height:180px; top:100px; left:20px;">SIGNAL BOX</div>
                        <div id="drag-tool" class="drag-item" data-id="h-tool" style="width:280px; height:120px; top:300px; left:20px;">TOOL BOX</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function checkAdminAccess() {
            if(prompt("Key:") === "0000") {
                window.location.hash = "#admin";
                location.reload();
            }
        }

        window.onload = function() {
            const isAdmin = window.location.hash === "#admin";
            document.getElementById('home-view').style.display = isAdmin ? 'none' : 'block';
            document.getElementById('admin-wrapper').style.display = isAdmin ? 'flex' : 'none';

            if(isAdmin) {
                loadGhostPositions();
            } else {
                applySavedLayout();
            }
        };

        // Initialize Interact.js
        interact('.drag-item').draggable({
            listeners: { move(event) {
                const target = event.target;
                const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                target.style.transform = `translate(${x}px, ${y}px)`;
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
            }}
        }).resizable({
            edges: { right: true, bottom: true, left: true, top: true },
            listeners: { move(event) {
                let target = event.target;
                let x = (parseFloat(target.getAttribute('data-x')) || 0);
                let y = (parseFloat(target.getAttribute('data-y')) || 0);
                target.style.width = event.rect.width + 'px';
                target.style.height = event.rect.height + 'px';
                x += event.deltaRect.left;
                y += event.deltaRect.top;
                target.style.transform = `translate(${x}px, ${y}px)`;
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
            }}
        });

        function saveAllPositions() {
            const elements = ['drag-header', 'drag-signal', 'drag-tool'];
            const layoutData = {};
            elements.forEach(id => {
                const el = document.getElementById(id);
                layoutData[el.getAttribute('data-id')] = {
                    x: el.getAttribute('data-x') || 0,
                    y: el.getAttribute('data-y') || 0,
                    w: el.style.width,
                    h: el.style.height
                };
            });
            localStorage.setItem('ruthless_pos', JSON.stringify(layoutData));
            alert("Layout Saved!");
            location.reload();
        }

        function applySavedLayout() {
            const data = JSON.parse(localStorage.getItem('ruthless_pos'));
            if(!data) return;
            Object.keys(data).forEach(id => {
                const el = document.getElementById(id);
                const d = data[id];
                if(el) {
                    el.style.position = 'absolute';
                    el.style.transform = `translate(${d.x}px, ${d.y}px)`;
                    el.style.width = d.w;
                    el.style.height = d.h;
                }
            });
        }

        function loadGhostPositions() {
            const data = JSON.parse(localStorage.getItem('ruthless_pos'));
            if(!data) return;
            const map = { 'h-header': 'drag-header', 'h-signal': 'drag-signal', 'h-tool': 'drag-tool' };
            Object.keys(data).forEach(homeId => {
                const ghost = document.getElementById(map[homeId]);
                const d = data[homeId];
                if(ghost) {
                    ghost.style.transform = `translate(${d.x}px, ${d.y}px)`;
                    ghost.setAttribute('data-x', d.x);
                    ghost.setAttribute('data-y', d.y);
                    ghost.style.width = d.w; ghost.style.height = d.h;
                }
            });
        }

        function setPreview(mode) {
            const frame = document.getElementById('preview-frame');
            frame.className = (mode === 'mobile') ? 'p-mobile' : 'p-desktop';
            document.getElementById('btn-desk').className = (mode === 'desktop') ? 'tgl-btn active' : 'tgl-btn';
            document.getElementById('btn-mob').className = (mode === 'mobile') ? 'tgl-btn active' : 'tgl-btn';
        }

        function logout() { window.location.hash = ""; location.reload(); }
    </script>
</body>
</html>
