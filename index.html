<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader | Official System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --red: #ff0000; 
            --green: #00ffcc; 
            --bg: #050505; 
            --neon: 0 0 15px var(--red); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- STATIC HEADER --- */
        .header {
            width: 100%; padding: 25px 20px; display: flex; flex-direction: column;
            align-items: center; border-bottom: 2px solid var(--red); background: #000;
            gap: 15px;
        }
        .logo-img { width: 60px; height: auto; }
        .brand-img { width: 100%; max-width: 480px; filter: drop-shadow(0 0 10px var(--red)); }
        
        .header-bottom { display: flex; gap: 20px; align-items: center; margin-top: 10px; }
        .social-link { color: #666; text-decoration: none; font-family: 'Roboto Mono'; font-size: 11px; border: 1px solid #222; padding: 6px 12px; border-radius: 4px; transition: 0.3s; }
        .social-link:hover { color: var(--red); border-color: var(--red); }
        .admin-trigger { background: transparent; border: 1px solid #333; color: #444; padding: 6px 15px; cursor: pointer; font-family: 'Roboto Mono'; font-size: 11px; }

        /* --- MAIN LAYOUT --- */
        .page-content { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .layout-grid {
            display: grid; grid-template-columns: 160px 1fr 160px;
            gap: 20px; width: 100%; max-width: 1400px;
        }

        /* Containers Styles */
        .widget-wrapper { width: 100%; max-width: 600px; margin: 0 auto 40px; }
        .label-select { margin-bottom: 15px; }
        
        .main-display {
            width: 100%; height: 450px; background: #080808; 
            border: 1px solid var(--red); border-radius: 12px;
            box-shadow: var(--neon); overflow-y: auto; overflow-x: hidden;
            position: relative; padding: 20px;
        }

        /* Dropdown Styling */
        select {
            width: 100%; padding: 18px; background: #111; border: 1px solid #333;
            color: var(--green); font-family: 'Roboto Mono'; font-weight: bold;
            font-size: 15px; border-radius: 8px; outline: none; cursor: pointer;
        }

        /* Signal Section Specifics */
        .signal-placeholder {
            height: 100%; display: flex; align-items: center; justify-content: center;
        }
        .wait-note { font-family: 'Roboto Mono'; font-size: 12px; color: #444; text-transform: lowercase; letter-spacing: 1px; }
        
        .signal-entry {
            background: #111; border-left: 4px solid var(--red); 
            padding: 15px; margin-bottom: 12px; font-family: 'Roboto Mono';
            font-size: 14px; color: var(--green); animation: fadeIn 0.5s ease;
        }

        /* Ads Placeholders */
        .ad-box-v { background: #0a0a0a; border: 1px dashed #222; height: 600px; display: flex; align-items: center; justify-content: center; color: #333; font-family: 'Roboto Mono'; font-size: 10px; }
        .ad-box-h { background: #0a0a0a; border: 1px dashed #222; width: 100%; height: 90px; margin: 20px 0; display: flex; align-items: center; justify-content: center; color: #333; font-family: 'Roboto Mono'; font-size: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MOBILE VIEW --- */
        @media (max-width: 768px) {
            .layout-grid { grid-template-columns: 1fr; }
            .side-ad { display: none; }
            .widget-wrapper { max-width: 100%; }
            .main-display { border-radius: 0; border-left: none; border-right: none; width: 100vw; margin-left: -20px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.png" alt="LOGO" class="logo-img">
        <img src="brand-name.png" alt="BINARY RUTHLESS TRADER" class="brand-img">
        <div class="header-bottom">
            <a href="#" class="social-link">TELEGRAM</a>
            <a href="#" class="social-link">YOUTUBE</a>
            <button class="admin-trigger" onclick="goToAdmin()">ADMIN</button>
        </div>
    </header>

    <div class="page-content">
        <div class="ad-box-h">ADS SLOT: TOP HORIZONTAL</div>

        <div class="layout-grid">
            <div class="ad-box-v side-ad">ADS SLOT: VERTICAL LEFT</div>

            <div class="main-content-area">
                
                <div class="widget-wrapper">
                    <div class="label-select">
                        <select id="signalType" onchange="updateSignalView()">
                            <option value="">-- SELECT SIGNAL FEED --</option>
                            <option value="quotex">QUOTEX SIGNALS</option>
                            <option value="toxa">TOXA SIGNALS</option>
                        </select>
                    </div>
                    <div class="main-display" id="signalScreen">
                        <div class="signal-placeholder">
                            <span class="wait-note">wait for signals...</span>
                        </div>
                    </div>
                </div>

                <div class="ad-box-h" style="display: block;">ADS SLOT: MIDDLE HORIZONTAL</div>

                <div class="widget-wrapper">
                    <div class="label-select">
                        <select id="toolType" onchange="updateToolView()">
                            <option value="">-- SELECT TRADING TOOL --</option>
                            <option value="money_management">MONEY MANAGEMENT TOOL</option>
                            <option value="compounding">COMPOUNDING CALCULATOR</option>
                        </select>
                    </div>
                    <div class="main-display" id="toolScreen">
                        </div>
                </div>

            </div>

            <div class="ad-box-v side-ad">ADS SLOT: VERTICAL RIGHT</div>
        </div>
    </div>

    <script>
        function goToAdmin() {
            const p = prompt("ENTER ACCESS KEY:");
            if(p === "0000") {
                window.location.href = "admin.html";
            } else {
                alert("ACCESS DENIED");
            }
        }

        // SIGNAL LOGIC
        function updateSignalView() {
            const type = document.getElementById('signalType').value;
            const screen = document.getElementById('signalScreen');

            if(!type) {
                screen.innerHTML = '<div class="signal-placeholder"><span class="wait-note">wait for signals...</span></div>';
                return;
            }

            // Simulated Signal Fetching (In real app, this connects to Firebase)
            screen.innerHTML = `
                <div class="signal-entry">
                    [${type.toUpperCase()}] EUR/USD - CALL - 5 MIN <br>
                    <small style="color:#555">Received: Just Now</small>
                </div>
                <div class="signal-entry">
                    [${type.toUpperCase()}] GBP/JPY - PUT - 1 MIN <br>
                    <small style="color:#555">Received: 2 mins ago</small>
                </div>
            `;
        }

        // TOOL LOGIC
        function updateToolView() {
            const tool = document.getElementById('toolType').value;
            const screen = document.getElementById('toolScreen');

            if(tool === 'money_management') {
                // Example of auto-fitting tool code
                screen.innerHTML = `
                    <div style="width:100%; color:var(--green); font-family:'Roboto Mono';">
                        <h3 style="color:var(--red); margin-bottom:15px;">MONEY MANAGEMENT</h3>
                        <label style="font-size:12px;">Capital Amount:</label>
                        <input type="number" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #333; color:var(--green);">
                        <button style="width:100%; padding:15px; background:var(--red); color:#fff; font-family:'Orbitron'; border:none; cursor:pointer;">CALCULATE RISK</button>
                        
                        <div style="height:600px; margin-top:20px; border:1px dashed #222; display:flex; align-items:center; justify-content:center; color:#333;">
                            Tool content scroll area
                        </div>
                    </div>
                `;
            } else if(tool === 'compounding') {
                screen.innerHTML = '<p style="text-align:center; margin-top:100px; color:#444;">Compounding Tool Loading...</p>';
            } else {
                screen.innerHTML = '';
            }
        }
    </script>
</body>
</html>
