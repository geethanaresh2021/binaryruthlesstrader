<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BINARY RUTHLESS TRADER | LIVE TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="index-style.css">
</head>
<body>

    <div id="warning-wrapper" class="warning-container" style="display: none;">
        <div id="live-warning-text" class="warning-content"></div>
    </div>

    <div id="giveaway-bar" class="giveaway-strip" style="display: none;"></div>

    <div class="terminal-main">
        <header class="header-section">
            <div class="brand-info">
                <h1 id="site-title">BINARY <span class="red-glow">RUTHLESS</span></h1>
                <p class="server-status"><span class="dot-blink">●</span> SECURE SERVER ONLINE</p>
            </div>
            <div class="social-box">
                <a href="#" id="tg-link"><i class="fab fa-telegram"></i></a>
                <a href="#" id="yt-link"><i class="fab fa-youtube"></i></a>
            </div>
        </header>

        <div class="ad-row">
            <div id="ad-1" class="ad-placeholder">AD SLOT #1</div>
            <div id="ad-2" class="ad-placeholder">AD SLOT #2</div>
        </div>

        <div class="content-layout">
            <section class="signals-area">
                <div class="area-header">
                    <h3><i class="fas fa-bolt"></i> REAL-TIME SIGNALS</h3>
                    <select id="platformSelect" class="ruthless-select">
                        <option value="QUOTEX">QUOTEX</option>
                        <option value="TOXA">TOXA</option>
                    </select>
                </div>
                
                <div id="sigScreen" class="signal-list-container">
                    <div class="wait-msg">CONNECTING TO RUTHLESS CORE...</div>
                </div>

                <div id="ad-3" class="ad-placeholder mid-ad">AD SLOT #3</div>
            </section>

            <aside class="sidebar-tools">
                <div class="tool-card">
                    <h4>PROFIT CALCULATOR</h4>
                    <div id="calc-ui">READY</div>
                </div>

                <div id="ad-4" class="ad-placeholder side-ad">AD SLOT #4</div>
                <div id="ad-5" class="ad-placeholder side-ad">AD SLOT #5</div>
            </aside>
        </div>

        <div id="ad-6" class="ad-placeholder footer-ad">AD SLOT #6</div>

        <footer class="footer-note">
            <p>&copy; 2026 BINARY RUTHLESS TRADER // ALL RIGHTS RESERVED</p>
        </footer>
    </div>

    <script type="module" src="index-script.js"></script>
</body>
</html>
