<script type="module">
import { db, auth } from './firebase-logic.js';
import { doc, onSnapshot, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

signInAnonymously(auth);

// SIGNALS
sigSelect.onchange = e=>{
const q=query(collection(db,e.target.value),orderBy("timestamp","desc"),limit(20));
onSnapshot(q,snap=>{
sigScreen.innerHTML=snap.docs.map(d=>d.data().pair+" "+d.data().action).join("<br>");
});
};

// GIVEAWAY
onSnapshot(doc(db,"site_settings","giveaway"),snap=>{
if(snap.exists()){
let d=snap.data();
giveaway-bar.innerHTML=d.content;
}
});

// WARNING
onSnapshot(doc(db,"site_settings","warning_note"),snap=>{
if(snap.exists()){
live-warning-text.innerHTML=snap.data().text;
}
});
</script>
