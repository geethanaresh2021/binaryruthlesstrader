<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <style>
        :root { --red: #ff0000; --bg: #000; --neon: #00ffcc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--red); font-family: 'Orbitron', sans-serif; overflow-x: hidden; user-select: none; }

        /* --- HOME PAGE VIEW --- */
        #home-view { display: block; height: 100vh; position: relative; width: 100vw; }
        #admin-entry-btn { display: none; position: fixed; top: 0; width: 100%; background: var(--red); color: #fff; text-align: center; padding: 12px; z-index: 10000; cursor: pointer; border: none; font-weight: bold; font-family: 'Orbitron'; }
        
        .element { position: absolute; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .join-btn { background: var(--red); color: #fff; border: none; padding: 15px 35px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px var(--red); border-radius: 4px; font-family: 'Orbitron'; }
        
        /* Ruthless Numbers */
        .number-glow { font-family: 'Roboto Mono', monospace; font-size: 32px; font-weight: bold; color: var(--red); text-shadow: 0 0 15px var(--red); }
        .trading-box { border: 2px solid var(--red); background: rgba(15, 15, 15, 0.95); }

        /* --- ADMIN PAGE VIEW --- */
        #admin-view { display: none; background: #0a0a0a; color: #fff; font-family: 'Roboto Mono', monospace; padding: 20px; min-height: 100vh; overflow-y: auto; }
        .section { background: #151515; border-left: 5px solid var(--red); padding: 20px; margin-bottom: 25px; border-radius: 0 5px 5px 0; }
        .val { display: block; font-size: 28px; color: var(--red); font-weight: bold; }
        .revenue-text { font-size: 40px; color: var(--neon); text-shadow: 0 0 15px var(--neon); font-weight: bold; }

        /* Canvas Styles */
        #canvas-container { width: 100%; display: flex; justify-content: center; }
        .preview-area { width: 100%; height: 500px; background: #000; border: 2px solid #444; position: relative; overflow: hidden; }
        .mobile-canvas { width: 375px !important; height: 667px !important; border: 4px solid var(--red); }
        
        .draggable-item { cursor: move; border: 1px dashed #fff; padding: 10px; position: absolute; background: rgba(255,0,0,0.1); }
        
        input, textarea { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 12px; margin: 8px 0; width: 100%; font-family: 'Roboto Mono'; }
        .input-green { color: var(--neon) !important; font-weight: bold; }
        .btn-action { background: var(--red); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

    <button id="admin-entry-btn" onclick="showAdmin()">ENTER RUTHLESS COMMAND CENTER</button>

    <div id="home-view">
        <div id="h-logo" class="element">LOGO</div>
        <div id="h-join" class="element">
            <button class="join-btn" onclick="openAffiliate()">JOIN NOW</button>
        </div>
        <div id="h-signal" class="element trading-box" style="width:220px; height:320px;">
            <div class="number-glow">98% ITM</div>
        </div>
    </div>

    <div id="admin-view">
        <h1 style="color:red; text-align:center; margin-bottom:20px;">RUTHLESS ADMIN DASHBOARD</h1>

        <div class="section">
            <h3>1. REVENUE ENGINE (₹ INR)</h3>
            <div class="revenue-text">₹ <span id="rev-display">0.00</span></div>
            <div style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label>CPM ($):</label>
                    <input type="number" id="cpm-val" value="1.50" step="0.01" class="input-green">
                </div>
                <div style="flex:1;">
                    <label>USD Rate:</label>
                    <input type="number" id="rate-val" value="83.50" class="input-green">
                </div>
            </div>
        </div>

        <div class="section">
            <h3>2. VISUAL LAYOUT BUILDER</h3>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button class="btn-action" onclick="toggleCanvas('desktop')" style="flex:1;">Desktop</button>
                <button class="btn-action" onclick="toggleCanvas('mobile')" style="flex:1; background:#333;">Mobile</button>
                <button class="btn-action" onclick="saveMasterSettings()" style="flex:1; background:green;">SAVE LAYOUT</button>
            </div>
            <div id="canvas-container">
                <div id="canvas" class="preview-area">
                    <div id="b-logo" class="draggable-item" data-id="h-logo">LOGO</div>
                    <div id="b-join" class="draggable-item" data-id="h-join">JOIN BUTTON</div>
                    <div id="b-signal" class="draggable-item" data-id="h-signal">SIGNAL BOX</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>3. AFFILIATE & ADS</h3>
            <label>Affiliate Link:</label>
            <input type="text" id="aff-link-input" placeholder="Paste Broker Link Here">
            <label>Ad Script:</label>
            <textarea id="ad-snippet" rows="3" placeholder="Paste Ad Code"></textarea>
        </div>

        <div class="section">
            <h3>4. SECURITY</h3>
            <label>Secret Path (Current: 9700224305):</label>
            <input type="text" id="path-input" value="9700224305">
            <button class="btn-action" onclick="location.reload()" style="background:#222; margin-top:10px;">EXIT & REFRESH</button>
        </div>
    </div>

    <script>
        // --- 1. INITIAL SETUP & LOAD ---
        window.onload = () => {
            const savedLayout = JSON.parse(localStorage.getItem('ruthless_layout')) || {};
            Object.keys(savedLayout).forEach(id => {
                const el = document.getElementById(id);
                const b_el = document.querySelector(`[data-id="${id}"]`);
                if(el && b_el) {
                    const pos = savedLayout[id];
                    el.style.left = b_el.style.left = pos.x + 'px';
                    el.style.top = b_el.style.top = pos.y + 'px';
                    b_el.setAttribute('data-x', pos.x);
                    b_el.setAttribute('data-y', pos.y);
                }
            });
            document.getElementById('aff-link-input').value = localStorage.getItem('ruthless_aff_link') || '';
        };

        // --- 2. SECRET AUTH ---
        if(window.location.hash === "#9700224305" || sessionStorage.getItem('ruthless_auth')) {
            document.getElementById('admin-entry-btn').style.display = 'block';
            sessionStorage.setItem('ruthless_auth', 'true');
        }

        function showAdmin() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            document.getElementById('admin-entry-btn').style.display = 'none';
        }

        // --- 3. DRAG & DROP ENGINE ---
        interact('.draggable-item').draggable({
            listeners: {
                move (event) {
                    var target = event.target;
                    var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                    var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                    target.style.left = x + 'px';
                    target.style.top = y + 'px';
                    target.setAttribute('data-x', x);
                    target.setAttribute('data-y', y);
                }
            }
        });

        // --- 4. MASTER SAVE ---
        function saveMasterSettings() {
            const layout = {};
            document.querySelectorAll('.draggable-item').forEach(el => {
                const id = el.getAttribute('data-id');
                layout[id] = {
                    x: parseFloat(el.getAttribute('data-x')) || 0,
                    y: parseFloat(el.getAttribute('data-y')) || 0
                };
            });
            localStorage.setItem('ruthless_layout', JSON.stringify(layout));
            localStorage.setItem('ruthless_aff_link', document.getElementById('aff-link-input').value);
            alert("RUTHLESS: Layout & Affiliate Link Saved Successfully!");
            location.reload(); 
        }

        // --- 5. REVENUE & REFRESH ---
        let refreshes = 0;
        let lastTime = Date.now();
        window.addEventListener('scroll', () => {
            if(Date.now() - lastTime > 15000) {
                refreshes++;
                lastTime = Date.now();
                const cpm = parseFloat(document.getElementById('cpm-val').value) || 0;
                const rate = parseFloat(document.getElementById('rate-val').value) || 0;
                const total = ((4 * refreshes) / 1000) * cpm * rate;
                document.getElementById('rev-display').innerText = total.toFixed(2);
            }
        });

        function toggleCanvas(mode) {
            const canvas = document.getElementById('canvas');
            if(mode === 'mobile') canvas.classList.add('mobile-canvas');
            else canvas.classList.remove('mobile-canvas');
        }

        function openAffiliate() {
            const link = localStorage.getItem('ruthless_aff_link') || '#';
            window.open(link, '_blank');
        }

        // --- 6. SECURITY ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.key == 'I')) {
                window.location.replace("about:blank");
                return false;
            }
        };
    </script>
</body>
</html>
