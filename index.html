<style>
:root {
    --bg-primary: #000000;
    --bg-surface: #0a0a0c;
    --bg-card: rgba(15, 15, 20, 0.6);
    --accent-red: #ff3344;
    --accent-green: #00ffcc;
    --text-main: #ffffff;
    --text-muted: #a0a5b0;
    --border-color: rgba(255, 255, 255, 0.1);
    --glass-glow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Plus Jakarta Sans', sans-serif;
    -webkit-tap-highlight-color:transparent;
}

html, body {
    background-color: var(--bg-primary);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
}

body {
    background: radial-gradient(circle at 50% 0%, #1a0a0d 0%, #000000 70%);
    display: flex;
    flex-direction: column;
}

.container {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 16px;
    flex: 1 0 auto; /* Pushes footer to bottom */
}

/* NAVBAR & HEADER ARCHITECTURE */
.ruthless-navbar {
    width: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border-bottom: 1px solid var(--border-color);
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 999;
}

.nav-brand h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 19px;
    font-weight: 900;
    color: var(--text-main);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap; /* Forces onto single line */
}

.nav-brand h1 span {
    color: var(--accent-red);
    text-shadow: 0 0 15px rgba(255, 51, 68, 0.6);
}

/* Action bar holding Social Icons & Login Button on the same line */
.action-bar-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 480px;
    padding: 4px 8px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 14px;
}

.social-icons-rack {
    display: flex;
    align-items: center;
    gap: 16px;
}

.social-icon-btn {
    color: var(--accent-red); /* Red Logos */
    font-size: 20px;
    text-decoration: none;
    transition: all 0.3s ease;
    text-shadow: 0 0 8px rgba(255, 51, 68, 0.4);
}

.social-icon-btn:hover {
    transform: scale(1.15);
    color: #ffffff;
}

.nav-login-btn {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--text-main);
    background: var(--accent-red); /* Red Login Button */
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 51, 68, 0.4);
    transition: all 0.3s ease;
}

.nav-login-btn:hover {
    background: #ffffff;
    color: #000000;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
}

/* DESKTOP RESPONSIVE NAVBAR ADAPTATION */
@media(min-width: 768px) {
    .ruthless-navbar {
        flex-direction: row;
        justify-content: space-between;
        padding: 20px 32px;
    }
    .nav-brand h1 {
        font-size: 24px;
        letter-spacing: 2px;
    }
    .action-bar-row {
        width: auto;
        gap: 32px;
        background: transparent;
        border: none;
    }
}

/* DEFAULT RISK NOTE */
.runtime-warning-banner-box {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 12px 16px;
    margin: 16px auto;
    text-align: center;
    color: #ffffff; /* White text note default */
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    max-width: 1000px;
}

/* ADS VERTICAL AND GRID SCHEDULER LAYOUT */
.ads-vertical-stack {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    margin: 16px 0;
}

.ad-slot-frame {
    background: rgba(10, 10, 12, 0.4);
    border: 1px dashed var(--border-color);
    border-radius: 12px;
    display: none; 
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin: 0 auto;
    width: 100%;
}

/* TOOL CONTAINER ARCHITECTURE (ADAPTIVE SCREEN) */
.tool-workspace-card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    border-radius: 24px;
    padding: 16px;
    margin: 16px 0;
    box-shadow: var(--glass-glow);
    width: 100%;
}

/* Tiny Compact Selection Form Container */
.tools-selection-container {
    max-width: 280px; /* Chinnaga ravali */
    margin: 0 auto 20px auto;
    text-align: center;
}

.tools-selection-container h2 {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 8px;
}

/* INPUTS & CONTROLS */
label {
    display: block;
    margin-bottom: 6px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
}

input, select, textarea {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    background: rgba(0, 0, 0, 0.8);
    outline: none;
    color: var(--accent-green) !important;
    font-family: 'Roboto Mono', monospace !important;
    font-weight: bold !important;
    font-size: 14px;
}

/* RESPONSIVE LAYOUT MATRIX ADAPTATION */
.layout-grid-system {
    display: flex;
    flex-direction: column;
    width: 100%;
}

@media (min-width: 1025px) {
    /* Auto adapt tools content space frame on Desktop layout */
    .tool-workspace-card {
        padding: 32px;
    }
    .tools-selection-container {
        max-width: 340px;
    }
}

/* GENERAL BUTTON STYLE */
.ruthless-btn {
    width: 100%;
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    background: var(--text-main);
    color: var(--bg-primary);
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
}
.ruthless-btn:hover {
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
}

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
.individual-control-card {
    background: rgba(10, 10, 12, 0.5);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* SYSTEM FIXED FOOTER STRATA */
.system-footer-block {
    flex-shrink: 0; /* Keeps footer at bottom */
    border-top: 1px solid var(--border-color);
    padding: 20px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.5px;
    background: rgba(0,0,0,0.9);
    width: 100%;
}

/* ULTRA CLEAN SECURITY OVERLAY MODAL */
.security-modal-overlay {
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0; pointer-events: none;
    transition: all 0.3s ease;
}
.security-modal-overlay.active {
    opacity: 1; pointer-events: auto;
}

.security-modal-window {
    background: #000000;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 50px rgba(255, 51, 68, 0.1);
    border-radius: 24px;
    padding: 36px 24px;
    width: 100%;
    max-width: 320px;
    position: relative;
    text-align: center;
}

.close-modal-x {
    position: absolute;
    top: 16px; right: 16px;
    background: transparent; border: none;
    color: var(--text-muted); font-size: 20px;
    cursor: pointer;
}

/* Admin Tabs Setup styling updates */
.admin-options-bar {
    display: flex;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 20px;
    gap: 4px;
    max-width: 440px;
}
.split-tab-btn {
    flex: 1; padding: 10px; background: transparent; border: none;
    color: var(--text-muted); font-weight: 600; font-size: 12px; cursor: pointer; border-radius: 10px;
}
.split-tab-btn.active {
    background: rgba(255, 255, 255, 0.08); color: var(--text-main);
}
</style>
</head>

const tabBtnAddTool = document.getElementById('tabBtnAddTool');
const tabBtnAds = document.getElementById('tabBtnAds');
const tabBtnJournalCode = document.getElementById('tabBtnJournalCode');
const tabBtnNoteSocial = document.getElementById('tabBtnNoteSocial');
const adminTabContentAddTool = document.getElementById('adminTabContentAddTool');
const adminTabContentAds = document.getElementById('adminTabContentAds');
const adminTabContentJournalCode = document.getElementById('adminTabContentJournalCode');
const adminTabContentNoteSocial = document.getElementById('adminTabContentNoteSocial');

function routeSettingsSubTabs(btn, panel) {
    [tabBtnAddTool, tabBtnAds, tabBtnJournalCode, tabBtnNoteSocial].forEach(b => {
        b.style.background = 'transparent'; b.style.color = 'var(--text-main)'; b.style.border = '1px solid var(--border-color)';
    });
    [adminTabContentAddTool, adminTabContentAds, adminTabContentJournalCode, adminTabContentNoteSocial].forEach(p => p.style.display = 'none');
    btn.style.background = 'var(--text-main)'; btn.style.color = 'var(--bg-primary)'; btn.style.border = 'none';
    panel.style.display = 'block';
}
tabBtnAddTool.addEventListener('click', () => routeSettingsSubTabs(tabBtnAddTool, adminTabContentAddTool));
tabBtnAds.addEventListener('click', () => routeSettingsSubTabs(tabBtnAds, adminTabContentAds));
tabBtnJournalCode.addEventListener('click', () => routeSettingsSubTabs(tabBtnJournalCode, adminTabContentJournalCode));
tabBtnNoteSocial.addEventListener('click', () => routeSettingsSubTabs(tabBtnNoteSocial, adminTabContentNoteSocial));

// MODAL GATEWAY FUNCTIONS (Enter Button Red Accent Overrides Configured)
navLoginBtn.addEventListener('click', () => {
    gatewayMaskedPasswordField.value = ''; gatewaySubmissionWrapperFrame.innerHTML = '';
    securityAccessGatewayModal.classList.add('active'); gatewayMaskedPasswordField.focus();
});
closeSecurityModalBtn.addEventListener('click', () => securityAccessGatewayModal.classList.remove('active'));

gatewayMaskedPasswordField.addEventListener('input', (e) => {
    if(e.target.value.trim() === currentSecuredGatePasscodeStr) {
        gatewaySubmissionWrapperFrame.innerHTML = `<button class="ruthless-btn" id="executeGatewayActionBtn" style="background:var(--accent-red); color:#fff; box-shadow:0 0 20px rgba(255,51,68,0.5);">Enter</button>`;
        document.getElementById('executeGatewayActionBtn').addEventListener('click', () => {
            securityAccessGatewayModal.classList.remove('active');
            homePageMasterView.style.display = 'none'; adminPageMasterView.style.display = 'block';
        });
    } else { gatewaySubmissionWrapperFrame.innerHTML = ''; }
});
logoutAdminBtn.addEventListener('click', () => { adminPageMasterView.style.display = 'none'; homePageMasterView.style.display = 'block'; });

// TOOLS FORM MANAGEMENT HANDLERS
const adminRegisteredToolsDropdownField = document.getElementById('adminRegisteredToolsDropdownField');
adminRegisteredToolsDropdownField.addEventListener('change', (e) => {
    const data = systemToolsDatabase[e.target.value];
    if(data) {
        document.getElementById('adminToolId').value = data.toolId; document.getElementById('adminToolId').disabled = true;
        document.getElementById('adminToolName').value = data.toolName; document.getElementById('adminToolScope').value = data.scope || 'public';
        document.getElementById('adminToolHtml').value = data.htmlContent || '';
    } else { clearFormBlueprints(); }
});

function clearFormBlueprints() {
    document.getElementById('adminToolId').value = ''; document.getElementById('adminToolId').disabled = false;
    document.getElementById('adminToolName').value = ''; document.getElementById('adminToolHtml').value = '';
}

document.getElementById('submitNewToolBtn').addEventListener('click', async () => {
    const id = document.getElementById('adminToolId').value.trim();
    const name = document.getElementById('adminToolName').value.trim();
    const html = document.getElementById('adminToolHtml').value.trim();
    const scope = document.getElementById('adminToolScope').value;
    if(!id || !name || !html) return alert("Fields incomplete.");
    try {
        await db.collection('tools').doc(id).set({ toolId: id, toolName: name, htmlContent: html, scope: scope, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        alert("Saved."); clearFormBlueprints(); adminRegisteredToolsDropdownField.value = 'none';
    } catch(e) { alert(e.message); }
});

document.getElementById('deleteToolBtn').addEventListener('click', async () => {
    const id = document.getElementById('adminToolId').value.trim(); if(!id || !confirm("Confirm?")) return;
    try { await db.collection('tools').doc(id).delete(); alert("Wiped."); clearFormBlueprints(); adminRegisteredToolsDropdownField.value = 'none'; } catch(e) { alert(e.message); }
});

// ADS CONFIG SELECTION MONITOR RUNTIME
const adminAdContainerSelector = document.getElementById('adminAdContainerSelector');
adminAdContainerSelector.addEventListener('change', (e) => populateFormAdsFieldNode(e.target.value));

function populateFormAdsFieldNode(key) {
    document.getElementById('adConfigDisplayTitle').innerText = "Configuring Slot: " + key.toUpperCase();
    const payload = localizedAdsMemory[key] || {};
    document.getElementById('adTargetWidth').value = payload.width || '100%';
    document.getElementById('adTargetHeight').value = payload.height || '90px';
    document.getElementById('adTargetVisibility').value = payload.visibility || 'visible';
    document.getElementById('adTargetCode').value = payload.code || '';
}

document.getElementById('saveAdsSettingsBtn').addEventListener('click', async () => {
    const key = adminAdContainerSelector.value;
    localizedAdsMemory[key] = {
        code: document.getElementById('adTargetCode').value.trim(),
        width: document.getElementById('adTargetWidth').value.trim() || '100%',
        height: document.getElementById('adTargetHeight').value.trim() || '90px',
        visibility: document.getElementById('adTargetVisibility').value
    };
    const rate = parseInt(document.getElementById('adminAdRefreshIntervalInputField').value.trim() || "10", 10) * 1000;
    localizedAdsMemory["refreshIntervalRate"] = rate;
    try { await db.collection('settings').doc('adsChannels').set(localizedAdsMemory); alert("Saved."); } catch(e) { alert(e.message); }
});

document.getElementById('saveJournalCodeBtn').addEventListener('click', async () => {
    try {
        await db.collection('settings').doc('journalLayout').set({ htmlCode: document.getElementById('journalSystemHtmlCode').value.trim(), visibility: document.getElementById('journalVisibilityState').value });
        alert("Saved.");
    } catch(e) { alert(e.message); }
});

// GRANULAR INDIVIDUAL DISPATCH OPERATIONS
async function mergeBrandingPayload(obj) {
    try { await db.collection('settings').doc('brandingControl').set(obj, { merge: true }); alert("Saved."); } catch(e) { alert(e.message); }
}
document.getElementById('saveNodeTgBtn').addEventListener('click', () => mergeBrandingPayload({ tgUrl: document.getElementById('ctrlTgUrl').value.trim(), tgStatus: document.getElementById('ctrlTgStatus').value }));
document.getElementById('saveNodeInstaBtn').addEventListener('click', () => mergeBrandingPayload({ instaUrl: document.getElementById('ctrlInstaUrl').value.trim(), instaStatus: document.getElementById('ctrlInstaStatus').value }));
document.getElementById('saveNodeYtBtn').addEventListener('click', () => mergeBrandingPayload({ ytUrl: document.getElementById('ctrlYtUrl').value.trim(), ytStatus: document.getElementById('ctrlYtStatus').value }));
document.getElementById('saveNodeWaBtn').addEventListener('click', () => mergeBrandingPayload({ waUrl: document.getElementById('ctrlWaUrl').value.trim(), waStatus: document.getElementById('ctrlWaStatus').value }));
document.getElementById('saveNodeWarningBtn').addEventListener('click', () => mergeBrandingPayload({ warningText: document.getElementById('ctrlWarningText').value.trim(), warningStatus: document.getElementById('ctrlWarningStatus').value }));
document.getElementById('saveNodeFooterBtn').addEventListener('click', () => mergeBrandingPayload({ footerText: document.getElementById('ctrlFooterText').value.trim(), footerStatus: document.getElementById('ctrlFooterStatus').value }));

// FIREBASE ENGINE HOOK MATRIX TRACKING
function connectCoreFirebaseEngine() {
    if(isFirebaseConnected) return;
    try {
        firebaseApp = firebase.initializeApp(firebaseConfig); db = firebase.firestore(); isFirebaseConnected = true;

        // Gate Passcode Reference String Watcher
        db.collection('settings').doc('gatekeeperLock').onSnapshot(doc => { if(doc.exists() && doc.data().passkeyString) currentSecuredGatePasscodeStr = doc.data().passkeyString.toString(); });

        // Branding Controller Snapshots Monitoring
        db.collection('settings').doc('brandingControl').onSnapshot(doc => {
            let tgUrl = "#", tgStatus = "visible", instaUrl = "#", instaStatus = "visible", ytUrl = "#", ytStatus = "visible", waUrl = "#", waStatus = "visible";
            let warningText = "Note: Trading is risky.", warningStatus = "visible";
            let footerText = "© 2026 Binary Ruthless Trader. All Rights Reserved. Privacy Policy | Terms of Service", footerStatus = "visible";

            if(doc.exists()) {
                const b = doc.data();
                if(b.tgUrl !== undefined) tgUrl = b.tgUrl; if(b.tgStatus !== undefined) tgStatus = b.tgStatus;
                if(b.instaUrl !== undefined) instaUrl = b.instaUrl; if(b.instaStatus !== undefined) instaStatus = b.instaStatus;
                if(b.ytUrl !== undefined) ytUrl = b.ytUrl; if(b.ytStatus !== undefined) ytStatus = b.ytStatus;
                if(b.waUrl !== undefined) waUrl = b.waUrl; if(b.waStatus !== undefined) waStatus = b.waStatus;
                if(b.warningText !== undefined) warningText = b.warningText; if(b.warningStatus !== undefined) warningStatus = b.warningStatus;
                if(b.footerText !== undefined) footerText = b.footerText; if(b.footerStatus !== undefined) footerStatus = b.footerStatus;
            }

            // Sync values with Console controls panels elements inputs
            document.getElementById('ctrlTgUrl').value = tgUrl; document.getElementById('ctrlTgStatus').value = tgStatus;
            document.getElementById('ctrlInstaUrl').value = instaUrl; document.getElementById('ctrlInstaStatus').value = instaStatus;
            document.getElementById('ctrlYtUrl').value = ytUrl; document.getElementById('ctrlYtStatus').value = ytStatus;
            document.getElementById('ctrlWaUrl').value = waUrl; document.getElementById('ctrlWaStatus').value = waStatus;
            document.getElementById('ctrlWarningText').value = warningText; document.getElementById('ctrlWarningStatus').value = warningStatus;
            document.getElementById('ctrlFooterText').value = footerText; document.getElementById('ctrlFooterStatus').value = footerStatus;

            // Multi-platform deployment synchronization routines
            let links = "";
            if(tgStatus === 'visible') links += `<a href="${tgUrl}" target="_blank" class="social-icon-btn"><i class="fab fa-telegram"></i></a>`;
            if(instaStatus === 'visible') links += `<a href="${instaUrl}" target="_blank" class="social-icon-btn"><i class="fab fa-instagram"></i></a>`;
            if(ytStatus === 'visible') links += `<a href="${ytUrl}" target="_blank" class="social-icon-btn"><i class="fab fa-youtube"></i></a>`;
            if(waStatus === 'visible') links += `<a href="${waUrl}" target="_blank" class="social-icon-btn"><i class="fab fa-whatsapp"></i></a>`;
            document.getElementById('publicSocialHeaderRackContainer').innerHTML = links;

            const wBox = document.getElementById('publicRuntimeWarningBannerDisplay');
            if(warningStatus === 'visible' && warningText) { wBox.innerText = warningText; wBox.style.display = 'block'; } else { wBox.style.display = 'none'; }

            const fBox = document.getElementById('publicFooterLegalTextDisplayBlock');
            if(footerStatus === 'visible') { fBox.innerText = footerText; fBox.style.display = 'block'; } else { fBox.style.display = 'none'; }
        });

        // Dynamic Realtime Tools Processing Loops
        db.collection('tools').orderBy('timestamp', 'asc').onSnapshot(snap => {
            systemToolsDatabase = {}; publicToolSelector.innerHTML = '';
            privateToolSelector.innerHTML = '<option value="none">-- SELECT TERMINAL TOOL --</option>';
            adminRegisteredToolsDropdownField.innerHTML = '<option value="none">-- CREATE NEW STRUCTURE --</option>';

            let publicCounter = 0;
            snap.forEach(doc => {
                const d = doc.data(); systemToolsDatabase[doc.id] = d;
                const opt = document.createElement('option'); opt.value = doc.id; opt.textContent = d.toolName;
                
                if(d.scope === 'public') { publicToolSelector.appendChild(opt); publicCounter++; }
                else if(d.scope === 'private') { privateToolSelector.appendChild(opt); }
                else if(d.scope === 'both') { publicToolSelector.appendChild(opt.cloneNode(true)); privateToolSelector.appendChild(opt); publicCounter++; }

                const edOpt = document.createElement('option'); edOpt.value = doc.id; edOpt.textContent = `${d.toolName} (${doc.id})`;
                adminRegisteredToolsDropdownField.appendChild(edOpt);
            });

            if(publicCounter > 0) { publicToolSelector.style.display = 'block'; renderActiveWorkspaceEngine(publicToolSelector.value, publicWorkspaceEngine); }
            else { publicToolSelector.style.display = 'none'; publicWorkspaceEngine.innerHTML = ''; }
        });

        // Custom Journal Snapshot Interface Sync
        db.collection('settings').doc('journalLayout').onSnapshot(doc => {
            if(doc.exists()) {
                const l = doc.data(); document.getElementById('journalSystemHtmlCode').value = l.htmlCode || '';
                document.getElementById('journalVisibilityState').value = l.visibility || 'visible';
                if(l.htmlCode && l.visibility === 'visible') {
                    adminJournalCustomWorkspace.innerHTML = l.htmlCode;
                    const scr = adminJournalCustomWorkspace.getElementsByTagName('script'); for(let s of scr) { eval(s.text); }
                } else { adminJournalCustomWorkspace.innerHTML = ''; }
            }
        });

        // Custom Adaptive Ads Realtime Distribution Channels Mapping
        db.collection('settings').doc('adsChannels').onSnapshot(doc => {
            if(doc.exists()) {
                const a = doc.data(); localizedAdsMemory = { top1: a.top1 || {}, top2: a.top2 || {}, bot1: a.bot1 || {}, bot2: a.bot2 || {} };
                if(a.refreshIntervalRate) {
                    globalRefreshIntervalTime = parseInt(a.refreshIntervalRate, 10);
                    document.getElementById('adminAdRefreshIntervalInputField').value = (globalRefreshIntervalTime / 1000).toString();
                }
                populateFormAdsFieldNode(adminAdContainerSelector.value);
                if(lastAdRefreshTimestamp === 0) renderDynamicAdsStructure();
            }
        });

    } catch(e) { console.error("Initialization Interrupted: ", e); }
}

function renderDynamicAdsStructure() {
    deployTargetAdFrame('homeTopAdSlot1', localizedAdsMemory.top1);
    deployTargetAdFrame('homeTopAdSlot2', localizedAdsMemory.top2);
    deployTargetAdFrame('homeBottomAdSlot1', localizedAdsMemory.bot1);
    deployTargetAdFrame('homeBottomAdSlot2', localizedAdsMemory.bot2);
    lastAdRefreshTimestamp = Date.now();
}

function verifyActionTriggeredRotationEvent() {
    if(homePageMasterView.style.display === 'none') return;
    if(Date.now() - lastAdRefreshTimestamp >= globalRefreshIntervalTime) renderDynamicAdsStructure();
}
window.addEventListener('scroll', verifyActionTriggeredRotationEvent, { passive: true });
window.addEventListener('click', verifyActionTriggeredRotationEvent, { passive: true });

function deployTargetAdFrame(id, node) {
    const el = document.getElementById(id); if(!el || !node) return;
    if(node.visibility === 'visible' && node.code) {
        el.style.width = node.width.includes('%') || node.width.includes('px') ? node.width : node.width + 'px';
        el.style.height = node.height.includes('px') ? node.height : node.height + 'px';
        el.style.display = 'flex'; el.innerHTML = node.code;
        const scr = el.getElementsByTagName('script'); for(let s of scr) { eval(s.text); }
    } else { el.style.display = 'none'; el.innerHTML = ''; }
}

function renderActiveWorkspaceEngine(id, targetElement) {
    if(!id || id === 'none') { targetElement.innerHTML = ''; return; }
    const entry = systemToolsDatabase[id];
    if(entry && entry.htmlContent) {
        targetElement.innerHTML = entry.htmlContent;
        const scr = targetElement.getElementsByTagName('script'); for(let s of scr) { eval(s.text); }
    } else { targetElement.innerHTML = ''; }
}

publicToolSelector.addEventListener('change', (e) => renderActiveWorkspaceEngine(e.target.value, publicWorkspaceEngine));
privateToolSelector.addEventListener('change', (e) => renderActiveWorkspaceEngine(e.target.value, privateWorkspaceEngine));

window.addEventListener('DOMContentLoaded', connectCoreFirebaseEngine);
</script>
