<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Binary Ruthless Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            height: 100vh; height: 100dvh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: stretch;
            padding: 0; margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #150505 0%, #000 85%);
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        }
        
        /* DYNAMIC APP CONTAINER - FULL HEIGHT, NO TOP GAP */
        #app { 
            width: 100%; height: 100vh; height: 100dvh; max-width: 100%;
            background: #000; border: 2px solid #ff0033; border-radius: 0px; 
            padding: clamp(8px, 1.5vh, 16px) 12px clamp(8px, 1.5vh, 16px) 12px; 
            box-shadow: 0 0 40px rgba(255,0,51,0.18); 
            display: flex; flex-direction: column; justify-content: space-between;
            gap: 1.2vh; z-index: 1; position: relative; overflow: hidden;
        }

        /* OVERLAY */
        #moduleOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; max-width: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column;
            padding: 0; margin: 0; overflow: hidden;
        }
        #moduleOverlay.active { display: flex; }

        .overlay-header {
            display: flex; justify-content: flex-end; align-items: center; 
            width: 100%; padding: 8px 12px; flex-shrink: 0; 
            position: absolute; top: 0; right: 0; z-index: 10001;
            pointer-events: none;
        }

        .close-btn {
            background: #ff0033; color: #fff; border: none; font-size: 20px; font-weight: 900;
            width: 38px; height: 38px; border-radius: 50%; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 25px rgba(255,0,51,0.9); transition: transform 0.2s, box-shadow 0.2s;
            font-family: Arial, sans-serif; flex-shrink: 0;
            pointer-events: auto;
        }
        .close-btn:hover { transform: scale(1.15); background: #ff1a47; box-shadow: 0 0 40px rgba(255,0,51,1); }
        .close-btn:active { transform: scale(0.9); }

        .overlay-body { 
            flex: 1; width: 100%; height: 100%; overflow: hidden;
            background: transparent; border: none; border-radius: 0; padding: 0; margin: 0; position: relative;
        }

        #moduleFrame { width: 100%; height: 100%; border: none; background: transparent; display: block; }

        .top-bar { display: flex; align-items: center; justify-content: flex-start; width: 100%; flex-shrink: 0; }
        
        /* RED SETTINGS ICON */
        .btn-settings { 
            background: rgba(255,0,51,0.2); border: 2px solid #ff0033; 
            color: #ff0033; font-size: 20px; cursor: pointer; padding: 0; border-radius: 10px;
            transition: all 0.3s ease; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255,0,51,0.4); flex-shrink: 0; z-index: 10;
        }
        .btn-settings:hover { background: #ff0033; color: #fff; box-shadow: 0 0 35px rgba(255,0,51,0.9); transform: scale(1.1); }
        .btn-settings:active { transform: scale(0.95); }

        /* BRAND HEADER & LOGO */
        .brand-header { 
            display: flex; flex-direction: column; align-items: center; width: 100%; 
            max-width: 100%; flex-shrink: 0; overflow: hidden;
        }

        .logo-symbol { 
            font-size: clamp(38px, 7vh, 75px); 
            color: #ff0033; text-shadow: 0 0 45px rgba(255,0,51,0.9); line-height: 1; 
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }
        .logo-symbol img { max-height: 75px; width: auto; filter: drop-shadow(0 0 35px rgba(255,0,51,0.8)); }

        /* SINGLE LINE BRAND NAME */
        .brand-single-line { 
            font-size: clamp(9px, 3.3vw, 22px); 
            font-weight: 900; letter-spacing: 1px; text-transform: uppercase; 
            text-shadow: 0 0 20px rgba(255,0,51,0.5); text-align: center; 
            width: 100%; max-width: 100%; white-space: nowrap; overflow: hidden;
            display: flex; justify-content: center; align-items: center; gap: 5px;
            margin-top: 2px; transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .brand-single-line .binary { color: #fff; } 
        .brand-single-line .ruthless { color: #ff0033; text-shadow: 0 0 15px #ff0033; } 
        .brand-single-line .trader { color: #fff; }

        /* SESSION BADGE */
        .session-badge { 
            display: block; margin: 0 auto; width: fit-content; padding: 4px 14px; font-size: 10px; font-weight: 700; 
            color: #fff; letter-spacing: 2px; background: rgba(255, 0, 51, 0.12); border: 1px solid rgba(255, 0, 51, 0.3); 
            border-radius: 8px; flex-shrink: 0;
        }

        /* EXTRA BOLDER & LARGER TIMER CONTAINER */
        .timer-box {
            font-family: 'Roboto Mono', monospace; 
            font-size: clamp(32px, 10vw, 65px); 
            font-weight: 900;
            color: #ffffff !important; 
            text-align: center; 
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.9), 0 0 50px rgba(255, 0, 51, 0.8);
            background: rgba(10, 10, 10, 0.85); 
            border: 2px solid rgba(255, 0, 51, 0.6); 
            border-radius: 14px;
            padding: clamp(6px, 1.2vh, 14px) 0; 
            width: 100%; max-width: 100%;
            flex-shrink: 0; 
            letter-spacing: 3px;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
            overflow: hidden;
            box-sizing: border-box;
            box-shadow: 0 0 25px rgba(255,0,51,0.25);
        }

        /* BUTTONS CONTAINER UTILIZING SCREEN HEIGHT */
        .buttons-grid { 
            display: flex; flex-direction: column; 
            gap: clamp(10px, 2vh, 18px); 
            width: 100%; padding: 4px 0; 
            flex: 1; overflow-y: auto; justify-content: center; 
        }

        /* BUTTONS */
        .module-btn {
            background: rgba(10,10,10,0.92); border: 1px solid rgba(255,0,51,0.4); border-radius: 14px;
            color: #fff; padding: 14px; text-align: center; font-family: 'Orbitron', sans-serif; 
            font-size: clamp(12px, 3.8vw, 17px); 
            font-weight: 900; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; 
            box-shadow: 0 0 18px rgba(0,0,0,0.8); transition: all 0.25s; display: flex; flex-direction: row;
            align-items: center; justify-content: center; gap: 10px; width: 100%; 
            min-height: clamp(50px, 8vh, 65px); flex-shrink: 0;
        }
        .module-btn:hover { border-color: #ff0033; background: rgba(255,0,51,0.22); box-shadow: 0 0 35px rgba(255,0,51,0.8); transform: scale(1.02); }
        .module-btn:active { transform: scale(0.97); }

        /* BOTTOM CONNECTION STATUS */
        .connection-status-bar { 
            display: flex; justify-content: center; align-items: center; 
            background: transparent; border: none; 
            padding: 2px; flex-shrink: 0; min-height: 18px; 
        }
        .dot { 
            width: 12px; height: 12px; border-radius: 50%; 
            background: #222; transition: all 0.3s ease;
        }
        .dot.connected { 
            background: #00ff66; 
            box-shadow: 0 0 20px #00ff66, 0 0 35px #00ff66; 
        }

        /* POPUP STYLES */
        #passwordOverlay, #settingsOverlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background: rgba(0, 0, 0, 0.90); backdrop-filter: blur(8px); 
            display: none; justify-content: center; align-items: center; z-index: 20000; padding: 12px; 
        }
        #passwordOverlay.active, #settingsOverlay.active { display: flex; }
        
        .ruthless-modal {
            background: #080808; border: 2px solid #ff0033; border-radius: 14px;
            padding: 24px; width: 100%; max-width: 380px;
            box-shadow: 0 0 40px rgba(255, 0, 51, 0.5); position: relative;
            display: flex; flex-direction: column; gap: 16px;
        }

        .ruthless-modal-title {
            color: #ff0033; font-size: 14px; font-weight: 900; letter-spacing: 2px;
            text-align: center; text-shadow: 0 0 15px rgba(255, 0, 51, 0.8);
            text-transform: uppercase;
        }

        .ruthless-input {
            width: 100%; padding: 12px; background: #021a14; border: 1px solid #005544;
            border-radius: 8px; color: #00ffcc !important; font-family: 'Roboto Mono', monospace !important;
            font-size: 18px; font-weight: 700 !important; text-align: center; outline: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8); letter-spacing: 3px;
            transition: all 0.3s ease;
        }
        .ruthless-input:focus { box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); border-color: #00ffcc; }

        .settings-panel { 
            background: #0a0a0a; border: 2px solid #ff0033; border-radius: 18px; 
            padding: 16px; width: 100%; max-width: 580px; max-height: 92vh; overflow-y: auto; 
            box-shadow: 0 0 50px rgba(255,0,51,0.25); position: relative;
        }
        .setting-group { margin-bottom: 10px; border: 1px solid #222; border-radius: 12px; padding: 10px; background: rgba(255,255,255,0.02); }
        .setting-group label { display: block; font-size: 9px; color: #ff0033; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        
        .setting-group input, .setting-group textarea, .firebase-field input { 
            width: 100%; padding: 8px; background: #000; border: 1px solid #333; 
            border-radius: 8px; color: #00ffcc !important; font-family: 'Roboto Mono', monospace !important; 
            font-size: 11px; font-weight: bold !important; outline: none; margin-bottom: 4px;
        }

        .save-btn { 
            width: 100%; padding: 12px 0; background: #ff0033; color: #fff; 
            border: none; border-radius: 8px; font-weight: 900; cursor: pointer; 
            font-family: 'Orbitron', sans-serif; font-size: 11px; text-transform: uppercase; transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.4); letter-spacing: 1px;
        }
        .save-btn:hover:not(:disabled) { background: #ff1a47; box-shadow: 0 0 25px rgba(255,0,51,0.8); transform: scale(1.01); }
        .save-btn:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; border: 1px solid #333; }

        .manage-btn-item {
            display: flex; justify-content: space-between; align-items: center; 
            background: #000; padding: 8px 10px; border-radius: 8px; border: 1px solid #222; margin-bottom: 4px; cursor: pointer;
        }
        .btn-edit-form { background: #0d0d0d; border: 1px solid #ff0033; border-radius: 10px; padding: 10px; margin-top: 6px; display: none; }
        .btn-edit-form.active { display: block; }
        .btn-mini { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; font-size: 9px; font-family: 'Orbitron', sans-serif; }
        .btn-hide { background: #ffaa00; color: #000; }
        .btn-enable { background: #00ff66; color: #000; }
        .btn-del { background: #ff0033; color: #fff; }
        .btn-save-small { background: #00aaff; color: #000; }
        
        .firebase-field { display: flex; gap: 6px; align-items: center; margin-bottom: 3px; }
        .firebase-field label { font-size: 8px; color: #ff0033; min-width: 80px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- MAIN APP PAGE -->
    <div id="app" onclick="triggerZoomEffect(event)">
        <div class="top-bar">
            <button class="btn-settings" id="btnSettings" onclick="openPasswordModal()">⚙️</button>
        </div>
        
        <!-- BRAND HEADER WITH AUTO-ADJUSTING SINGLE LINE BRAND NAME -->
        <div class="brand-header" id="brandHeader">
            <span class="logo-symbol" id="appLogoSymbol">◆</span>
            <div class="brand-single-line" id="brandText">
                <span class="binary">BINARY</span>
                <span class="ruthless">RUTHLESS</span>
                <span class="trader">TRADER</span>
            </div>
        </div>
        
        <!-- SESSION NAME -->
        <div class="session-badge">⚡ LONDON SESSION ⚡</div>
        
        <!-- LARGE BOLDER TIMER -->
        <div class="timer-box" id="liveTimer">00:00:00</div>

        <!-- BUTTONS GRID -->
        <div class="buttons-grid" id="buttonsGridContainer"></div>

        <!-- CLEAN CONNECTION BAR -->
        <div class="connection-status-bar">
            <span class="dot" id="connDot"></span>
        </div>
    </div>

    <!-- MODULE OVERLAY -->
    <div id="moduleOverlay">
        <div class="overlay-header">
            <button class="close-btn" onclick="closeModuleView()">✕</button>
        </div>
        <div class="overlay-body">
            <iframe id="moduleFrame"></iframe>
        </div>
    </div>

    <!-- RUTHLESS PASSWORD OVERLAY -->
    <div id="passwordOverlay">
        <div class="ruthless-modal">
            <button class="close-btn" style="position:absolute; right:12px; top:12px; width:28px; height:28px; font-size:12px;" onclick="closePasswordModal()">✕</button>
            <div class="ruthless-modal-title">🔐 AUTHENTICATION</div>
            <input type="password" id="passwordInput" class="ruthless-input" placeholder="ENTER ACCESS CODE" autofocus />
            <button class="save-btn" id="submitPasswordBtn" disabled>VERIFY & ACCESS</button>
        </div>
    </div>

    <!-- SETTINGS CONTROL CENTER -->
    <div id="settingsOverlay">
        <div class="settings-panel">
            <button class="close-btn" style="position:absolute; right:14px; top:14px; width:30px; height:30px; font-size:14px;" onclick="closeSettingsModal()">✕</button>
            <h2 style="color:#ff0033; text-align:center; font-size:13px; margin-bottom:12px;">⚙️ CONTROL CENTER</h2>

            <!-- MANAGE BUTTONS -->
            <div class="setting-group">
                <label>📋 MANAGE BUTTONS (EDIT / HIDE / DELETE)</label>
                <div id="manageButtonsList"></div>
                <div class="btn-edit-form" id="btnEditForm">
                    <input type="text" id="editTabId" placeholder="Button ID" />
                    <input type="text" id="editTabName" placeholder="Button Label" />
                    <textarea id="editTabHtml" rows="6" placeholder="Paste Full HTML Code here..."></textarea>
                    <div style="display:flex; gap:6px; margin-top:6px;">
                        <button class="btn-mini btn-enable" id="editToggleStatus" onclick="editToggleStatus()">ENABLE</button>
                        <button class="btn-mini btn-del" onclick="editDeleteButton()">DELETE</button>
                        <button class="btn-mini btn-save-small" onclick="editSaveButton()">💾 SAVE</button>
                        <button class="btn-mini" style="background:#444; color:#fff;" onclick="closeEditForm()">✕ CANCEL</button>
                    </div>
                </div>
            </div>

            <!-- ADD NEW BUTTON -->
            <div class="setting-group" style="border-color:#ff0033;">
                <label>➕ ADD NEW BUTTON</label>
                <input type="text" id="newTabId" placeholder="Button ID (e.g. signals)" />
                <input type="text" id="newTabName" placeholder="Button Label (e.g. Signals)" />
                <textarea id="newTabHtml" rows="6" placeholder="Paste Full HTML Code here..."></textarea>
                <button class="save-btn" onclick="addButtonModule()">💾 ADD & SAVE</button>
            </div>

            <!-- UPDATE LOGO -->
            <div class="setting-group">
                <label>🖼️ UPDATE LOGO (PNG IMAGE OR SYMBOL)</label>
                <input type="text" id="logoInput" placeholder="Symbol e.g. ◆ or ⚡" value="◆" />
                <input type="file" id="logoFileInput" accept="image/*" style="color:#fff;" />
                <button class="save-btn" onclick="updateLogoSymbol()">💾 SAVE LOGO</button>
            </div>

            <!-- FIREBASE CONFIG -->
            <div class="setting-group">
                <label>🔥 FIREBASE CONFIGURATION</label>
                <div class="firebase-field"><label>apiKey</label><input type="text" id="fb_apiKey" /></div>
                <div class="firebase-field"><label>authDomain</label><input type="text" id="fb_authDomain" /></div>
                <div class="firebase-field"><label>databaseURL</label><input type="text" id="fb_databaseURL" /></div>
                <div class="firebase-field"><label>projectId</label><input type="text" id="fb_projectId" /></div>
                <div class="firebase-field"><label>storageBucket</label><input type="text" id="fb_storageBucket" /></div>
                <div class="firebase-field"><label>messagingSenderId</label><input type="text" id="fb_messagingSenderId" /></div>
                <div class="firebase-field"><label>appId</label><input type="text" id="fb_appId" /></div>
                <button class="save-btn" style="background:#00ffcc; color:#000; margin-top:6px;" onclick="saveFirebaseConfigFields()">💾 SAVE & CONNECT FIREBASE</button>
            </div>

            <!-- CHANGE PASSWORD -->
            <div class="setting-group">
                <label>🔑 CHANGE PASSWORD</label>
                <input type="password" id="newPasswordInput" placeholder="New Password" />
                <button class="save-btn" onclick="changePassword()">💾 UPDATE PASSWORD</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_FIREBASE_CONFIG = {
            apiKey: "AIzaSyA2ILDlxtYs2CT-2mJItRV1NApSIaH4t3g",
            authDomain: "binary-ruthless-trader-26654.firebaseapp.com",
            databaseURL: "https://binary-ruthless-trader-26654-default-rtdb.firebaseio.com",
            projectId: "binary-ruthless-trader-26654",
            storageBucket: "binary-ruthless-trader-26654.firebasestorage.app",
            messagingSenderId: "533209261799",
            appId: "1:533209261799:web:a398ab21b0f913683ea442"
        };

        let appConfig = {
            password: "12345",
            logoSymbol: "◆",
            logoType: "text",
            logoImageData: "",
            firebaseConfig: DEFAULT_FIREBASE_CONFIG,
            tabs: [
                {
                    id: "signals",
                    name: "Signals System",
                    enabled: true,
                    html: `<!DOCTYPE html>
<html>
<head>
<style>
  body { background:#000; color:#fff; font-family:sans-serif; text-align:center; padding:20px; margin:0; }
  .profit-number { font-size:32px; color:#00ff66; font-weight:bold; }
  .loss-number { font-size:32px; color:#ff0033; font-weight:bold; }
</style>
</head>
<body>
  <h2>📡 AI SIGNALS SYSTEM</h2>
  <br>
  <div>PROFIT TARGET</div>
  <div class="profit-number">+$450</div>
  <br>
  <div>STOP LOSS</div>
  <div class="loss-number">-$120</div>
</body>
</html>`
                }
            ]
        };

        let dbRef = null;
        let isFirebaseConnected = false;
        let editingTabId = null;

        window.onload = () => {
            loadLocalBackup();
            initFirebaseConnection();
            renderAppUI();
            setupPasswordListener();
            populateFirebaseFields();
            startIndianRailwayTimer();
        };

        /* LOGO & BRAND ZOOM EFFECT ON CLICK */
        function triggerZoomEffect(e) {
            if(e.target.closest('#settingsOverlay') || e.target.closest('#passwordOverlay') || e.target.closest('.module-btn') || e.target.closest('.btn-settings')) return;
            
            const logo = document.getElementById('appLogoSymbol');
            const brandText = document.getElementById('brandText');
            
            logo.style.transform = 'scale(1.2)';
            brandText.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                logo.style.transform = 'scale(1)';
                brandText.style.transform = 'scale(1)';
            }, 300);
        }

        /* LIVE INDIAN RAILWAY TIME (24-HOUR FORMAT) */
        function startIndianRailwayTimer() {
            function updateClock() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('liveTimer').innerText = `${hours}:${minutes}:${seconds}`;
            }
            updateClock();
            setInterval(updateClock, 1000);
        }

        function renderAppUI() {
            try {
                const logoEl = document.getElementById('appLogoSymbol');
                if(appConfig.logoType === 'image' && appConfig.logoImageData) {
                    logoEl.innerHTML = `<img src="${appConfig.logoImageData}" alt="Logo" />`;
                } else {
                    logoEl.innerHTML = appConfig.logoSymbol || '◆';
                }

                const btnContainer = document.getElementById('buttonsGridContainer');
                const manageList = document.getElementById('manageButtonsList');
                btnContainer.innerHTML = '';
                manageList.innerHTML = '';

                appConfig.tabs.forEach((tab) => {
                    if(tab.enabled) {
                        const btn = document.createElement('div');
                        btn.className = 'module-btn';
                        btn.innerHTML = `<span>⚡</span><span>${tab.name}</span>`;
                        btn.onclick = () => openModuleView(tab.html);
                        btnContainer.appendChild(btn);
                    }

                    const row = document.createElement('div');
                    row.className = 'manage-btn-item';
                    row.innerHTML = `
                        <span style="color:#00ffcc; font-size:10px; font-weight:bold;">${tab.name} (${tab.id})</span>
                        <span style="font-size:8px; color:${tab.enabled ? '#00ff66' : '#ffaa00'}">${tab.enabled ? 'ENABLED' : 'HIDDEN'}</span>
                    `;
                    row.onclick = () => openEditForm(tab.id);
                    manageList.appendChild(row);
                });
            } catch(e) { console.error('UI Render Error:', e); }
        }

        function openModuleView(contentHtml) {
            const overlay = document.getElementById('moduleOverlay');
            const frame = document.getElementById('moduleFrame');
            overlay.classList.add('active');
            frame.srcdoc = contentHtml;
        }

        function closeModuleView() {
            document.getElementById('moduleOverlay').classList.remove('active');
            document.getElementById('moduleFrame').srcdoc = ""; 
        }

        function openEditForm(id) {
            const tab = appConfig.tabs.find(t => t.id === id);
            if(!tab) return;
            editingTabId = id;
            document.getElementById('btnEditForm').classList.add('active');
            document.getElementById('editTabId').value = tab.id;
            document.getElementById('editTabName').value = tab.name;
            document.getElementById('editTabHtml').value = tab.html;
            
            const statusBtn = document.getElementById('editToggleStatus');
            statusBtn.textContent = tab.enabled ? 'HIDE' : 'ENABLE';
            statusBtn.className = `btn-mini ${tab.enabled ? 'btn-hide' : 'btn-enable'}`;
        }

        function closeEditForm() {
            document.getElementById('btnEditForm').classList.remove('active');
            editingTabId = null;
        }

        function editToggleStatus() {
            if(!editingTabId) return;
            const tab = appConfig.tabs.find(t => t.id === editingTabId);
            if(tab) {
                tab.enabled = !tab.enabled;
                saveAndSyncConfig();
                openEditForm(editingTabId);
            }
        }

        function editSaveButton() {
            if(!editingTabId) return;
            const id = document.getElementById('editTabId').value.trim().toLowerCase();
            const name = document.getElementById('editTabName').value.trim();
            const html = document.getElementById('editTabHtml').value;
            
            const idx = appConfig.tabs.findIndex(t => t.id === editingTabId);
            if(idx !== -1) {
                appConfig.tabs[idx] = { ...appConfig.tabs[idx], id, name, html };
                saveAndSyncConfig();
                closeEditForm();
                alert('✅ Code Saved Successfully!');
            }
        }

        function editDeleteButton() {
            if(!editingTabId) return;
            appConfig.tabs = appConfig.tabs.filter(t => t.id !== editingTabId);
            saveAndSyncConfig();
            closeEditForm();
        }

        function addButtonModule() {
            const id = document.getElementById('newTabId').value.trim().toLowerCase();
            const name = document.getElementById('newTabName').value.trim();
            const html = document.getElementById('newTabHtml').value;

            if(!id || !name) return alert('Enter ID and Label!');
            appConfig.tabs.push({ id, name, html, enabled: true });
            saveAndSyncConfig();
            document.getElementById('newTabId').value = '';
            document.getElementById('newTabName').value = '';
            document.getElementById('newTabHtml').value = '';
            alert('✅ New Button Added!');
        }

        function openPasswordModal() {
            const input = document.getElementById('passwordInput');
            input.value = '';
            document.getElementById('submitPasswordBtn').disabled = true;
            document.getElementById('passwordOverlay').classList.add('active');
            setTimeout(() => input.focus(), 100);
        }

        function closePasswordModal() {
            document.getElementById('passwordOverlay').classList.remove('active');
        }

        function setupPasswordListener() {
            const input = document.getElementById('passwordInput');
            const btn = document.getElementById('submitPasswordBtn');
            
            const checkPassword = () => {
                const correctPass = appConfig.password || '12345';
                btn.disabled = (input.value !== correctPass);
            };

            input.oninput = checkPassword;
            input.onkeyup = (e) => {
                if(e.key === 'Enter' && !btn.disabled) {
                    btn.click();
                }
            };

            btn.onclick = () => {
                closePasswordModal();
                populateFirebaseFields();
                document.getElementById('settingsOverlay').classList.add('active');
            };
        }

        function closeSettingsModal() {
            document.getElementById('settingsOverlay').classList.remove('active');
            closeEditForm();
        }

        function changePassword() {
            const p = document.getElementById('newPasswordInput').value.trim();
            if(p.length < 4) return alert('Password minimum 4 chars!');
            appConfig.password = p;
            saveAndSyncConfig();
            document.getElementById('newPasswordInput').value = '';
            alert('✅ Password Changed!');
        }

        function initFirebaseConnection() {
            try {
                const config = appConfig.firebaseConfig || DEFAULT_FIREBASE_CONFIG;
                if(firebase.apps.length) firebase.apps.forEach(a => a.delete());
                firebase.initializeApp(config);
                
                dbRef = firebase.database().ref('ruthless_app_data');

                firebase.database().ref('.info/connected').on('value', (snap) => {
                    isFirebaseConnected = (snap.val() === true);
                    setConnectionState(isFirebaseConnected);
                });

                dbRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if(data && data.tabs) {
                        appConfig = { ...appConfig, ...data };
                        saveLocalBackup();
                        renderAppUI();
                    }
                });
            } catch(e) {
                setConnectionState(false);
            }
        }

        function setConnectionState(connected) {
            const dot = document.getElementById('connDot');
            if(connected) {
                dot.className = 'dot connected';
            } else {
                dot.className = 'dot';
            }
        }

        function populateFirebaseFields() {
            const cfg = appConfig.firebaseConfig || DEFAULT_FIREBASE_CONFIG;
            document.getElementById('fb_apiKey').value = cfg.apiKey || '';
            document.getElementById('fb_authDomain').value = cfg.authDomain || '';
            document.getElementById('fb_databaseURL').value = cfg.databaseURL || '';
            document.getElementById('fb_projectId').value = cfg.projectId || '';
            document.getElementById('fb_storageBucket').value = cfg.storageBucket || '';
            document.getElementById('fb_messagingSenderId').value = cfg.messagingSenderId || '';
            document.getElementById('fb_appId').value = cfg.appId || '';
        }

        function saveFirebaseConfigFields() {
            const cfg = {
                apiKey: document.getElementById('fb_apiKey').value.trim(),
                authDomain: document.getElementById('fb_authDomain').value.trim(),
                databaseURL: document.getElementById('fb_databaseURL').value.trim(),
                projectId: document.getElementById('fb_projectId').value.trim(),
                storageBucket: document.getElementById('fb_storageBucket').value.trim(),
                messagingSenderId: document.getElementById('fb_messagingSenderId').value.trim(),
                appId: document.getElementById('fb_appId').value.trim()
            };
            appConfig.firebaseConfig = cfg;
            saveAndSyncConfig();
            initFirebaseConnection();
            alert('🔥 Firebase Config Saved and Connected!');
        }

        function updateLogoSymbol() {
            const symbol = document.getElementById('logoInput').value.trim();
            const file = document.getElementById('logoFileInput').files[0];

            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    appConfig.logoType = 'image';
                    appConfig.logoImageData = e.target.result;
                    saveAndSyncConfig();
                    alert('✅ Logo Image Updated!');
                };
                reader.readAsDataURL(file);
            } else if(symbol) {
                appConfig.logoType = 'text';
                appConfig.logoSymbol = symbol;
                appConfig.logoImageData = '';
                saveAndSyncConfig();
                alert('✅ Logo Symbol Updated!');
            }
        }

        function saveAndSyncConfig() {
            saveLocalBackup();
            renderAppUI();
            if(dbRef && isFirebaseConnected) {
                dbRef.set(appConfig).catch(e => console.error("Firebase write fail:", e));
            }
        }

        function saveLocalBackup() {
            localStorage.setItem('ruthless_config_backup', JSON.stringify(appConfig));
        }

        function loadLocalBackup() {
            const saved = localStorage.getItem('ruthless_config_backup');
            if(saved) {
                try { appConfig = JSON.parse(saved); } catch(e){}
            }
        }

        setInterval(() => {
            if(!isFirebaseConnected && firebase.apps.length) {
                firebase.database().goOnline();
            }
        }, 5000);
    </script>
</body>
</html>
