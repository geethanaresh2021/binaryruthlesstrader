<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Binary Ruthless Trader</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase Legacy SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-primary: #000000;
            --bg-card: rgba(15, 15, 20, 0.6);
            --accent-red: #ff0000;
            --accent-green: #00ffcc;
            --text-main: #ffffff;
            --text-muted: #a0a5b0;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1a0203 0%, #000000 70%);
        }

        /* FIXED LAYOUT MANAGEMENT (Tablet & Desktop scales locked, zoom disabled) */
        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 16px;
            flex: 1 0 auto;
        }

        /* HEADER ARCHITECTURE - MOBILE SINGLE LINE OPTIMIZED */
        .ruthless-navbar {
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .nav-brand h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 19px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .nav-brand h1 span {
            color: var(--accent-red);
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        /* Action Bar for Socials and Login Button on the Same Line */
        .action-bar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 440px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .social-icons-rack {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .social-icon-btn {
            color: var(--accent-red);
            font-size: 20px;
            text-decoration: none;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
            transition: transform 0.2s;
        }

        .social-icon-btn:hover {
            transform: scale(1.15);
        }

        .nav-login-btn {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 12px;
            color: #ffffff;
            background: var(--accent-red);
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        /* DESKTOP/TABLET RESPONSIBILITIES AUTO-ADAPTATION */
        @media(min-width: 768px) {
            .ruthless-navbar {
                flex-direction: row;
                justify-content: space-between;
                padding: 16px 32px;
            }
            .nav-brand h1 {
                font-size: 24px;
            }
            .action-bar-row {
                width: auto;
                gap: 24px;
                background: transparent;
                border: none;
            }
        }

        /* DEFAULT RISK NOTE (WHITE TEXT) */
        .risk-warning-banner {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin: 16px auto;
            text-align: center;
            color: #ffffff;
            font-size: 12px;
            font-weight: 600;
            max-width: 1000px;
        }

        /* ADS CONTAINER (ONE BELOW ANOTHER LAYER) */
        .ads-vertical-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin: 12px 0;
        }

        .ad-slot-frame {
            background: rgba(10, 10, 12, 0.4);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0 auto;
            width: 100%;
        }

        /* ADAPTIVE WORKSPACE CONTAINER */
        .tool-workspace-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
            width: 100%;
        }

        /* TINY SELECTION FIELD CONTAINER */
        .tools-selection-container {
            max-width: 260px;
            margin: 0 auto 24px auto;
            text-align: center;
        }

        .tools-selection-container label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 6px;
        }

        /* CORE COMPONENT GLOBAL STANDARDS */
        input, select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #000000;
            outline: none;
            color: var(--accent-green) !important;
            font-family: 'Roboto Mono', monospace !important;
            font-weight: bold !important;
            font-size: 14px;
        }

        /* NEON GLOW METRICS (P&L AND STOP LOSS 32PX VALUES) */
        .ruthless-metric-glow {
            font-family: 'Roboto Mono', monospace;
            font-size: 32px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 0 30px rgba(255, 0, 0, 0.4);
            text-align: center;
        }

        .ruthless-metric-glow.profit {
            color: var(--accent-green);
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.8), 0 0 30px rgba(0, 255, 204, 0.4);
        }

        /* FOOTER SCREEN BOTTOM PLACEMENT */
        .system-footer-block {
            flex-shrink: 0;
            border-top: 1px solid var(--border-color);
            padding: 20px 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            background: #000000;
            width: 100%;
            margin-top: auto;
        }

        /* RED LOGIN MODAL OVERLAY */
        .security-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .security-modal-overlay.active {
            opacity: 1; pointer-events: auto;
        }

        .security-modal-window {
            background: #000000;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 320px;
            position: relative;
            text-align: center;
        }

        .close-modal-x {
            position: absolute;
            top: 12px; right: 16px;
            background: transparent; border: none;
            color: var(--text-muted); font-size: 20px;
            cursor: pointer;
        }

        .btn-enter-red {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--accent-red);
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <div class="ruthless-navbar">
        <div class="nav-brand">
            <h1>Binary <span>Ruthless</span> Trader</h1>
        </div>
        <div class="action-bar-row">
            <div class="social-icons-rack" id="publicSocialHeaderRackContainer">
                <!-- Hardcoded Default Fallbacks -->
                <a href="#" class="social-icon-btn"><i class="fab fa-telegram"></i></a>
                <a href="#" class="social-icon-btn"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-icon-btn"><i class="fab fa-youtube"></i></a>
                <a href="#" class="social-icon-btn"><i class="fab fa-whatsapp"></i></a>
            </div>
            <button class="nav-login-btn" id="navLoginBtn">Login</button>
        </div>
    </div>

    <div class="container">
        <!-- Default Risk Alert -->
        <div class="risk-warning-banner" id="publicRuntimeWarningBannerDisplay">Note: Trading is risky.</div>

        <!-- TWO ADS TOP (One below another) -->
        <div class="ads-vertical-stack">
            <div id="homeTopAdSlot1" class="ad-slot-frame"></div>
            <div id="homeTopAdSlot2" class="ad-slot-frame"></div>
        </div>

        <!-- ADAPTIVE WORKSPACE CONTENT -->
        <div class="tool-workspace-card">
            <div class="tools-selection-container">
                <label>Select Active Tool</label>
                <select id="publicToolSelector" style="display: none; text-align-last: center;"></select>
            </div>
            <div id="publicWorkspaceEngine"></div>
        </div>

        <!-- TWO ADS BOTTOM (One below another) -->
        <div class="ads-vertical-stack">
            <div id="homeBottomAdSlot1" class="ad-slot-frame"></div>
            <div id="homeBottomAdSlot2" class="ad-slot-frame"></div>
        </div>
    </div>

    <footer class="system-footer-block" id="publicFooterLegalTextDisplayBlock">
        © 2026 Binary Ruthless Trader. All Rights Reserved.
    </footer>

    <!-- LOGIN POPUP GATEWAY -->
    <div class="security-modal-overlay" id="securityAccessGatewayModal">
        <div class="security-modal-window">
            <button class="close-modal-x" id="closeSecurityModalBtn">&times;</button>
            <div style="margin-top: 12px;">
                <input type="password" id="gatewayMaskedPasswordField" placeholder="••••••••" style="text-align: center; letter-spacing: 4px; font-size: 20px;">
            </div>
            <div id="gatewaySubmissionWrapperFrame"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA2ILDlxtYs2CT-2mJItRV1NApSIaH4t3g",
            authDomain: "binary-ruthless-trader-26654.firebaseapp.com",
            databaseURL: "https://binary-ruthless-trader-26654-default-rtdb.firebaseio.com",
            projectId: "binary-ruthless-trader-26654",
            storageBucket: "binary-ruthless-trader-26654.appspot.com",
            messagingSenderId: "533209261799",
            appId: "1:533209261799:web:a398ab21b0f913683ea442",
            measurementId: "G-WQCXMV5PR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let systemToolsDatabase = {};
        let currentSecuredGatePasscodeStr = "995948";

        const securityAccessGatewayModal = document.getElementById('securityAccessGatewayModal');
        const gatewayMaskedPasswordField = document.getElementById('gatewayMaskedPasswordField');
        const gatewaySubmissionWrapperFrame = document.getElementById('gatewaySubmissionWrapperFrame');

        document.getElementById('navLoginBtn').addEventListener('click', () => {
            gatewayMaskedPasswordField.value = '';
            gatewaySubmissionWrapperFrame.innerHTML = '';
            securityAccessGatewayModal.classList.add('active');
            gatewayMaskedPasswordField.focus();
        });

        document.getElementById('closeSecurityModalBtn').addEventListener('click', () => {
            securityAccessGatewayModal.classList.remove('active');
        });

        gatewayMaskedPasswordField.addEventListener('input', (e) => {
            if(e.target.value.trim() === currentSecuredGatePasscodeStr) {
                gatewaySubmissionWrapperFrame.innerHTML = `<button class="btn-enter-red" id="executeGatewayActionBtn">Enter</button>`;
                document.getElementById('executeGatewayActionBtn').addEventListener('click', () => {
                    window.location.href = 'admin.html';
                });
            } else {
                gatewaySubmissionWrapperFrame.innerHTML = '';
            }
        });

        // Sync branding/social settings
        db.collection('settings').doc('brandingControl').onSnapshot(doc => {
            if(doc.exists()) {
                const b = doc.data();
                let links = "";
                if(b.tgStatus !== 'hide') links += `<a href="${b.tgUrl || '#'}" target="_blank" class="social-icon-btn"><i class="fab fa-telegram"></i></a>`;
                if(b.instaStatus !== 'hide') links += `<a href="${b.instaUrl || '#'}" target="_blank" class="social-icon-btn"><i class="fab fa-instagram"></i></a>`;
                if(b.ytStatus !== 'hide') links += `<a href="${b.ytUrl || '#'}" target="_blank" class="social-icon-btn"><i class="fab fa-youtube"></i></a>`;
                if(b.waStatus !== 'hide') links += `<a href="${b.waUrl || '#'}" target="_blank" class="social-icon-btn"><i class="fab fa-whatsapp"></i></a>`;
                document.getElementById('publicSocialHeaderRackContainer').innerHTML = links;

                const wBox = document.getElementById('publicRuntimeWarningBannerDisplay');
                if(b.warningStatus !== 'hide' && b.warningText) {
                    wBox.innerText = b.warningText; wBox.style.display = 'block';
                } else if(b.warningStatus === 'hide') { wBox.style.display = 'none'; }

                const fBox = document.getElementById('publicFooterLegalTextDisplayBlock');
                if(b.footerStatus !== 'hide' && b.footerText) fBox.innerText = b.footerText;
            }
        });

        // Watch Tools Deployment
        db.collection('tools').orderBy('timestamp', 'asc').onSnapshot(snap => {
            systemToolsDatabase = {};
            const selector = document.getElementById('publicToolSelector');
            selector.innerHTML = '';
            let count = 0;

            snap.forEach(doc => {
                const d = doc.data();
                if(d.scope === 'public' || d.scope === 'both') {
                    systemToolsDatabase[doc.id] = d;
                    const opt = document.createElement('option');
                    opt.value = doc.id; opt.textContent = d.toolName;
                    selector.appendChild(opt);
                    count++;
                }
            });

            if(count > 0) {
                selector.style.display = 'block';
                renderWorkspace(selector.value);
            } else {
                selector.style.display = 'none';
                document.getElementById('publicWorkspaceEngine').innerHTML = '';
            }
        });

        // Monitor Ad Channels Configuration
        db.collection('settings').doc('adsChannels').onSnapshot(doc => {
            if(doc.exists()) {
                const a = doc.data();
                deployAd('homeTopAdSlot1', a.top1);
                deployAd('homeTopAdSlot2', a.top2);
                deployAd('homeBottomAdSlot1', a.bot1);
                deployAd('homeBottomAdSlot2', a.bot2);
            }
        });

        function deployAd(id, targetNode) {
            const el = document.getElementById(id);
            if(targetNode && targetNode.visibility === 'visible' && targetNode.code) {
                el.style.width = targetNode.width;
                el.style.height = targetNode.height;
                el.style.display = 'flex';
                el.innerHTML = targetNode.code;
                const scripts = el.getElementsByTagName('script');
                for(let s of scripts) { eval(s.text); }
            } else {
                el.style.display = 'none'; el.innerHTML = '';
            }
        }

        function renderWorkspace(id) {
            const container = document.getElementById('publicWorkspaceEngine');
            if(!id || !systemToolsDatabase[id]) { container.innerHTML = ''; return; }
            container.innerHTML = systemToolsDatabase[id].htmlContent;
            const scripts = container.getElementsByTagName('script');
            for(let s of scripts) { eval(s.text); }
        }

        document.getElementById('publicToolSelector').addEventListener('change', (e) => renderWorkspace(e.target.value));
    </script>
</body>
</html>
