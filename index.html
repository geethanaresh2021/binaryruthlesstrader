<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader V7</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <div id="home-view">
        <header class="home-header">
            <div class="header-side-spacer"></div>
            <div class="header-center">
                <div class="brand-group">
                    <img src="logo.png" class="main-logo" alt="Logo">
                    <img src="brand-name.png" class="brand-img" alt="RUTHLESS">
                </div>
                <div class="top-socials">
                    <a href="#" class="s-icon"><i class="fab fa-telegram-plane"></i></a>
                    <a href="#" class="s-icon"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
            <div class="header-right">
                <div class="admin-trigger" onclick="checkAdminAccess()"><i class="fas fa-user-shield"></i></div>
            </div>
        </header>

        <main class="home-container" id="home-main">
            <div id="signal-box" class="glass-container draggable-element">
                <div class="container-tag">LIVE SIGNAL</div>
                <h2 style="color:var(--neon)">EUR/USD (OTC)</h2>
                <div class="signal-direction">CALL (UP)</div>
                <button class="join-btn">JOIN NOW</button>
            </div>

            <div id="tool-box" class="glass-container draggable-element">
                <div class="container-tag">TREND METER</div>
                <div class="signal-direction" style="font-size:20px;">STRONG BUY</div>
            </div>
        </main>
    </div>

    <div id="admin-wrapper" style="display:none;">
        <aside id="sidebar">
            <div class="sidebar-header"><h2>RUTHLESS ADMIN</h2></div>
            <nav id="menu-list">
                <button class="nav-btn active" onclick="openTab(event, 'tab-layout')"><i class="fas fa-vector-square"></i> Layout Builder</button>
                <button class="nav-btn" onclick="openTab(event, 'tab-affiliate')"><i class="fas fa-link"></i> Affiliate</button>
                <button onclick="logout()" class="nav-btn logout">LOGOUT</button>
            </nav>
        </aside>

        <main id="content-area">
            <section id="tab-layout" class="tab-content active">
                <div class="builder-header">
                    <h1>Visual Layout Builder</h1>
                    <div class="toggle-group">
                        <button id="btn-desk" class="tgl-btn active" onclick="setPreview('desktop')">DESKTOP</button>
                        <button id="btn-mob" class="tgl-btn" onclick="setPreview('mobile')">MOBILE</button>
                    </div>
                    <button class="save-btn" onclick="savePositions()">SAVE & APPLY</button>
                </div>

                <div id="preview-container" class="view-desktop">
                    <div class="preview-overlay">
                        <div id="drag-signal" class="drag-box" data-target="signal-box">SIGNAL BOX</div>
                        <div id="drag-tool" class="drag-box" data-target="tool-box">TOOL BOX</div>
                    </div>
                    <iframe src="about:blank" id="preview-iframe"></iframe>
                </div>
            </section>
        </main>
    </div>

    <script>
        function checkAdminAccess() {
            if(prompt("Enter Admin Secret Key:") === "0000") {
                window.location.hash = "#9700224305";
                location.reload();
            }
        }

        window.onload = function() {
            const isAdmin = window.location.hash === "#9700224305";
            const home = document.getElementById('home-view');
            const admin = document.getElementById('admin-wrapper');

            if(isAdmin) {
                home.style.display = 'none';
                admin.style.display = 'flex';
                setupIframe();
            } else {
                home.style.display = 'block';
                admin.style.display = 'none';
                applySavedLayout();
            }
        };

        function setupIframe() {
            const frame = document.getElementById('preview-iframe');
            const homeContent = document.getElementById('home-view').innerHTML;
            const styles = Array.from(document.querySelectorAll('style, link[rel="stylesheet"]')).map(s => s.outerHTML).join('');
            
            frame.contentDocument.write(`
                <html>
                    <head>${styles}<style>body{background:#000; overflow:hidden;} .admin-trigger{display:none;}</style></head>
                    <body>${homeContent}</body>
                </html>
            `);
            frame.contentDocument.close();
        }

        function setPreview(mode) {
            const container = document.getElementById('preview-container');
            document.getElementById('btn-desk').classList.toggle('active', mode === 'desktop');
            document.getElementById('btn-mob').classList.toggle('active', mode === 'mobile');
            container.className = (mode === 'mobile') ? 'view-mobile' : 'view-desktop';
        }

        interact('.drag-box').draggable({
            listeners: { move(event) {
                const target = event.target;
                const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                target.style.transform = `translate(${x}px, ${y}px)`;
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
            }}
        }).resizable({
            edges: { right: true, bottom: true },
            listeners: { move(event) {
                Object.assign(event.target.style, {
                    width: `${event.rect.width}px`,
                    height: `${event.rect.height}px`
                });
            }}
        });

        function savePositions() {
            const signal = document.getElementById('drag-signal');
            const tool = document.getElementById('drag-tool');
            const layout = {
                signal: { x: signal.getAttribute('data-x'), y: signal.getAttribute('data-y'), w: signal.style.width, h: signal.style.height },
                tool: { x: tool.getAttribute('data-x'), y: tool.getAttribute('data-y'), w: tool.style.width, h: tool.style.height }
            };
            localStorage.setItem('ruthless_layout', JSON.stringify(layout));
            location.reload(); 
        }

        function applySavedLayout() {
            const data = JSON.parse(localStorage.getItem('ruthless_layout'));
            if(!data) return;
            const apply = (id, d) => {
                const el = document.getElementById(id);
                if(el && d) {
                    el.style.position = 'absolute';
                    el.style.transform = `translate(${d.x || 0}px, ${d.y || 0}px)`;
                    el.style.width = d.w;
                    el.style.height = d.h;
                }
            };
            apply('signal-box', data.signal);
            apply('tool-box', data.tool);
        }

        function openTab(evt, name) { /* Logic same as before */ }
        function logout() { window.location.hash = ""; location.reload(); }
    </script>
</body>
</html>
