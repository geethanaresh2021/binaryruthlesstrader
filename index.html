<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader</title>
    
    <style>
        :root { --red: #ff0000; --dark-bg: #000000; --neon-green: #00ffcc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--dark-bg); color: var(--red); font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #000; border-bottom: 1px solid #222; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .brand-name { font-size: 20px; letter-spacing: 2px; text-shadow: 0 0 10px var(--red); }
        .admin-lock-btn { background: transparent; border: none; color: #111; cursor: pointer; font-size: 20px; }
        
        #home-view { padding: 100px 20px 80px; min-height: 100vh; }
        .main-content-wrapper { display: flex; flex-direction: column; gap: 20px; }
        .main-box { background: #0a0a0a; border: 2px solid var(--red); padding: 30px; text-align: center; box-shadow: inset 0 0 15px rgba(255,0,0,0.2); }
        
        .number-glow { font-family: 'Roboto Mono', monospace; font-size: 32px; font-weight: bold; text-shadow: 0 0 15px var(--red); margin-top: 10px; }
        .ads-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .ad-box { background: #050505; border: 1px dashed #333; height: 100px; display: flex; align-items: center; justify-content: center; color: #444; font-size: 10px; }
        
        .bottom-strip { background: #0a0a0a; border-top: 1px solid #222; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; position: fixed; bottom: 0; width: 100%; font-size: 10px; }
        
        /* Admin Dashboard Style */
        #admin-panel { display: none; background: #0a0a0a; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; padding: 20px; overflow-y: auto; color: white; }
        .ruthless-input { width: 100%; background: #000; border: 1px solid #444; color: var(--neon-green); padding: 10px; margin-bottom: 15px; font-weight: bold; }
        .dash-btn { background: var(--red); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="home-view">
        <header class="top-nav">
            <button id="admin-entry-btn" class="admin-lock-btn" onclick="openAdmin()"><i class="fas fa-user-shield"></i></button>
            <div class="brand-name">RUTHLESS TRADER</div>
            <div style="width: 30px;"></div> </header>

        <div class="main-content-wrapper">
            <div class="main-box">
                <h2 style="font-size: 14px; color: white;">LIVE ACCURACY</h2>
                <div id="itm-rate" class="number-glow">98%</div>
            </div>
            <div class="main-box">
                <h2 style="font-size: 14px; color: white;">TRADING SIGNALS</h2>
                <button onclick="window.location.href='#'" style="margin-top:10px; background:red; color:white; border:none; padding:10px 20px; font-family:'Orbitron';">JOIN NOW</button>
            </div>
        </div>

        <div class="ads-grid">
            <div class="ad-box">AD SLOT 1</div>
            <div class="ad-box">AD SLOT 2</div>
            <div class="ad-box">AD SLOT 3</div>
            <div class="ad-box">AD SLOT 4</div>
        </div>

        <footer class="bottom-strip">
            <div style="display:flex; gap:20px;">
                <span>ABOUT US</span>
                <span>CONTACT US</span>
            </div>
            <div>© 2026 BINARY RUTHLESS TRADER</div>
        </footer>
    </div>

    <div id="admin-panel" style="background: #050505; color: white; padding-bottom: 100px;">
    
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 2px solid #ff0000; background: #000;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="logo.png" alt="Logo" style="height: 40px; filter: drop-shadow(0 0 5px red);" onerror="this.style.display='none'">
            <span style="font-family: 'Orbitron'; font-size: 18px; color: #ff0000; text-shadow: 0 0 10px red;">RUTHLESS TRADER</span>
        </div>
        <button onclick="saveAdmin()" style="background: #ff0000; color: white; border: none; padding: 8px 15px; font-family: 'Orbitron'; cursor: pointer; font-size: 12px;">LOGOUT</button>
    </header>

    <div style="display: flex; overflow-x: auto; gap: 15px; padding: 20px; background: #0a0a0a; border-bottom: 1px solid #222;">
        <div style="min-width: 120px; text-align: center; border-right: 1px solid #333;">
            <p style="font-size: 10px; color: #888;">ACTIVE NOW</p>
            <h3 id="stat-active" style="color: #00ffcc; font-family: 'Roboto Mono'; font-size: 20px;">1</h3>
        </div>
        <div style="min-width: 120px; text-align: center; border-right: 1px solid #333;">
            <p style="font-size: 10px; color: #888;">TOTAL VIEWS</p>
            <h3 id="stat-views" style="color: #ff0000; font-family: 'Roboto Mono'; font-size: 20px;">0</h3>
        </div>
        <div style="min-width: 120px; text-align: center; border-right: 1px solid #333;">
            <p style="font-size: 10px; color: #888;">UNQ USERS</p>
            <h3 id="stat-unique" style="color: #ff0000; font-family: 'Roboto Mono'; font-size: 20px;">0</h3>
        </div>
        <div style="min-width: 120px; text-align: center;">
            <p style="font-size: 10px; color: #888;">POST COUNT</p>
            <h3 id="stat-posts" style="color: #00ffcc; font-family: 'Roboto Mono'; font-size: 20px;">0</h3>
        </div>
    </div>

    <div style="padding: 20px;">
        <div class="admin-card" style="background: #111; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
            <label style="color: #ff0000; font-size: 12px;">AFFILIATE LINK</label>
            <input type="text" id="admin-aff-link" class="ruthless-input" placeholder="Broker registration link">
        </div>
        </div>

    <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 1px solid #ff0000; border-radius: 50px; padding: 10px 30px; display: flex; gap: 25px; box-shadow: 0 0 20px rgba(255,0,0,0.3); z-index: 10001;">
        <i class="fab fa-telegram" style="color: #ff0000; font-size: 24px; cursor: pointer;"></i>
        <i class="fab fa-youtube" style="color: #ff0000; font-size: 24px; cursor: pointer;"></i>
        <i class="fab fa-instagram" style="color: #ff0000; font-size: 24px; cursor: pointer;"></i>
        <i class="fas fa-envelope" style="color: #ff0000; font-size: 24px; cursor: pointer;"></i>
    </div>
</div>

<script>
    // Stats Initialization
    let dailyStats = JSON.parse(localStorage.getItem('daily_stats')) || {
        date: new Date().toLocaleDateString(),
        views: 0,
        uniqueUsers: 0,
        posts: 0,
        visitors: [] // To track unique IDs
    };

    function updateStats() {
        const today = new Date().toLocaleDateString();

        // 12 AM Reset Logic
        if (dailyStats.date !== today) {
            dailyStats = { date: today, views: 0, uniqueUsers: 0, posts: 0, visitors: [] };
        }

        // Increment Total Views (Every Refresh)
        dailyStats.views++;

        // Unique User Logic (Session Based)
        let sessionID = sessionStorage.getItem('user_session');
        if (!sessionID) {
            sessionID = 'user_' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('user_session', sessionID);
            
            if (!dailyStats.visitors.includes(sessionID)) {
                dailyStats.uniqueUsers++;
                dailyStats.visitors.push(sessionID);
            }
        }

        localStorage.setItem('daily_stats', JSON.stringify(dailyStats));
        refreshUI();
    }

    function refreshUI() {
        document.getElementById('stat-views').innerText = dailyStats.views;
        document.getElementById('stat-unique').innerText = dailyStats.uniqueUsers;
        document.getElementById('stat-posts').innerText = dailyStats.posts;
        
        // Simulating Active Users (Since it's a static site)
        document.getElementById('stat-active').innerText = Math.floor(Math.random() * 5) + 1;
    }

    // Call stats on load
    window.addEventListener('load', () => {
        updateStats();
        // Existing login checks...
    });
</script>


    <script>
        // Security Logic
        function checkAccess() {
            if(window.location.hash === "#9700224305") {
                document.getElementById('admin-entry-btn').style.color = "#444";
            }
        }

        function openAdmin() {
            if(window.location.hash === "#9700224305") {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('home-view').style.display = 'none';
            }
        }

        function saveAdmin() {
            alert("Settings Saved Locally!");
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
        }

        // Accuracy Simulation
        setInterval(() => {
            const rate = Math.floor(Math.random() * (99 - 94 + 1)) + 94;
            const el = document.getElementById('itm-rate');
            if(el) el.innerText = rate + "%";
        }, 5000);

        // Anti-Inspect Alert
        document.addEventListener('contextmenu', e => e.preventDefault());

        window.onload = checkAccess;
    </script>
</body>
</html>
