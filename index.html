<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #ff0000; --bg-black: #000; --neon-cyan: #00ffcc; }
        body { background: var(--bg-black); color: var(--main-red); font-family: 'Orbitron', sans-serif; margin: 0; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        #admin-btn { display: none; position: fixed; top: 0; width: 100%; background: var(--main-red); color: #fff; text-align: center; padding: 10px; z-index: 10000; cursor: pointer; font-weight: bold; }
        .draggable-element { position: absolute; cursor: pointer; }
        .join-btn { background: var(--main-red); color: #fff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; box-shadow: 0 0 15px var(--main-red); }
        .ad-container { border: 1px dashed #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    </style>
</head>
<body>

<div id="admin-btn" onclick="location.href='9700224305.html'">ENTER ADMIN PANEL</div>

<div id="brand-logo" class="draggable-element">LOGO</div>

<div id="join-section" class="draggable-element">
    <button class="join-btn" onclick="goToAffiliate()">JOIN NOW</button>
</div>

<div id="signal-container" class="draggable-element" style="aspect-ratio: 1/1.5; border: 2px solid red;">
    </div>

<div id="ad-slot-1" class="draggable-element ad-container">AD 1</div>

<script>
    // 1. Secret Path Check
    if(window.location.pathname.includes('9700224305') || sessionStorage.getItem('is_admin')) {
        document.getElementById('admin-btn').style.display = 'block';
        sessionStorage.setItem('is_admin', 'true');
    }

    // 2. Affiliate Link Redirect
    function goToAffiliate() {
        const link = localStorage.getItem('affiliate_link') || '#';
        window.open(link, '_blank');
    }

    // 3. 15s Smart Ad Refresh
    let lastRef = Date.now();
    function smartRefresh() {
        if(Date.now() - lastRef > 15000) {
            console.log("Refreshing Ads and Updating Revenue...");
            lastRef = Date.now();
            // Trigger Refresh
        }
    }
    window.onscroll = smartRefresh;
    window.onclick = smartRefresh;

    // 4. Security: No-Freeze Redirect
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { if(e.keyCode == 123) window.location.replace("about:blank"); };
</script>
</body>
</html>
