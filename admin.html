<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --red: #ff0000;
            --dark-red: #8b0000;
            --green: #00ffcc;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fixed Layout for Tablet/Desktop */
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        html, body { 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif;
        }

        body { display: flex; flex-direction: column; }

        /* --- Admin Header --- */
        .admin-header {
            width: 100%;
            background: #000;
            border-bottom: 2px solid var(--red);
            padding: 10px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .brand-img {
            max-width: 280px;
            filter: drop-shadow(0 0 10px var(--red));
        }

        .social-row {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .social-row a {
            color: #fff;
            font-size: 16px;
            transition: var(--transition);
        }

        .social-row a:hover {
            color: var(--red);
            transform: scale(1.2);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 8px 18px;
            font-family: 'Roboto Mono';
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: var(--red);
            color: #fff;
            box-shadow: var(--neon-glow);
        }

        /* --- Main Layout --- */
        .admin-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            padding: 15px 10px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--red) #000;
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--red); }

        .nav-group-label {
            font-size: 10px;
            color: #444;
            margin: 15px 0 8px 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-btn {
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            color: #888;
            padding: 12px 15px;
            margin-bottom: 6px;
            text-align: left;
            font-family: 'Roboto Mono';
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 4px;
        }

        .nav-btn i {
            width: 18px;
            color: var(--red);
            font-size: 14px;
            text-align: center;
        }

        .nav-btn.new-btn i {
            color: var(--green); /* Highlights Views & Revenue */
        }

        .nav-btn:hover {
            background: #1a0000;
            color: #fff;
            border-color: var(--red);
            padding-left: 20px;
        }

        .nav-btn.active {
            background: var(--red);
            color: #fff !important;
            border-color: var(--red);
            box-shadow: var(--neon-glow);
        }

        /* --- Content Frame --- */
        .content-area {
            flex: 1;
            padding: 30px;
            background: radial-gradient(circle at top right, #120000, #050505);
            overflow-y: auto;
        }

        .panel-header {
            border-left: 5px solid var(--red);
            padding-left: 20px;
            margin-bottom: 30px;
        }

        .panel-header h1 {
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .panel-header p {
            font-family: 'Roboto Mono';
            color: #555;
            font-size: 13px;
            margin-top: 5px;
        }

        .placeholder-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed #222;
            padding: 50px;
            text-align: center;
            color: #333;
            font-family: 'Roboto Mono';
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <div style="width: 100px;"></div> <div class="brand-section">
            <img src="brand-name.png" alt="RUTHLESS SYSTEM" class="brand-img">
            <div class="social-row">
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>

        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </header>

    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="nav-group-label">Analytics</div>
            <button class="nav-btn new-btn" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            <button class="nav-btn new-btn" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>

            <div class="nav-group-label">Management</div>
            <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand-arrows-alt"></i> ST Resize</button>
            <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools Manager</button>
            <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signal Connection</button>
            <button class="nav-btn" onclick="loadContent('Ads Network')"><i class="fas fa-shield-check"></i> Ads Network Verify</button>
            <button class="nav-btn" onclick="loadContent('Ads Containers')"><i class="fas fa-box-open"></i> Ads Containers</button>
            <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-alt"></i> Social Media</button>
            <button class="nav-btn" onclick="loadContent('Brand Name')"><i class="fas fa-id-card"></i> Brand Name</button>
            <button class="nav-btn" onclick="loadContent('Affiliate')"><i class="fas fa-handshake"></i> Affiliate</button>
            <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
            <button class="nav-btn" onclick="loadContent('Join Section')"><i class="fas fa-user-plus"></i> Join</button>
            <button class="nav-btn" onclick="loadContent('Website SEO')"><i class="fas fa-search"></i> Website SEO</button>
            <button class="nav-btn" onclick="loadFirebaseManager()"><i class="fas fa-fire-alt"></i> Firebase</button>
            <button class="nav-btn" onclick="loadContent('VPS')"><i class="fas fa-server"></i> VPS</button>
            <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
        </nav>

        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p>Select a module from the sidebar to start managing.</p>
            </div>

            <div id="mainDisplay">
                <div class="placeholder-card">
                    SYSTEM READY. AWAITING INPUT...
                </div>
            </div>
        </main>
    </div>

    <script>
        function loadContent(moduleName) {
    // Current module ni memory lo save chesthunnam
    localStorage.setItem('ruthless_current_page', moduleName);

    // Sidebar active state highlight logic
    const buttons = document.querySelectorAll('.nav-btn');
    buttons.forEach(btn => {
        if(btn.innerText.includes(moduleName)) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });

    // Firebase kosam special check
    if(moduleName === 'Firebase') {
        loadFirebaseManager();
        return;
    }

    // Header update
    document.getElementById('panelHeader').innerHTML = `
        <h1>${moduleName}</h1>
        <p>Managing ${moduleName} module settings and data.</p>
    `;

    // Content Display
    document.getElementById('mainDisplay').innerHTML = `
        <div class="placeholder-card">
            [ ${moduleName} MODULE LOADED ]<br>
            <small style="color:#555">Functions for this module will be added in the next step.</small>
        </div>
    `;
}
        // --- FIREBASE MANAGER LOGIC ---

function loadFirebaseManager() {
    // Sidebar active state highlight
    localStorage.setItem('ruthless_current_page', 'Firebase');
    const buttons = document.querySelectorAll('.nav-btn');
    buttons.forEach(btn => {
        if(btn.innerText.includes('Firebase')) btn.classList.add('active');
        else btn.classList.remove('active');
    });

    const mainDisplay = document.getElementById('mainDisplay');
    const panelHeader = document.getElementById('panelHeader');

    // Update Header Text
    panelHeader.innerHTML = `<h1>Firebase Manager</h1><p>Manage and switch between multiple Firebase projects.</p>`;

    let savedConfigs = JSON.parse(localStorage.getItem('ruthless_firebases') || '[]');
    let activeIndex = localStorage.getItem('ruthless_active_fb_index');

    let configHtml = savedConfigs.map((cfg, index) => `
        <div style="background:#111; border:1px solid ${activeIndex == index ? 'var(--green)' : '#222'}; padding:15px; margin-bottom:10px; border-radius:8px; position:relative;">
            <div style="font-size:10px; color:${activeIndex == index ? 'var(--green)' : '#666'}; margin-bottom:5px; font-family:'Roboto Mono';">
                ${activeIndex == index ? '● ACTIVE CONNECTION' : 'SAVED CONFIG #' + (index + 1)}
            </div>
            <div style="font-family:'Roboto Mono'; font-size:11px; color:#aaa; overflow:hidden; text-overflow:ellipsis;">ID: ${cfg.projectId}</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                <button onclick="connectFirebase(${index})" style="background:${activeIndex == index ? 'var(--green)' : 'transparent'}; border:1px solid ${activeIndex == index ? 'var(--green)' : '#444'}; color:${activeIndex == index ? '#000' : '#fff'}; padding:5px 12px; cursor:pointer; font-family:'Roboto Mono'; font-size:10px; font-weight:bold; border-radius:4px; transition:0.3s;">
                    ${activeIndex == index ? 'CONNECTED' : 'CONNECT'}
                </button>
                <button onclick="deleteFirebase(${index})" style="background:transparent; border:none; color:#ff0000; cursor:pointer; font-size:14px;"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    `).join('');

    mainDisplay.innerHTML = `
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:25px;">
            <div style="background:rgba(255,255,255,0.02); border:1px solid #222; padding:20px; border-radius:8px;">
                <h3 style="color:var(--red); margin-bottom:15px; font-size:12px; letter-spacing:1px;">ADD NEW FIREBASE</h3>
                <input type="text" id="fb_apiKey" placeholder="API Key" class="fb-input">
                <input type="text" id="fb_dbURL" placeholder="Database URL" class="fb-input">
                <input type="text" id="fb_projectId" placeholder="Project ID" class="fb-input">
                <input type="text" id="fb_appId" placeholder="App ID" class="fb-input">
                
                <button onclick="saveNewFirebase()" style="width:100%; padding:12px; background:var(--red); color:#fff; border:none; font-family:'Orbitron'; font-weight:bold; cursor:pointer; border-radius:4px; margin-top:10px;">SAVE & CONNECT</button>
                <div id="connStatus" style="margin-top:15px; text-align:center; font-family:'Roboto Mono'; font-size:11px; font-weight:bold;"></div>
            </div>

            <div style="background:rgba(255,255,255,0.02); border:1px solid #222; padding:20px; border-radius:8px;">
                <h3 style="color:#555; margin-bottom:15px; font-size:12px; letter-spacing:1px;">SAVED NETWORKS</h3>
                <div id="fbList" style="max-height:400px; overflow-y:auto;">${configHtml || '<div style="color:#222; text-align:center; padding:50px; font-size:10px;">NO SAVED CONFIGS</div>'}</div>
            </div>
        </div>

        <style>
            .fb-input { width:100%; padding:12px; background:#000; border:1px solid #222; color:var(--green); font-family:'Roboto Mono'; margin-bottom:10px; border-radius:4px; font-size:11px; transition:0.3s; }
            .fb-input:focus { border-color:var(--red); outline:none; box-shadow: 0 0 5px rgba(255,0,0,0.2); }
        </style>
    `;
}

function saveNewFirebase() {
    const config = {
        apiKey: document.getElementById('fb_apiKey').value,
        databaseURL: document.getElementById('fb_dbURL').value,
        projectId: document.getElementById('fb_projectId').value,
        appId: document.getElementById('fb_appId').value
    };

    if(!config.apiKey || !config.projectId) {
        alert("Enter API Key and Project ID!");
        return;
    }

    let savedConfigs = JSON.parse(localStorage.getItem('ruthless_firebases') || '[]');
    savedConfigs.push(config);
    localStorage.setItem('ruthless_firebases', JSON.stringify(savedConfigs));
    localStorage.setItem('ruthless_active_fb_index', savedConfigs.length - 1);
    
    testAndSaveConnection(config);
}

function testAndSaveConnection(config) {
    const statusDiv = document.getElementById('connStatus');
    statusDiv.innerHTML = "STATUS: CONNECTING...";
    statusDiv.style.color = "#ffaa00";

    try {
        if (firebase.apps.length) firebase.app().delete();
        firebase.initializeApp(config);
        
        firebase.database().ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                statusDiv.innerHTML = "STATUS: CONNECTED SUCCESSFULLY";
                statusDiv.style.color = "var(--green)";
                localStorage.setItem('ruthless_fb_config', JSON.stringify(config)); 
                setTimeout(loadFirebaseManager, 1000);
            } else {
                statusDiv.innerHTML = "STATUS: CONNECTION FAILED";
                statusDiv.style.color = "var(--red)";
            }
        });
    } catch (e) {
        statusDiv.innerHTML = "ERROR: " + e.message;
        statusDiv.style.color = "var(--red)";
    }
}

function connectFirebase(index) {
    let savedConfigs = JSON.parse(localStorage.getItem('ruthless_firebases') || '[]');
    localStorage.setItem('ruthless_active_fb_index', index);
    testAndSaveConnection(savedConfigs[index]);
}

function deleteFirebase(index) {
    if(confirm("Delete this configuration?")) {
        let savedConfigs = JSON.parse(localStorage.getItem('ruthless_firebases') || '[]');
        savedConfigs.splice(index, 1);
        localStorage.setItem('ruthless_firebases', JSON.stringify(savedConfigs));
        if(localStorage.getItem('ruthless_active_fb_index') == index) {
            localStorage.removeItem('ruthless_active_fb_index');
            localStorage.removeItem('ruthless_fb_config');
        }
        loadFirebaseManager();
    }
}

// AUTO-CONNECT ON PAGE LOAD
window.addEventListener('load', () => {
    // 1. Firebase Auto-connect (Already unna logic)
    const activeConfig = localStorage.getItem('ruthless_fb_config');
    if(activeConfig) {
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(JSON.parse(activeConfig));
            }
            console.log("Firebase Auto-connected");
        } catch(e) { console.log("Auto-connect failed"); }
    }

    // 2. Page Persistence (Refresh chesina same page ravalante)
    const lastPage = localStorage.getItem('ruthless_current_page');
    if(lastPage) {
        loadContent(lastPage);
    } else {
        // First time load ayinappudu default ga Views or Dashboard
        loadContent('Views'); 
    }
});
    </script>
</body>
</html>
