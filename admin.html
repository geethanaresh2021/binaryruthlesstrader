<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --red: #ff0000;
            --white: #ffffff;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.4);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif;
        }
        body { display: flex; flex-direction: column; }

        /* Header */
        .admin-header {
            width: 100%; background: #000; border-bottom: 2px solid var(--red);
            padding: 10px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }
        .brand-section { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .brand-img { max-width: 250px; filter: drop-shadow(0 0 8px var(--red)); }
        
        .logout-btn {
            background: transparent; border: 1px solid var(--red); color: var(--red);
            padding: 8px 18px; font-family: 'Roboto Mono'; font-weight: bold;
            cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: var(--transition);
        }
        .logout-btn:hover { background: var(--red); color: #fff; box-shadow: var(--neon-glow); }

        /* Layout */
        .admin-wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; padding: 15px 10px;
        }
        .nav-scroll-container { display: flex; flex-direction: column; overflow-y: auto; flex: 1; }
        .nav-scroll-container::-webkit-scrollbar { width: 3px; }
        .nav-scroll-container::-webkit-scrollbar-thumb { background: var(--red); }

        .nav-group-label { font-size: 10px; color: #444; margin: 20px 0 10px 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .nav-btn {
            background: #0f0f0f; border: 1px solid #111; color: #888;
            padding: 12px 15px; margin-bottom: 5px; text-align: left;
            font-family: 'Roboto Mono'; font-size: 12px; text-transform: uppercase;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 12px;
        }
        .nav-btn i { width: 18px; color: var(--red); }
        .nav-btn:hover { background: #150000; color: #fff; border-color: var(--red); padding-left: 20px; }
        .nav-btn.active { background: var(--red); color: #fff !important; box-shadow: var(--neon-glow); border-color: var(--red); }

        /* Content Area */
        .content-area {
            flex: 1; padding: 30px; 
            background: radial-gradient(circle at top right, #120000, #050505);
            overflow-y: auto; position: relative;
        }
        .panel-header { border-left: 5px solid var(--red); padding-left: 20px; margin-bottom: 30px; }
        .panel-header h1 { font-size: 24px; letter-spacing: 2px; }
        .panel-header p { font-family: 'Roboto Mono'; color: #555; font-size: 12px; margin-top: 5px; }

        /* Module UI Elements */
        .fb-card { background: #000; border: 1px solid #1a1a1a; padding: 25px; border-radius: 4px; margin-bottom: 20px; }
        .fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .fb-input { 
            background: #080808; border: 1px solid #222; padding: 12px; 
            color: #00ffcc; font-family: 'Roboto Mono'; font-weight: bold; border-radius: 4px; outline: none;
        }
        .fb-input:focus { border-color: var(--red); }
        
        .btn-primary {
            width: 100%; padding: 15px; background: var(--red); color: #fff; border: none;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        
        /* Placeholder for Blank Screen Fix */
        #mainDisplay:empty::before {
            content: "[ INITIALIZING RUTHLESS PROTOCOL... ]";
            display: block; text-align: center; margin-top: 100px;
            color: #111; letter-spacing: 5px; font-size: 14px;
        }
    </style>
</head>

<body>

    <header class="admin-header">
        <div style="width: 100px;"></div> 
        <div class="brand-section">
            <h2 style="letter-spacing: 5px; font-weight: 900;">RUTHLESS SYSTEM</h2>
            <p style="font-size: 8px; color: var(--red); letter-spacing: 3px;">OPERATOR DASHBOARD</p>
        </div>
        <button class="logout-btn" onclick="location.reload()">Refresh</button>
    </header>

    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="nav-group-label">Analytics</div>
            <button class="nav-btn" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            
            <div class="nav-group-label">Management</div>
            <div class="nav-scroll-container">
                <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
                <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-fire-alt"></i> Firebase</button>
                <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signals</button>
            </div>
        </nav>

        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Dashboard</h1>
                <p>SYSTEM READY. WAITING FOR SELECTION.</p>
            </div>
            <div id="mainDisplay"></div>
        </main>
    </div>

    <script>
        let database;

        // Configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASEURL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // --- SYSTEM STARTUP (Blank Screen Fix) ---
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Firebase Initialize
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();

            // 2. UI Restore
            const lastActive = localStorage.getItem('activeModule') || 'Views';
            loadContent(lastActive);
        });

        function loadContent(moduleName) {
            localStorage.setItem('activeModule', moduleName);

            // Update Sidebar UI
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim() === moduleName);
            });

            // Update Header
            document.getElementById('panelHeader').innerHTML = `
                <h1>${moduleName}</h1>
                <p>MANAGING ${moduleName.toUpperCase()} MODULE SETTINGS AND DATA.</p>
            `;

            const display = document.getElementById('mainDisplay');
            display.innerHTML = ''; // Clear current

            // Routing
            if (moduleName === 'Firebase') renderFirebaseModule();
            else if (moduleName === 'Warning Note') renderWarningNoteModule();
            else {
                display.innerHTML = `
                    <div style="padding:50px; text-align:center; border:1px dashed #222; font-family:'Roboto Mono'; color:#333;">
                        [ ${moduleName.toUpperCase()} MODULE LOADED SUCCESSFULLY ]
                    </div>`;
            }
        }

        // --- MODULE RENDERING ---
        function renderFirebaseModule() {
            document.getElementById('mainDisplay').innerHTML = `
                <div class="fb-card">
                    <h2 style="font-size: 14px; color: var(--red); margin-bottom: 20px;">FIREBASE CONFIGURATION</h2>
                    <div class="fb-grid">
                        <input type="text" id="apiKey" class="fb-input" placeholder="apiKey">
                        <input type="text" id="databaseURL" class="fb-input" placeholder="databaseURL">
                    </div>
                    <button class="btn-primary" onclick="alert('Config Saved Local!')">SAVE SETTINGS</button>
                </div>`;
        }

        function renderWarningNoteModule() {
            database.ref('site_settings/warning_note').once('value').then((snapshot) => {
                const data = snapshot.val() || { content: '', scroll: false };
                document.getElementById('mainDisplay').innerHTML = `
                    <div class="fb-card">
                        <h2 style="font-size: 14px; color: var(--red);">EDIT WARNING NOTE (FIREBASE LIVE)</h2>
                        <textarea id="noteEditor" style="width:100%; height:180px; background:#080808; color:#00ffcc; border:1px solid #222; margin-top:15px; padding:15px; font-family:'Roboto Mono'; font-weight:bold; font-size:14px; outline:none;">${data.content.replace(/<[^>]*>/g, '')}</textarea>
                        <div style="display: flex; gap: 20px; margin-top: 20px; align-items: center;">
                            <label style="cursor: pointer; font-size:12px; font-family:'Roboto Mono'; color:#888;">
                                <input type="checkbox" id="scrollToggle" ${data.scroll ? 'checked' : ''}> ENABLE SCROLL
                            </label>
                            <button onclick="saveWarningNote()" style="padding:12px 30px; background:var(--red); color:#fff; border:none; cursor:pointer; font-family:'Orbitron'; font-weight:900; box-shadow: var(--neon-glow);">PUBLISH TO CLOUD</button>
                        </div>
                    </div>`;
            });
        }

        function saveWarningNote() {
            const text = document.getElementById('noteEditor').value;
            const scrollStatus = document.getElementById('scrollToggle').checked;
            
            let highlightedText = text.replace(/Risk/gi, '<span style="color:red; font-weight:bold;">Risk</span>');
            
            database.ref('site_settings/warning_note').set({
                content: highlightedText,
                scroll: scrollStatus
            }).then(() => {
                alert("DATABASE UPDATED!");
                loadContent('Warning Note');
            });
        }
    </script>
</body>
</html>
