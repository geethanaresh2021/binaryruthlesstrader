<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Ruthless Admin | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --sidebar-bg: #000000;
            --accent-red: #ff0000;
            --neon-green: #00ffcc;
            --text-gray: #888;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex; /* Sidebar and Content side-by-side */
            height: 100vh;
            overflow: hidden;
        }

        /* --- LEFT SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 2px solid var(--accent-red);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            box-shadow: 5px 0 15px rgba(255, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 0 20px 30px;
            text-align: center;
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: var(--accent-red);
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* --- NAVIGATION BUTTONS --- */
        .nav-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-btn {
            background: transparent;
            color: #fff;
            border: none;
            border-left: 4px solid transparent;
            padding: 15px 25px;
            text-align: left;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        /* Hover Effect: Border slide and Glow */
        .nav-btn:hover {
            background: rgba(255, 0, 0, 0.05);
            border-left: 4px solid var(--accent-red);
            color: var(--accent-red);
            padding-left: 35px; /* Slide effect */
            text-shadow: 0 0 8px var(--accent-red);
        }

        .nav-btn.active {
            background: linear-gradient(90deg, rgba(255, 0, 0, 0.2), transparent);
            border-left: 4px solid var(--accent-red);
            color: var(--accent-red);
            font-weight: bold;
        }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #110000 0%, #050505 100%);
        }

        .tab-content {
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* --- ADS LIST & EDITOR --- */
        .ads-item {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 15px 25px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .ads-item:hover {
            border-color: var(--accent-red);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.1);
            transform: scale(1.01);
        }

        .ads-item span { color: var(--neon-green); font-family: 'Roboto Mono'; }

        .editor-card {
            background: #000;
            border: 1px solid var(--accent-red);
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.05);
        }

        .input-group { margin-bottom: 20px; }
        label { font-size: 11px; color: var(--text-gray); margin-bottom: 8px; display: block; }
        
        input, textarea {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Roboto Mono';
        }

        input.num { color: var(--neon-green); font-size: 20px; font-weight: bold; }
        
        .btn-save {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-save:hover { background: #cc0000; letter-spacing: 2px; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>RUTHLESS<br>TRADER</h2>
        </div>
        <div class="nav-container">
            <button class="nav-btn active" onclick="switchTab(this, 'signals-section')">Signals</button>
            <button class="nav-btn" onclick="switchTab(this, 'tools-section')">Tools</button>
            <button class="nav-btn" onclick="switchTab(this, 'ads-section')">General Ads</button>
            <button class="nav-btn" onclick="switchTab(this, 'fb-section')">Firebase</button>
            <button class="nav-btn" onclick="switchTab(this, 'vps-section')">VPS</button>
            <button class="nav-btn" onclick="switchTab(this, 'ads-container-section')">Ads Containers</button>
        </div>
    </div>

    <div class="main-content">
        
        <div id="signals-section" class="tab-content" style="display: block;">
            <h2>SIGNAL MAPPING (MTS)</h2>
            <p style="color: var(--text-gray);">Manage your signal paths and execution here.</p>
        </div>

        <div id="tools-section" class="tab-content"><h2>TOOLS CONFIG</h2></div>
        <div id="fb-section" class="tab-content"><h2>FIREBASE DATABASE</h2></div>
        <div id="vps-section" class="tab-content"><h2>VPS SERVER STATUS</h2></div>

        <div id="ads-container-section" class="tab-content">
            <h2>ADS CONTAINER MANAGEMENT</h2>
            
            <div id="list-view">
                <div class="ads-item" onclick="openEditor('ad-1', 'Container 1')">
                    <div><span>01.</span> Container 1</div>
                    <div style="color: var(--accent-red);">EDIT ></div>
                </div>
                <div class="ads-item" onclick="openEditor('ad-2', 'Container 2')">
                    <div><span>02.</span> Container 2</div>
                    <div style="color: var(--accent-red);">EDIT ></div>
                </div>
                <div class="ads-item" onclick="openEditor('ad-3', 'Container 3')">
                    <div><span>03.</span> Container 3</div>
                    <div style="color: var(--accent-red);">EDIT ></div>
                </div>
                </div>

            <div id="editor-view" class="editor-card" style="display:none;">
                <button onclick="closeEditor()" style="background:none; border:none; color:var(--text-gray); cursor:pointer; margin-bottom:20px;">← BACK TO LIST</button>
                <h3 id="edit-title">EDITING: CONTAINER 1</h3>
                
                <div class="input-group">
                    <label>CONTAINER NAME</label>
                    <input type="text" id="ad-name-input">
                </div>

                <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <div style="flex: 1;">
                        <label>WIDTH (PX)</label>
                        <input type="number" id="ad-w" class="num">
                    </div>
                    <div style="flex: 1;">
                        <label>HEIGHT (PX)</label>
                        <input type="number" id="ad-h" class="num">
                    </div>
                </div>

                <div class="input-group">
                    <label>ADS SNIPPET CODE</label>
                    <textarea id="ad-snippet" rows="5"></textarea>
                </div>

                <button class="btn-save" onclick="applySettings()">SAVE & APPLY CHANGES</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(btn, sectionId) {
            // Update Buttons
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Update Sections
            document.querySelectorAll('.tab-content').forEach(s => s.style.display = 'none');
            document.getElementById(sectionId).style.display = 'block';

            // Reset to List View if Ads Container is clicked
            if(sectionId === 'ads-container-section') closeEditor();
        }

        function openEditor(id, name) {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('editor-view').style.display = 'block';
            document.getElementById('edit-title').innerText = "EDITING: " + name;
            document.getElementById('ad-name-input').value = name;
        }

        function closeEditor() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('editor-view').style.display = 'none';
        }

        function applySettings() {
            alert("Settings Saved! Home Page updated with the new Ads Code.");
            closeEditor();
        }
    </script>
</body>
</html>
