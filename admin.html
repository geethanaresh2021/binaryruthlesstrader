<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --red: #ff0000;
            --white: #ffffff;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.6);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Layout Fixes */
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif;
        }
        body { display: flex; flex-direction: column; }

        /* Header */
        .admin-header {
            width: 100%; background: #000; border-bottom: 2px solid var(--red);
            padding: 10px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }
        .brand-section { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .brand-img { max-width: 280px; filter: drop-shadow(0 0 10px var(--red)); }
        .social-row { display: flex; gap: 20px; margin-top: 8px; }
        .social-row a { color: #fff; font-size: 16px; transition: var(--transition); }
        .social-row a:hover { color: var(--red); transform: scale(1.2); }

        .logout-btn {
            background: transparent; border: 1px solid var(--red); color: var(--red);
            padding: 8px 18px; font-family: 'Roboto Mono'; font-weight: bold;
            cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: var(--transition);
        }
        .logout-btn:hover { background: var(--red); color: #fff; box-shadow: var(--neon-glow); }

        /* Sidebar */
        .admin-wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; padding: 15px 10px;
        }
        .nav-scroll-container {
            display: flex; flex-direction: column; overflow-y: auto; flex: 1;
        }
        .nav-scroll-container::-webkit-scrollbar { width: 4px; }
        .nav-scroll-container::-webkit-scrollbar-thumb { background: var(--red); }

        .nav-group-label {
            font-size: 10px; color: #444; margin: 20px 0 10px 10px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }
        .nav-btn {
            background: #0f0f0f; border: 1px solid #1a1a1a; color: #888;
            padding: 12px 15px; margin-bottom: 6px; text-align: left;
            font-family: 'Roboto Mono'; font-size: 12px; text-transform: uppercase;
            cursor: pointer; transition: var(--transition); display: flex;
            align-items: center; gap: 12px; border-radius: 4px;
        }
        .nav-btn i { width: 18px; color: var(--red); font-size: 14px; }
        .nav-btn:hover { background: #1a0000; color: #fff; border-color: var(--red); box-shadow: inset 4px 0 0 var(--red); }
        .nav-btn.active { background: var(--red); color: #fff !important; box-shadow: var(--neon-glow); }

        /* Content Area */
        .content-area {
            flex: 1; padding: 30px; 
            background: radial-gradient(circle at top right, #120000, #050505);
            overflow-y: auto;
        }
        .panel-header { border-left: 5px solid var(--red); padding-left: 20px; margin-bottom: 30px; }
        .panel-header h1 { font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }
        .panel-header p { font-family: 'Roboto Mono'; color: #555; font-size: 13px; }

        .placeholder-card {
            background: rgba(255, 255, 255, 0.02); border: 1px dashed #222;
            padding: 50px; text-align: center; color: #444; border-radius: 8px;
        }

        /* Firebase Module UI */
        .fb-container { display: flex; flex-direction: column; gap: 20px; }
        .fb-card { background: #000; border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; }
        .fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .fb-input { 
            background: #080808; border: 1px solid #222; padding: 12px; 
            color: #00ffcc; font-family: 'Roboto Mono'; font-weight: bold; border-radius: 4px; outline: none;
        }
        .fb-input:focus { border-color: var(--red); }
        
        /* Status & List */
        .fb-list-item { background: #0a0a0a; padding: 15px; border: 1px solid #111; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #333; }
        .fb-list-item.active-item { border-left-color: var(--red); background: #110000; }
        
        .status-btn { padding: 6px 12px; font-size: 10px; border-radius: 20px; font-family: 'Roboto Mono'; font-weight: 900; }
        .status-online { background: rgba(0,255,0,0.1); color: #00ff00; border: 1px solid #00ff00; }
        .status-offline { background: rgba(255,0,0,0.1); color: #ff0000; border: 1px solid #ff0000; }

        textarea#noteEditor {
            width:100%; height:150px; background:#080808; color:#00ffcc; 
            border:1px solid #222; margin-top:15px; padding:15px; 
            font-family: 'Roboto Mono'; font-weight: bold; font-size: 14px;
        }
    </style>
</head>

<body>

    <header class="admin-header">
        <div style="width: 100px;"></div> 
        <div class="brand-section">
            <img src="brand-name.png" alt="RUTHLESS SYSTEM" class="brand-img">
            <div class="social-row">
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </header>

    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="nav-group-label">Analytics</div>
            <button class="nav-btn" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            <button class="nav-btn" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>

            <div class="nav-group-label">Management</div>
            <div class="nav-scroll-container">
                <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
                <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-fire-alt"></i> Firebase</button>
                <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signal</button>
                <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools</button>
                <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
            </div>
        </nav>

        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p>AUTHENTICATED SESSION: BINARY RUTHLESS TRADER</p>
            </div>

            <div id="mainDisplay">
                <div class="placeholder-card">
                    SYSTEM READY. SELECT A MODULE.
                </div>
            </div>
        </main>
    </div>

    <script>
        let database;

        // --- FIREBASE INIT ---
        function initFirebase() {
            const configs = JSON.parse(localStorage.getItem('fb_configs') || '[]');
            const activeIdx = localStorage.getItem('fb_active_index');

            if (configs.length > 0 && activeIdx !== null) {
                const config = configs[activeIdx];
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                database = firebase.database();
                console.log("Firebase Connected: " + config.projectId);
            }
        }

        // --- CONTENT LOADER ---
        function loadContent(moduleName) {
            localStorage.setItem('activeModule', moduleName);
            
            // UI Updates
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim() === moduleName);
            });

            document.getElementById('panelHeader').innerHTML = `
                <h1>${moduleName}</h1>
                <p>MANAGING ${moduleName.toUpperCase()} MODULE SETTINGS.</p>
            `;

            // Routing
            switch (moduleName) {
                case 'Firebase': renderFirebaseModule(); break;
                case 'Warning Note': renderWarningNoteModule(); break;
                default:
                    document.getElementById('mainDisplay').innerHTML = `
                        <div class="placeholder-card">
                            <i class="fas fa-terminal" style="color:var(--red); font-size:24px; margin-bottom:15px;"></i><br>
                            [ ${moduleName.toUpperCase()} MODULE LOADED ]
                        </div>`;
            }
        }

        // --- FIREBASE MODULE ---
        function renderFirebaseModule() {
            const configs = JSON.parse(localStorage.getItem('fb_configs') || '[]');
            const activeIdx = localStorage.getItem('fb_active_index');

            let listHtml = configs.map((cfg, index) => `
                <div class="fb-list-item ${activeIdx == index ? 'active-item' : ''}">
                    <div>
                        <div style="font-size: 12px; color: #fff;">${cfg.projectId}</div>
                        <div style="font-size: 10px; color: #444;">${cfg.authDomain}</div>
                    </div>
                    <div class="status-btn ${activeIdx == index ? 'status-online' : 'status-offline'}">
                        ${activeIdx == index ? '● ACTIVE' : '○ INACTIVE'}
                    </div>
                </div>
            `).join('');

            document.getElementById('mainDisplay').innerHTML = `
                <div class="fb-container">
                    <div class="fb-card">
                        <h2 style="font-size: 14px; color: var(--red); margin-bottom: 20px;">FIREBASE CONFIGURATION</h2>
                        <div class="fb-grid">
                            <input type="text" id="apiKey" class="fb-input" placeholder="apiKey">
                            <input type="text" id="authDomain" class="fb-input" placeholder="authDomain">
                            <input type="text" id="databaseURL" class="fb-input" placeholder="databaseURL">
                            <input type="text" id="projectId" class="fb-input" placeholder="projectId">
                        </div>
                        <button onclick="saveFirebaseConfig()" style="width:100%; height:45px; background:var(--red); color:#fff; border:none; font-family:'Orbitron'; cursor:pointer; font-weight:900;">SAVE & CONNECT</button>
                    </div>
                    <div class="fb-card">
                        <h2 style="font-size: 14px; color: #fff; margin-bottom: 15px;">SAVED DATABASES</h2>
                        <div id="fbList">${listHtml || '<p style="color:#222; text-align:center;">EMPTY</p>'}</div>
                    </div>
                </div>`;
        }

        function saveFirebaseConfig() {
            const config = {
                apiKey: document.getElementById('apiKey').value,
                authDomain: document.getElementById('authDomain').value,
                databaseURL: document.getElementById('databaseURL').value,
                projectId: document.getElementById('projectId').value
            };

            if (!config.apiKey || !config.databaseURL) { alert("Missing Data!"); return; }

            let configs = [config]; // Simple overwrite for this example
            localStorage.setItem('fb_configs', JSON.stringify(configs));
            localStorage.setItem('fb_active_index', 0);
            location.reload(); // Restart to apply new Firebase app
        }

        // --- WARNING NOTE ---
        function renderWarningNoteModule() {
            if (!database) {
                document.getElementById('mainDisplay').innerHTML = `<div class="placeholder-card" style="color:red;">FIREBASE NOT CONNECTED</div>`;
                return;
            }

            document.getElementById('mainDisplay').innerHTML = `<div class="placeholder-card"><i class="fas fa-sync fa-spin"></i> FETCHING DATA...</div>`;

            database.ref('site_settings/warning_note').once('value').then((snapshot) => {
                const data = snapshot.val() || { content: '', scroll: false };
                const cleanText = data.content.replace(/<[^>]*>/g, '');

                document.getElementById('mainDisplay').innerHTML = `
                    <div class="fb-card">
                        <h2 style="font-size: 14px; color: var(--red);">CLOUD WARNING NOTE EDITOR</h2>
                        <textarea id="noteEditor">${cleanText}</textarea>
                        <div style="display: flex; gap: 20px; margin-top: 20px; align-items: center;">
                            <label style="cursor: pointer; font-size:12px; font-family:'Roboto Mono';">
                                <input type="checkbox" id="scrollToggle" ${data.scroll ? 'checked' : ''}> ENABLE MARQUEE
                            </label>
                            <button onclick="saveWarningNote()" style="padding:10px 30px; background:var(--red); color:#fff; border:none; cursor:pointer; font-family:'Orbitron'; font-weight:900;">PUBLISH LIVE</button>
                        </div>
                    </div>`;
            }).catch(e => {
                alert("Permission Denied or Config Error!");
            });
        }

        function saveWarningNote() {
            const text = document.getElementById('noteEditor').value;
            const scrollStatus = document.getElementById('scrollToggle').checked;

            let styledText = text.replace(/Risk/gi, '<span style="color:red; font-weight:bold;">Risk</span>');
            styledText = styledText.replace(/Money Management Tool/gi, '<span style="color:red; font-weight:bold;">Money Management Tool</span>');

            database.ref('site_settings/warning_note').set({
                content: styledText,
                scroll: scrollStatus,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                alert("LIVE UPDATE SUCCESSFUL!");
            });
        }

        // --- INIT ON LOAD ---
        window.onload = function() {
            initFirebase();
            const lastModule = localStorage.getItem('activeModule') || 'Views';
            loadContent(lastModule);
        };
    </script>
</body>
</html>
