<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ruthless Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Roboto Mono', monospace; padding: 20px; text-align: center; }
        .admin-box { max-width: 500px; margin: auto; border: 2px solid #ff0000; padding: 20px; background: #111; box-shadow: 0 0 20px #ff0000; }
        h2 { font-family: 'Orbitron'; color: #ff0000; }
        input, select, button { width: 90%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; }
        button { background: #ff0000; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        button:hover { background: #cc0000; box-shadow: 0 0 10px #ff0000; }
        .config-section { border-bottom: 1px solid #333; margin-bottom: 20px; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>RUTHLESS ADMIN</h2>

    <div class="config-section">
        <input type="text" id="dbUrl" placeholder="Firebase Database URL">
        <button onclick="saveConfig()" style="background: #00ffcc; color: #000;">Save Settings</button>
    </div>

    <input type="text" id="asset" placeholder="Asset (e.g. EUR/USD OTC)">
    <select id="action">
        <option value="CALL">CALL (UP)</option>
        <option value="PUT">PUT (DOWN)</option>
        <option value="SURESHOT">SURESHOT</option>
    </select>
    <input type="text" id="expiry" placeholder="Expiry (e.g. 1 MIN)">
    <button onclick="pushSignal()">PUSH LIVE SIGNAL</button>
</div>

<script>
    function saveConfig() {
        const url = document.getElementById('dbUrl').value;
        if(url) {
            localStorage.setItem('fb_db_url', url);
            alert("Firebase URL Saved!");
        }
    }

    async function pushSignal() {
        const dbUrl = localStorage.getItem('fb_db_url');
        if(!dbUrl) return alert("First Save Firebase URL!");

        const data = {
            asset: document.getElementById('asset').value,
            action: document.getElementById('action').value,
            expiry: document.getElementById('expiry').value,
            time: new Date().toLocaleTimeString()
        };

        // REST API ద్వారా Firebase కి డేటా పంపడం (No SDK needed)
        try {
            const response = await fetch(`${dbUrl}/signals.json`, {
                method: 'PUT',
                body: JSON.stringify(data)
            });
            if(response.ok) alert("Signal Live Successfully!");
        } catch (e) {
            alert("Error: " + e);
        }
    }
</script>
</body>
</html>
