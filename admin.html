<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --red: #ff0000; --white: #ffffff; --bg: #050505; --sidebar-bg: #0a0a0a; --transition: all 0.3s ease; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; width: 100vw; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; }

        .admin-header { width: 100%; background: #000; border-bottom: 2px solid var(--red); padding: 10px 30px; display: flex; align-items: center; justify-content: space-between; }
        .brand-img { max-width: 220px; filter: drop-shadow(0 0 10px var(--red)); }

        .logout-btn { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 8px 18px; font-family: 'Roboto Mono'; font-weight: bold; cursor: pointer; border-radius: 4px; transition: var(--transition); }
        .logout-btn:hover { background: var(--red); color: #fff; }

        .admin-wrapper { display: flex; flex: 1; overflow: hidden; }

        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 15px 10px; overflow-y: auto; }
        .nav-group-label { font-size: 10px; color: #444; margin: 15px 0 8px 10px; text-transform: uppercase; letter-spacing: 2px; }

        .nav-btn {
            background: #0f0f0f; border: 1px solid #1a1a1a; color: #888; padding: 12px 15px; margin-bottom: 6px;
            text-align: left; font-family: 'Roboto Mono'; font-size: 12px; text-transform: uppercase; cursor: pointer;
            transition: var(--transition); display: flex; align-items: center; gap: 12px; border-radius: 4px;
        }
        .nav-btn i { width: 18px; color: var(--red); font-size: 14px; }
        .nav-btn.new-btn i { color: var(--white); }
        .nav-btn:hover { background: #1a0000; color: #fff; border-color: var(--red); padding-left: 20px; }
        .nav-btn.active { background: var(--red); color: #fff; box-shadow: 0 0 15px rgba(255,0,0,0.4); }

        .content-area { flex: 1; padding: 30px; background: radial-gradient(circle at top right, #120000, #050505); overflow-y: auto; }
        .panel-header { border-left: 5px solid var(--red); padding-left: 20px; margin-bottom: 30px; }
        .panel-header h1 { font-size: 24px; text-transform: uppercase; }

        .placeholder-card { background: rgba(255, 255, 255, 0.02); border: 1px dashed #222; padding: 50px; text-align: center; color: #444; font-family: 'Roboto Mono'; border-radius: 8px; }
    </style>
</head>
<body>

    <header class="admin-header">
        <div style="width:100px;"></div>
        <img src="brand-name.png" alt="RUTHLESS SYSTEM" class="brand-img">
        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </header>

    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="nav-group-label">Analytics</div>
            <button class="nav-btn new-btn" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            <button class="nav-btn new-btn" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>
            
            <div class="nav-group-label">Signals</div>
            <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signal Connection</button>
            <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand-arrows-alt"></i> ST Resize</button>
            
            <div class="nav-group-label">Site Control</div>
            <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-alt"></i> Social Media</button>
            <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
        </nav>

        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p style="color:#555; font-family:'Roboto Mono'; font-size:12px;">SYSTEM READY. SELECT A MODULE.</p>
            </div>
            <div id="mainDisplay">
                <div class="placeholder-card">AWAITING INPUT...</div>
            </div>
        </main>
    </div>

    <script>
        function loadContent(name) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(name)));
            document.getElementById('panelHeader').innerHTML = `<h1>${name}</h1><p style="color:#555; font-family:'Roboto Mono'; font-size:12px;">Managing ${name} settings...</p>`;
            document.getElementById('mainDisplay').innerHTML = `
                <div class="placeholder-card">
                    [ ${name.toUpperCase()} MODULE LOADED ]<br>
                    <small style="color:#333; margin-top:10px; display:block;">Functional code will be linked to GitHub Actions / Backend.</small>
                </div>`;
        }
    </script>
</body>
</html>
