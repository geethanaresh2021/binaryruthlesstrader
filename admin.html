<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruthless Admin | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --red: #ff0000; 
            --green: #00ffcc; 
            --bg: #050505; 
            --neon: 0 0 10px var(--red); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; padding: 20px; }

        .admin-container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .admin-header { border-bottom: 2px solid var(--red); padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h1 { font-size: 24px; color: var(--red); text-shadow: var(--neon); }

        /* Navigation Buttons */
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .nav-btn { background: #111; border: 1px solid #333; color: #fff; padding: 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 12px; transition: 0.3s; text-align: center; }
        .nav-btn:hover, .nav-btn.active { border-color: var(--red); color: var(--red); box-shadow: var(--neon); }

        /* Sections */
        .section { display: none; background: #0a0a0a; border: 1px solid #222; padding: 30px; border-radius: 10px; }
        .section.active { display: block; }
        
        h2 { font-size: 18px; margin-bottom: 20px; color: var(--red); border-left: 4px solid var(--red); padding-left: 10px; }

        /* Form Elements */
        label { display: block; font-family: 'Roboto Mono'; font-size: 12px; color: #888; margin: 15px 0 5px; }
        input[type="text"], input[type="password"], textarea {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--green);
            font-family: 'Roboto Mono'; font-weight: bold; font-size: 14px; outline: none;
        }
        textarea { height: 150px; resize: vertical; }

        .save-btn { background: var(--red); color: #fff; border: none; padding: 15px 30px; margin-top: 20px; cursor: pointer; font-family: 'Orbitron'; font-weight: 900; }
        .save-btn:hover { background: #fff; color: #000; }

        /* List Items */
        .list-item { background: #111; padding: 15px; border: 1px solid #222; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status-toggle { display: flex; align-items: center; gap: 10px; }
        
        .toggle-switch { width: 40px; height: 20px; accent-color: var(--red); cursor: pointer; }
    </style>
</head>
<body>

    <div class="admin-container">
        <header class="admin-header">
            <h1>RUTHLESS ADMIN PANEL</h1>
            <div style="font-family: 'Roboto Mono'; font-size: 10px; color: #444;">V3.0 | 2026</div>
        </header>

        <nav class="nav-grid">
            <div class="nav-btn active" onclick="showTab('signals')">SIGNALS</div>
            <div class="nav-btn" onclick="showTab('tools')">TOOLS</div>
            <div class="nav-btn" onclick="showTab('ads')">ADS CONTROL</div>
            <div class="nav-btn" onclick="showTab('firebase')">FIREBASE</div>
            <div class="nav-btn" onclick="showTab('vps')">VPS</div>
        </nav>

        <div id="signals" class="section active">
            <h2>SIGNAL MANAGEMENT</h2>
            <div>
                <label>QUOTEX MT5 WEBHOOK PATH</label>
                <input type="text" id="quotexPath" placeholder="binaryruthlesstrader.com/quotex">
                <div class="status-toggle" style="margin-top:10px;">
                    <input type="checkbox" id="quotexStatus" class="toggle-switch" onchange="autoSave()"> <span style="font-size:12px;">ENABLE IN DROPDOWN</span>
                </div>
            </div>
            <div style="margin-top:30px;">
                <label>TOXA MT5 WEBHOOK PATH</label>
                <input type="text" id="toxaPath" placeholder="binaryruthlesstrader.com/toxa">
                <div class="status-toggle" style="margin-top:10px;">
                    <input type="checkbox" id="toxaStatus" class="toggle-switch" onchange="autoSave()"> <span style="font-size:12px;">ENABLE IN DROPDOWN</span>
                </div>
            </div>
            <button class="save-btn" onclick="saveSignals()">SAVE SIGNAL CONFIG</button>
        </div>

        <div id="tools" class="section">
            <h2>TOOLS MANAGEMENT</h2>
            <div style="background:#000; padding:20px; border:1px solid #222; margin-bottom:20px;">
                <h3>Add New Tool</h3>
                <label>TOOL NAME</label>
                <input type="text" id="newToolName" placeholder="e.g. Martingale Strategy">
                <label>HTML / JS CODE</label>
                <textarea id="newToolCode" placeholder="Paste your HTML tool code here..."></textarea>
                <button class="save-btn" onclick="addTool()">SAVE & DEPLOY TOOL</button>
            </div>
            
            <h3>Manage Existing Tools</h3>
            <div id="toolsList">
                <div class="list-item">
                    <span>Money Management Tool</span>
                    <div class="status-toggle">
                        <input type="checkbox" checked class="toggle-switch" onchange="autoSave()">
                        <button style="background:none; border:none; color:var(--red); cursor:pointer;">DELETE</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="ads" class="section">
            <h2>ADS MANAGEMENT</h2>
            <div style="margin-bottom:30px;">
                <label>ADS NETWORK VERIFICATION SNIPPET</label>
                <textarea placeholder="Paste snippet from Ad Network..."></textarea>
                <button class="save-btn">VERIFY NETWORK</button>
            </div>
            
            <div style="border-top:1px solid #222; padding-top:20px;">
                <h3>Ad Containers</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <input type="text" placeholder="Width (e.g. 300px)">
                    <input type="text" placeholder="Height (e.g. 250px)">
                </div>
                <textarea placeholder="Ad Snippet Code..." style="margin-top:10px;"></textarea>
                <button class="save-btn">ADD NEW CONTAINER</button>
            </div>
        </div>

        <div id="firebase" class="section">
            <h2>FIREBASE CONNECTIVITY</h2>
            <label>FIREBASE SDK CONFIGURATION (JSON)</label>
            <textarea placeholder='{ "apiKey": "...", "authDomain": "...", ... }'></textarea>
            <button class="save-btn">UPDATE DATABASE LINK</button>
        </div>

        <div id="vps" class="section">
            <h2>VPS SERVER CONFIG</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div><label>IP ADDRESS</label><input type="text" placeholder="0.0.0.0"></div>
                <div><label>USERNAME</label><input type="text" placeholder="root"></div>
                <div><label>PASSWORD</label><input type="password" placeholder="*****"></div>
                <div><label>PORT</label><input type="text" placeholder="22"></div>
            </div>
            <button class="save-btn">CONNECT TO VPS</button>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function saveSignals() {
            const quotex = document.getElementById('quotexPath').value;
            const toxa = document.getElementById('toxaPath').value;
            alert("MT5 Paths Linked:\n" + quotex + "\n" + toxa);
        }

        function addTool() {
            const name = document.getElementById('newToolName').value;
            if(!name) return alert("Enter Tool Name");
            
            const list = document.getElementById('toolsList');
            const newItem = document.createElement('div');
            newItem.className = 'list-item';
            newItem.innerHTML = `<span>${name}</span><div class="status-toggle"><input type="checkbox" checked class="toggle-switch"> <button style="background:none; border:none; color:var(--red); cursor:pointer;">DELETE</button></div>`;
            list.appendChild(newItem);
            
            alert(name + " Added to Home Page Dropdown!");
            document.getElementById('newToolName').value = '';
            document.getElementById('newToolCode').value = '';
        }

        function autoSave() {
            console.log("Settings auto-saved to Firebase...");
        }
    </script>
</body>
</html>
