<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --red: #ff0000;
            --white: #ffffff;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.4);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fixed Layout for Tablet/Desktop */
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif;
        }

        body { display: flex; flex-direction: column; }

        /* --- Admin Header --- */
        .admin-header {
            width: 100%; background: #000; border-bottom: 2px solid var(--red);
            padding: 10px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }

        .brand-section { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .brand-img { max-width: 280px; filter: drop-shadow(0 0 10px var(--red)); transition: var(--transition); }
        .brand-img:hover { transform: scale(1.02); }

        .social-row { display: flex; gap: 20px; margin-top: 8px; }
        .social-row a { color: #fff; font-size: 16px; transition: var(--transition); }
        .social-row a:hover { color: var(--red); transform: translateY(-2px) scale(1.2); }

        .logout-btn {
            background: transparent; border: 1px solid var(--red); color: var(--red);
            padding: 8px 18px; font-family: 'Roboto Mono'; font-weight: bold;
            cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: var(--transition);
        }
        .logout-btn:hover { background: var(--red); color: #fff; box-shadow: var(--neon-glow); }
        .logout-btn:active { transform: scale(0.95); }

        /* --- Main Layout --- */
        .admin-wrapper { display: flex; flex: 1; overflow: hidden; }

        /* --- Sidebar Navigation --- */
                /* --- Sidebar Navigation --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; padding: 15px 10px; overflow-y: hidden; /* Changed to hidden */
        }

        /* Logic for scrollable button container */
        .nav-scroll-container {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: 480px; /* Idi 10 buttons varaku kanipinchela set chesthundhi */
        }

        .nav-scroll-container::-webkit-scrollbar { width: 4px; }
        .nav-scroll-container::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }


        .nav-group-label {
            font-size: 10px; color: #444; margin: 20px 0 10px 10px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }

        .nav-btn {
            background: #0f0f0f; border: 1px solid #1a1a1a; color: #888;
            padding: 12px 15px; margin-bottom: 6px; text-align: left;
            font-family: 'Roboto Mono'; font-size: 12px; text-transform: uppercase;
            cursor: pointer; transition: var(--transition); display: flex;
            align-items: center; gap: 12px; border-radius: 4px; position: relative;
        }

        .nav-btn i { width: 18px; color: var(--red); font-size: 14px; text-align: center; transition: var(--transition); }

        /* White Accent for Analytics Group Icons */
        .nav-btn.white-accent i { color: var(--white); }

        .nav-btn:hover {
            background: #1a0000; color: #fff; border-color: var(--red);
            padding-left: 20px; box-shadow: inset 4px 0 0 var(--red);
        }
        .nav-btn:active { transform: scale(0.97); }

        .nav-btn.active {
            background: var(--red); color: #fff !important; border-color: var(--red);
            box-shadow: var(--neon-glow);
        }
        .nav-btn.active i { color: #fff; }

        /* --- Content Frame --- */
        .content-area {
            flex: 1; padding: 30px; 
            background: radial-gradient(circle at top right, #120000, #050505);
            overflow-y: auto;
        }

        .panel-header { border-left: 5px solid var(--red); padding-left: 20px; margin-bottom: 30px; }
        .panel-header h1 { font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }
        .panel-header p { font-family: 'Roboto Mono'; color: #555; font-size: 13px; margin-top: 5px; }

        .placeholder-card {
            background: rgba(255, 255, 255, 0.02); border: 1px dashed #222;
            padding: 50px; text-align: center; color: #333;
            font-family: 'Roboto Mono'; border-radius: 8px;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <div style="width: 100px;"></div> 
        <div class="brand-section">
            <img src="brand-name.png" alt="RUTHLESS SYSTEM" class="brand-img">
            <div class="social-row">
                <a href="#"><i class="fab fa-telegram"></i></a>

            </div>

    <div class="admin-wrapper">
                <nav class="sidebar">

            <button class="nav-btn white-accent" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            <button class="nav-btn white-accent" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>

            <div class="nav-group-label">Management</div>
            
            <div class="nav-scroll-container">
                <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand-arrows-alt"></i> ST Resize</button>
                <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools Manager</button>

                <button class="nav-btn" onclick="loadContent('Ads Network')"><i class="fas fa-shield-check"></i> Ads Network Verify</button>
                <button class="nav-btn" onclick="loadContent('Ads Containers')"><i class="fas fa-box-open"></i> Ads Containers</button>
                <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-alt"></i> Social Media</button>
                <button class="nav-btn" onclick="loadContent('Brand Name')"><i class="fas fa-id-card"></i> Brand Name</button>
                <button class="nav-btn" onclick="loadContent('Affiliate')"><i class="fas fa-handshake"></i> Affiliate</button>
                <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
                <button class="nav-btn" onclick="loadContent('Join Section')"><i class="fas fa-user-plus"></i> Join</button>
                <button class="nav-btn" onclick="loadContent('Giveaway Winner')"><i class="fas fa-trophy"></i> Giveaway Winner</button>
                <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-fire-alt"></i> Firebase</button>
                <button class="nav-btn" onclick="loadContent('VPS')"><i class="fas fa-server"></i> VPS</button>
                <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
            </div>
        </nav>


        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p>AUTHENTICATED SESSION: BINARY RUTHLESS TRADER</p>
            </div>

            <div id="mainDisplay">
                <div class="placeholder-card">
                    SYSTEM READY. SELECT A MODULE TO CONFIGURE.
                </div>
            </div>
        </main>
    </div>

    <script>
        
        // --- Global Logic for Firebase & UI ---
function loadContent(moduleName) {
    // Memory lo save chesthunnam
    localStorage.setItem('activeModule', moduleName);

    // Update Active Class for Sidebar Buttons
    const buttons = document.querySelectorAll('.nav-btn');
    buttons.forEach(btn => {
        if (btn.innerText.trim() === moduleName) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });

    // Update Header
    document.getElementById('panelHeader').innerHTML = `
        <h1>${moduleName}</h1>
        <p>MANAGING ${moduleName.toUpperCase()} MODULE SETTINGS AND DATA.</p>
    `;

    const mainDisplay = document.getElementById('mainDisplay');

    // --- Module Routing ---
switch (moduleName) {
    case 'Firebase':
        renderFirebaseModule();
        break;

    case 'Signal Connection': // Ikkada changes cheyyali
        renderSignalConnectionModule();
        break;

    case 'Warning Note':
        renderWarningNoteModule();
        break;
        
    default:
        mainDisplay.innerHTML = `
            <div class="placeholder-card">
                <i class="fas fa-sync fa-spin" style="color:var(--red); font-size:24px; margin-bottom:15px;"></i><br>
                [ ${moduleName.toUpperCase()} MODULE LOADED ]
            </div>
        `;
}

// --- Firebase Specific Logic ---
function renderFirebaseModule() {
    const savedConfigs = JSON.parse(localStorage.getItem('fb_configs') || '[]');
    const activeIndex = localStorage.getItem('fb_active_index');

    // UI Styles for Firebase (Inline for safety)
    const fbStyle = `
        <style>
            .fb-container { display: flex; flex-direction: column; gap: 20px; }
            .fb-card { background: #000; border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
            .fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
            .fb-input { 
                background: #080808; border: 1px solid #222; padding: 12px; 
                color: #00ffcc; font-family: 'Roboto Mono'; font-weight: bold; 
                font-size: 13px; border-radius: 4px; transition: 0.3s;
            }
            .fb-input:focus { border-color: var(--red); box-shadow: 0 0 10px rgba(255,0,0,0.2); }
            .status-btn { 
                padding: 6px 12px; font-size: 10px; border-radius: 20px; 
                font-family: 'Roboto Mono'; border: none; font-weight: 900;
            }
            .status-online { background: rgba(0,255,0,0.1); color: #00ff00; border: 1px solid #00ff00; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
            .status-offline { background: rgba(255,0,0,0.1); color: #ff0000; border: 1px solid #ff0000; }
            .fb-list-item { 
                background: #0a0a0a; padding: 15px; border: 1px solid #111; 
                margin-bottom: 8px; display: flex; justify-content: space-between; 
                align-items: center; border-left: 4px solid #333;
            }
            .fb-list-item.active-item { border-left-color: var(--red); background: #110000; }
        </style>
    `;

    let listHtml = savedConfigs.map((cfg, index) => `
        <div class="fb-list-item ${activeIndex == index ? 'active-item' : ''}">
            <div>
                <div style="font-size: 12px; color: #fff;">${cfg.projectId}</div>
                <div style="font-size: 10px; color: #444;">${cfg.authDomain}</div>
            </div>
            <div class="status-btn ${activeIndex == index ? 'status-online' : 'status-offline'}">
                ${activeIndex == index ? '● CONNECTED' : '○ NOT CONNECTED'}
            </div>
        </div>
    `).join('');

    document.getElementById('mainDisplay').innerHTML = fbStyle + `
        <div class="fb-container">
            <div class="fb-card">
                <h2 style="font-size: 14px; color: var(--red); margin-bottom: 20px; letter-spacing: 2px;">ADD NEW FIREBASE CONFIG</h2>
                <div class="fb-grid">
                    <input type="text" id="apiKey" class="fb-input" placeholder="apiKey">
                    <input type="text" id="authDomain" class="fb-input" placeholder="authDomain">
                    <input type="text" id="projectId" class="fb-input" placeholder="projectId">
                    <input type="text" id="storageBucket" class="fb-input" placeholder="storageBucket">
                    <input type="text" id="messagingSenderId" class="fb-input" placeholder="messagingSenderId">
                    <input type="text" id="appId" class="fb-input" placeholder="appId">
                </div>
                <button class="join-btn" onclick="saveFirebaseConfig()" style="width: 100%; height: 45px; font-size: 14px;">CONNECT & SAVE</button>
            </div>

            <div class="fb-card">
                <h2 style="font-size: 14px; color: #fff; margin-bottom: 15px; letter-spacing: 2px;">SAVED CONNECTIONS</h2>
                <div id="fbList">${listHtml || '<p style="color:#222; text-align:center; font-size:12px;">NO DATABASE CONNECTED</p>'}</div>
            </div>
        </div>
    `;
}

function saveFirebaseConfig() {
    const fields = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
    const config = {};
    let isComplete = true;

    fields.forEach(f => {
        const val = document.getElementById(f).value;
        if(!val) isComplete = false;
        config[f] = val;
    });

    if (!isComplete) {
        alert("Please fill all 6 Firebase fields!");
        return;
    }

    let configs = JSON.parse(localStorage.getItem('fb_configs') || '[]');
    configs.push(config);
    
    localStorage.setItem('fb_configs', JSON.stringify(configs));
    localStorage.setItem('fb_active_index', configs.length - 1);
    
    // UI Refresh
    renderFirebaseModule();
}

// Refresh chesinappudu patha module ni load chesthundhi
window.onload = function() {
    const lastModule = localStorage.getItem('activeModule') || 'Views';
    loadContent(lastModule);
};

     function renderWarningNoteModule() {
    const mainDisplay = document.getElementById('mainDisplay');
    
    // Firebase nundi current settings theesukuntunnam (Single Time Fetch)
    database.ref('site_settings/warning_note').once('value').then((snapshot) => {
        const data = snapshot.val() || { content: '', scroll: false };
        
        mainDisplay.innerHTML = `
            <div class="warn-container">
                <h2 style="font-size: 14px; color: var(--red); letter-spacing: 2px;">EDIT WARNING NOTE (FIREBASE LIVE)</h2>
                <textarea id="noteEditor" class="edit-area" placeholder="Enter text here...">${data.content.replace(/<[^>]*>/g, '')}</textarea>
                
                <div style="display: flex; gap: 20px; margin-top: 20px; align-items: center;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="scrollToggle" ${data.scroll ? 'checked' : ''}>
                        <span style="font-size:12px; font-family:'Roboto Mono';">ENABLE SMOOTH SCROLL</span>
                    </label>
                    <button class="join-btn" onclick="saveWarningNote()" style="padding: 10px 30px;">PUBLISH TO CLOUD</button>
                </div>
            </div>
        `;
    });
}

function saveWarningNote() {
    const text = document.getElementById('noteEditor').value;
    const scrollStatus = document.getElementById('scrollToggle').checked;

    // Red Highlight Logic
    let highlightedText = text.replace(/Risk/gi, '<span style="color:red; font-weight:bold;">Risk</span>');
    highlightedText = highlightedText.replace(/Money Management Tool/gi, '<span style="color:red; font-weight:bold;">Money Management Tool</span>');

    // Kevalam Firebase ki mathrame save chesthunnam
    database.ref('site_settings/warning_note').set({
        content: highlightedText,
        scroll: scrollStatus,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
    }).then(() => {
        Swal.fire({ icon: 'success', title: 'FIREBASE UPDATED', background: '#0a0a0a', color: '#fff' });
    }).catch(err => alert("Error: " + err.message));
}


function saveWarningNote() {
    // 1. Input values theesukuntunnam
    const noteEditor = document.getElementById('noteEditor');
    const scrollToggle = document.getElementById('scrollToggle');
    
    if(!noteEditor) {
        alert("Editor not found!");
        return;
    }

    let text = noteEditor.value;
    const scrollStatus = scrollToggle ? scrollToggle.checked : false;

    // 2. Red Highlight Logic
    let highlightedText = text.replace(/Risk/gi, '<span style="color:red; font-weight:bold;">Risk</span>');
    highlightedText = highlightedText.replace(/Money Management Tool/gi, '<span style="color:red; font-weight:bold;">Money Management Tool</span>');

    // 3. Firebase Save Logic
    // database variable initialize ayyi undali (const database = firebase.database();)
    firebase.database().ref('warningSettings').set({
        htmlContent: highlightedText,
        isScroll: scrollStatus,
        lastUpdated: Date.now()
    })
    .then(() => {
        console.log("Data saved successfully!");
        Swal.fire({
            icon: 'success',
            title: 'PUBLISHED',
            text: 'Warning Note Updated Live!',
            confirmButtonColor: '#ff0000',
            background: '#0a0a0a',
            color: '#fff'
        });
        renderWarningNoteModule(); 
    })
    .catch((error) => {
        console.error("Firebase Save Error:", error);
        alert("Error: " + error.message);
    });
}
// Global Database Variable
let database;

// Firebase initialization (Mee Config details ikkada ivvandi)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    databaseURL: "YOUR_DATABASEURL", // Idi thappakunda undali
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
database = firebase.database();
        
    // 1. SIGNAL MODULE UI DESIGN
function renderSignalConnectionModule() {
    const mainDisplay = document.getElementById('mainDisplay');
    
    // Firebase nundi data theesukuntunnam
    firebase.database().ref('signals').once('value').then((snapshot) => {
        const signals = snapshot.val() || {};
        let signalOptions = '<option value="">-- SELECT SIGNAL --</option>';
        
        for (let id in signals) {
            signalOptions += `<option value="${id}">${signals[id].name}</option>`;
        }

        mainDisplay.innerHTML = `
            <style>
                .sig-card { background: #000; border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; }
                .sig-input { 
                    width: 100%; background: #080808; border: 1px solid #222; padding: 12px; 
                    color: #00ffcc; font-family: 'Roboto Mono'; font-weight: bold; margin-bottom: 15px;
                }
                .radio-group { display: flex; gap: 20px; margin: 10px 0; font-family: 'Roboto Mono'; font-size: 13px; }
                .radio-group input { accent-color: var(--red); cursor: pointer; }
                .add-new-btn { 
                    margin-top: 20px; background: transparent; border: 1px dashed var(--red); 
                    color: var(--red); width: 100%; padding: 10px; cursor: pointer; font-family: 'Orbitron';
                }
            </style>

            <div class="sig-card">
                <h2 style="font-size: 14px; color: var(--red); margin-bottom: 20px;">SIGNAL CONNECTION MANAGER</h2>
                
                <select id="signalSelector" class="sig-input" onchange="loadSignalDetails(this.value)">
                    ${signalOptions}
                </select>

                <div id="signalEditor" style="display:none; margin-top:20px; border-top: 1px solid #1a1a1a; padding-top: 20px;">
                    <input type="hidden" id="currentSignalId">
                    <label style="font-size:10px; color:#555;">EDIT NAME</label>
                    <input type="text" id="sigName" class="sig-input" placeholder="Example: Quotex">
                    
                    <label style="font-size:10px; color:#555;">ENTER URL</label>
                    <input type="text" id="sigUrl" class="sig-input" placeholder="websiteurl/quotex">

                    <div class="radio-group">
                        <label><input type="radio" name="sigStatus" value="visible" id="statusVisible"> VISIBLE</label>
                        <label><input type="radio" name="sigStatus" value="hide" id="statusHide"> HIDE</label>
                    </div>

                    <button class="join-btn" onclick="saveSignal()" style="width: 100%; height: 45px; margin-top:10px;">SAVE CHANGES</button>
                </div>

                <button class="add-new-btn" onclick="prepareAddNew()">+ ADD NEW SIGNAL</button>
            </div>
        `;
    });
}

// 2. DATA LOAD LOGIC
function loadSignalDetails(id) {
    if(!id) {
        document.getElementById('signalEditor').style.display = 'none';
        return;
    }
    firebase.database().ref('signals/' + id).once('value').then((snapshot) => {
        const data = snapshot.val();
        document.getElementById('currentSignalId').value = id;
        document.getElementById('sigName').value = data.name;
        document.getElementById('sigUrl').value = data.url;
        if(data.status === 'visible') document.getElementById('statusVisible').checked = true;
        else document.getElementById('statusHide').checked = true;
        
        document.getElementById('signalEditor').style.display = 'block';
    });
}

// 3. PREPARE ADD NEW
function prepareAddNew() {
    document.getElementById('signalSelector').value = "";
    document.getElementById('currentSignalId').value = "sig_" + Date.now();
    document.getElementById('sigName').value = "";
    document.getElementById('sigUrl').value = "";
    document.getElementById('statusVisible').checked = true;
    document.getElementById('signalEditor').style.display = 'block';
}

// 4. FIREBASE SAVE LOGIC
function saveSignal() {
    const id = document.getElementById('currentSignalId').value;
    const name = document.getElementById('sigName').value;
    const url = document.getElementById('sigUrl').value;
    const statusRadio = document.querySelector('input[name="sigStatus"]:checked');
    const status = statusRadio ? statusRadio.value : 'visible';

    if(!name || !url) {
        alert("Please fill all fields!");
        return;
    }

    firebase.database().ref('signals/' + id).set({
        name: name,
        url: url,
        status: status,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
    }).then(() => {
        Swal.fire({
            icon: 'success',
            title: 'SIGNAL UPDATED',
            background: '#0a0a0a',
            color: '#fff',
            confirmButtonColor: '#ff0000'
        });
        renderSignalConnectionModule(); // Refresh list
    });
}           
    </script>
