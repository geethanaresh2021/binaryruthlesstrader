<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruthless Admin | Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --red: #ff0000; --neon: #00ffcc; --panel: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; }
        
        /* Nav Styling */
        .nav { display: flex; flex-wrap: wrap; gap: 10px; border-bottom: 2px solid var(--red); padding-bottom: 15px; margin-bottom: 20px; }
        .nav button { background: transparent; color: #fff; border: 1px solid var(--red); padding: 10px 20px; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .nav button:hover, .nav button.active { background: var(--red); color: #000; font-weight: bold; }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Ads List Styling */
        .ads-list-item { background: var(--panel); border: 1px solid #222; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .ads-list-item:hover { border-color: var(--red); background: #111; }
        .ads-list-item span { color: var(--neon); font-family: 'Roboto Mono'; font-weight: bold; }

        /* Editor Styling */
        .editor-panel { background: #050505; border: 2px solid var(--red); padding: 20px; margin-top: 20px; position: relative; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        input, textarea { background: #000; border: 1px solid #333; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; font-family: 'Roboto Mono'; }
        input.num { color: var(--neon); font-size: 18px; }
        textarea { height: 100px; border-color: #444; }
        label { font-size: 10px; color: #888; display: block; margin-bottom: 5px; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { background: var(--red); color: #fff; border: none; padding: 12px 25px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; width: 100%; }
        .btn-secondary { background: #222; color: #fff; border: none; padding: 10px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <h1 style="color: var(--red); letter-spacing: 5px;">COMMAND CENTER</h1>

    <div class="nav">
        <button onclick="switchTab('signals-section')">SIGNALS</button>
        <button onclick="switchTab('tools-section')">TOOLS</button>
        <button onclick="switchTab('ads-section')">ADS</button>
        <button onclick="switchTab('fb-section')">FIREBASE</button>
        <button onclick="switchTab('vps-section')">VPS</button>
        <button onclick="switchTab('ads-container-section')">ADS CONTAINERS</button>
    </div>

    <div id="signals-section" class="tab-content" style="display: block;">
        <h2>SIGNAL MAPPING</h2>
        <p>Signal settings are here.</p>
    </div>

    <div id="tools-section" class="tab-content"><h2>TOOLS SETTINGS</h2></div>
    <div id="ads-section" class="tab-content"><h2>GENERAL ADS</h2></div>
    <div id="fb-section" class="tab-content"><h2>FIREBASE</h2></div>
    <div id="vps-section" class="tab-content"><h2>VPS</h2></div>

    <div id="ads-container-section" class="tab-content">
        <h3 style="margin-bottom: 20px;">ADD NEW ADS CONTAINER & LIST</h3>
        
        <div id="ads-list-view">
            </div>

        <div id="ads-editor-view" class="editor-panel" style="display: none;">
            <button onclick="backToList()" class="btn-secondary" style="margin-bottom: 15px;">← BACK TO LIST</button>
            <h4 id="editing-title" style="color: var(--red); margin: 0;">EDITING CONTAINER</h4>
            
            <div style="margin-top: 15px;">
                <label>EDIT NAME</label>
                <input type="text" id="edit-name" placeholder="Container Name">
            </div>

            <div class="input-row">
                <div>
                    <label>WIDTH (PX)</label>
                    <input type="number" id="edit-w" class="num" placeholder="300">
                </div>
                <div>
                    <label>HEIGHT (PX)</label>
                    <input type="number" id="edit-h" class="num" placeholder="250">
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label>CHANGE ADS SNIPPET CODE</label>
                <textarea id="edit-snippet" placeholder="Paste Ads Script Here..."></textarea>
            </div>

            <div class="btn-group">
                <button class="btn-save" onclick="saveFinalAd()">SAVE & APPLY TO HOME</button>
                <button class="btn-secondary" style="color: var(--red);" onclick="resetEditor()">RESET</button>
                <button class="btn-secondary" onclick="hideEditorAd()">HIDE</button>
            </div>
        </div>
    </div>

    <script>
        // Data for 6 containers
        let adsData = [
            { id: 'ad-1', name: 'Container 1', w: 300, h: 250, snippet: '' },
            { id: 'ad-2', name: 'Container 2', w: 300, h: 250, snippet: '' },
            { id: 'ad-3', name: 'Container 3', w: 300, h: 250, snippet: '' },
            { id: 'ad-4', name: 'Container 4', w: 300, h: 250, snippet: '' },
            { id: 'ad-5', name: 'Container 5', w: 300, h: 250, snippet: '' },
            { id: 'ad-6', name: 'Container 6', w: 300, h: 250, snippet: '' }
        ];

        let currentId = null;

        function switchTab(id) {
            const sections = ['signals-section', 'tools-section', 'ads-section', 'fb-section', 'vps-section', 'ads-container-section'];
            sections.forEach(s => document.getElementById(s).style.display = 'none');
            document.getElementById(id).style.display = 'block';
            
            if(id === 'ads-container-section') {
                renderAdsList();
                backToList(); // Always show list first
            }
        }

        function renderAdsList() {
            const listDiv = document.getElementById('ads-list-view');
            listDiv.innerHTML = '';
            adsData.forEach((ad, index) => {
                listDiv.innerHTML += `
                    <div class="ads-list-item" onclick="openEditor('${ad.id}')">
                        <div><span>0${index+1}.</span> ${ad.name}</div>
                        <div style="color: #444;">Edit ></div>
                    </div>
                `;
            });
        }

        function openEditor(id) {
            currentId = id;
            const ad = adsData.find(a => a.id === id);
            document.getElementById('ads-list-view').style.display = 'none';
            document.getElementById('ads-editor-view').style.display = 'block';
            
            document.getElementById('editing-title').innerText = "EDITING: " + ad.name;
            document.getElementById('edit-name').value = ad.name;
            document.getElementById('edit-w').value = ad.w;
            document.getElementById('edit-h').value = ad.h;
            document.getElementById('edit-snippet').value = ad.snippet;
        }

        function backToList() {
            document.getElementById('ads-list-view').style.display = 'block';
            document.getElementById('ads-editor-view').style.display = 'none';
        }

        function saveFinalAd() {
            const adIndex = adsData.findIndex(a => a.id === currentId);
            adsData[adIndex].name = document.getElementById('edit-name').value;
            adsData[adIndex].w = document.getElementById('edit-w').value;
            adsData[adIndex].h = document.getElementById('edit-h').value;
            adsData[adIndex].snippet = document.getElementById('edit-snippet').value;

            // Logic to apply to Home Page (Example: LocalStorage)
            localStorage.setItem('ruthless_ads_config', JSON.stringify(adsData));
            
            alert("SUCCESS! " + adsData[adIndex].name + " Saved & Applied to Home Page.");
            renderAdsList();
            backToList();
        }

        function resetEditor() {
            document.getElementById('edit-w').value = 300;
            document.getElementById('edit-h').value = 250;
            document.getElementById('edit-snippet').value = '';
        }

        function hideEditorAd() {
            alert("Ad container hidden from Home Page.");
            backToList();
        }
    </script>
</body>
</html>
