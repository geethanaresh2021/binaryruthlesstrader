<html lang="en">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </header>

    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="nav-group-label">Analytics</div>
            <button class="nav-btn white-accent" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            <button class="nav-btn white-accent" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>

            <div class="nav-group-label">Management</div>
            <div class="nav-scroll-container">
                <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand-arrows-alt"></i> ST Resize</button>
                <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools Manager</button>
                <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signal Connection</button>
                <button class="nav-btn" onclick="loadContent('Ads Network')"><i class="fas fa-shield-check"></i> Ads Network Verify</button>
                <button class="nav-btn" onclick="loadContent('Ads Containers')"><i class="fas fa-box-open"></i> Ads Containers</button>
                <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-alt"></i> Social Media</button>
                <button class="nav-btn" onclick="loadContent('Brand Name')"><i class="fas fa-id-card"></i> Brand Name</button>
                <button class="nav-btn" onclick="loadContent('Affiliate')"><i class="fas fa-handshake"></i> Affiliate</button>
                <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
                <button class="nav-btn" onclick="loadContent('Join Section')"><i class="fas fa-user-plus"></i> Join</button>
                <button class="nav-btn" onclick="loadContent('Giveaway Winner')"><i class="fas fa-trophy"></i> Giveaway Winner</button>
                <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-fire-alt"></i> Firebase</button>
                <button class="nav-btn" onclick="loadContent('VPS')"><i class="fas fa-server"></i> VPS</button>
                <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
                <button class="main-btn" onclick="toggleSection('ads-section')">
    <i class="fas fa-ad"></i> ADS CONTAINERS
</button>

<div id="ads-section" class="section-box" style="display:none; background: #0a0a0a; border: 1px solid #222; padding: 20px; margin-top:10px;">
    <div id="ad-list">
        </div>
</div>

<script>
    // 1. GENERATE ADS LIST
    function loadAdSlots() {
        const adList = document.getElementById('ad-list');
        adList.innerHTML = '';
        
        for(let i=1; i<=8; i++) {
            const div = document.createElement('div');
            div.style = "background:#000; border:1px solid #111; padding:15px; margin-bottom:10px; border-radius:4px;";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <span style="font-family:'Roboto Mono'; color:#00ffcc; font-size:13px;" id="display-name-${i}">AD CONTAINER ${i}</span>
                    <div style="display:flex; gap:8px;">
                        <button onclick="toggleManage(${i})" style="color:#0088ff; background:none; border:1px solid #0088ff; cursor:pointer; padding:4px 10px; font-size:10px; font-family:'Orbitron';">MANAGE</button>
                        <button onclick="updateAdStatus(${i}, false)" style="color:#ffaa00; background:none; border:1px solid #ffaa00; cursor:pointer; padding:4px 10px; font-size:10px; font-family:'Orbitron';">HIDE</button>
                        <button onclick="updateAdStatus(${i}, true)" style="color:#00ff00; background:none; border:1px solid #00ff00; cursor:pointer; padding:4px 10px; font-size:10px; font-family:'Orbitron';">VISIBLE</button>
                    </div>
                </div>

                <div id="manage-panel-${i}" style="display:none; margin-top:15px; border-top:1px solid #222; padding-top:15px;">
                    <label style="color:#777; font-size:10px; display:block; margin-bottom:5px;">CONTAINER NAME</label>
                    <input type="text" id="name-${i}" style="width:100%; padding:10px; background:#050505; border:1px solid #222; color:#fff; margin-bottom:10px;">
                    
                    <label style="color:#777; font-size:10px; display:block; margin-bottom:5px;">ADS SNIPPET (CODE)</label>
                    <textarea id="code-${i}" rows="4" style="width:100%; padding:10px; background:#050505; border:1px solid #222; color:#00ffcc; font-family:'Roboto Mono'; margin-bottom:10px;"></textarea>
                    
                    <label style="color:#777; font-size:10px; display:block; margin-bottom:5px;">SELECT SIZE</label>
                    <select id="size-type-${i}" onchange="toggleCustomSize(${i})" style="width:100%; padding:10px; background:#050505; border:1px solid #222; color:#fff; margin-bottom:10px;">
                        <option value="320x50">320 x 50 (Default)</option>
                        <option value="320x100">320 x 100 (Default)</option>
                        <option value="custom">Custom Size</option>
                    </select>

                    <div id="custom-dims-${i}" style="display:none; gap:10px; margin-bottom:10px;">
                        <input type="number" id="w-${i}" placeholder="Width (px)" style="flex:1; padding:10px; background:#050505; border:1px solid #222; color:#fff;">
                        <input type="number" id="h-${i}" placeholder="Height (px)" style="flex:1; padding:10px; background:#050505; border:1px solid #222; color:#fff;">
                    </div>

                    <button onclick="saveAdSettings(${i})" style="width:100%; background:#ff0000; color:#fff; border:none; padding:12px; cursor:pointer; font-family:'Orbitron'; font-weight:900; text-transform:uppercase;">SAVE & DEPLOY</button>
                </div>
            `;
            adList.appendChild(div);
            fetchAdSettings(i);
        }
    }

    // 2. LOGIC FUNCTIONS
    function toggleManage(i) {
        const panel = document.getElementById(`manage-panel-${i}`);
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function toggleCustomSize(i) {
        const isCustom = document.getElementById(`size-type-${i}`).value === 'custom';
        document.getElementById(`custom-dims-${i}`).style.display = isCustom ? 'flex' : 'none';
    }

    function fetchAdSettings(i) {
        db.ref(`site_settings/ad_containers/slot${i}`).once('value', (s) => {
            const d = s.val();
            if(d) {
                document.getElementById(`name-${i}`).value = d.name || '';
                document.getElementById(`display-name-${i}`).innerText = d.name || `AD CONTAINER ${i}`;
                document.getElementById(`code-${i}`).value = d.code || '';
                document.getElementById(`size-type-${i}`).value = d.sizeType || '320x50';
                if(d.sizeType === 'custom') {
                    document.getElementById(`custom-dims-${i}`).style.display = 'flex';
                    document.getElementById(`w-${i}`).value = d.w;
                    document.getElementById(`h-${i}`).value = d.h;
                }
            }
        });
    }

    function saveAdSettings(i) {
        const sizeType = document.getElementById(`size-type-${i}`).value;
        const data = {
            name: document.getElementById(`name-${i}`).value || `AD CONTAINER ${i}`,
            code: document.getElementById(`code-${i}`).value,
            sizeType: sizeType,
            w: sizeType === 'custom' ? document.getElementById(`w-${i}`).value : 320,
            h: sizeType === 'custom' ? document.getElementById(`h-${i}`).value : (sizeType === '320x100' ? 100 : 50),
            visible: true
        };
        db.ref(`site_settings/ad_containers/slot${i}`).set(data).then(() => {
            Swal.fire({ icon: 'success', title: 'DEPLOYED!', background: '#0a0a0a', color: '#fff', confirmButtonColor: '#ff0000' });
            document.getElementById(`display-name-${i}`).innerText = data.name;
        });
    }

    function updateAdStatus(i, status) {
        db.ref(`site_settings/ad_containers/slot${i}`).update({ visible: status }).then(() => {
            const msg = status ? "CONTAINER VISIBLE" : "CONTAINER HIDDEN";
            Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: msg, showConfirmButton: false, timer: 2000, background: '#0a0a0a', color: '#fff' });
        });
    }

    function toggleSection(id) {
        const sec = document.getElementById(id);
        sec.style.display = sec.style.display === 'block' ? 'none' : 'block';
        if(id === 'ads-section' && sec.style.display === 'block') loadAdSlots();
    }
</script>
        </div>
</div>
            </div>
        </nav>

        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p>AUTHENTICATED SESSION: BINARY RUTHLESS TRADER</p>
            </div>
            <div id="mainDisplay"></div>
        </main>
    </div>

    <script type="module">
        import { updateCloudConfig, saveFirebaseSettings } from './firebase-logic.js';
        window.updateCloudConfig = updateCloudConfig;
        window.saveFirebaseSettings = saveFirebaseSettings;
    </script>

    <script src="admin-script.js"></script>
</body>
</html>
