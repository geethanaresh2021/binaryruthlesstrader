<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --red: #ff0000;
            --white: #ffffff;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.4);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fixed Layout for Tablet/Desktop */
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif;
        }

        body { display: flex; flex-direction: column; }

        /* --- Admin Header --- */
        .admin-header {
            width: 100%; background: #000; border-bottom: 2px solid var(--red);
            padding: 10px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }

        .brand-section { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .brand-img { max-width: 280px; filter: drop-shadow(0 0 10px var(--red)); transition: var(--transition); }
        .brand-img:hover { transform: scale(1.02); }

        .social-row { display: flex; gap: 20px; margin-top: 8px; }
        .social-row a { color: #fff; font-size: 16px; transition: var(--transition); }
        .social-row a:hover { color: var(--red); transform: translateY(-2px) scale(1.2); }

        .logout-btn {
            background: transparent; border: 1px solid var(--red); color: var(--red);
            padding: 8px 18px; font-family: 'Roboto Mono'; font-weight: bold;
            cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: var(--transition);
        }
        .logout-btn:hover { background: var(--red); color: #fff; box-shadow: var(--neon-glow); }

        /* --- Main Layout --- */
        .admin-wrapper { display: flex; flex: 1; overflow: hidden; }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; padding: 15px 10px; overflow-y: hidden;
        }

        .nav-scroll-container {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: 100%;
        }

        .nav-scroll-container::-webkit-scrollbar { width: 4px; }
        .nav-scroll-container::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }

        .nav-group-label {
            font-size: 10px; color: #444; margin: 20px 0 10px 10px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }

        .nav-btn {
            background: #0f0f0f; border: 1px solid #1a1a1a; color: #888;
            padding: 12px 15px; margin-bottom: 6px; text-align: left;
            font-family: 'Roboto Mono'; font-size: 12px; text-transform: uppercase;
            cursor: pointer; transition: var(--transition); display: flex;
            align-items: center; gap: 12px; border-radius: 4px;
        }

        .nav-btn i { width: 18px; color: var(--red); font-size: 14px; text-align: center; }
        .nav-btn.white-accent i { color: var(--white); }

        .nav-btn:hover {
            background: #1a0000; color: #fff; border-color: var(--red);
            padding-left: 20px; box-shadow: inset 4px 0 0 var(--red);
        }

        .nav-btn.active {
            background: var(--red); color: #fff !important; border-color: var(--red);
            box-shadow: var(--neon-glow);
        }
        .nav-btn.active i { color: #fff; }

        /* --- Content Frame --- */
        .content-area {
            flex: 1; padding: 30px; 
            background: radial-gradient(circle at top right, #120000, #050505);
            overflow-y: auto;
        }

        .panel-header { border-left: 5px solid var(--red); padding-left: 20px; margin-bottom: 30px; }
        .panel-header h1 { font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }
        .panel-header p { font-family: 'Roboto Mono'; color: #555; font-size: 13px; margin-top: 5px; }

        /* --- Shared Component Styles --- */
        .placeholder-card {
            background: rgba(255, 255, 255, 0.02); border: 1px dashed #222;
            padding: 50px; text-align: center; color: #333;
            font-family: 'Roboto Mono'; border-radius: 8px;
        }

        .fb-card, .warn-container { background: #000; border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; margin-bottom: 20px; }
        .fb-input, .edit-area { 
            background: #080808; border: 1px solid #222; padding: 12px; 
            color: #00ffcc; font-family: 'Roboto Mono'; font-weight: bold; 
            font-size: 13px; border-radius: 4px; width: 100%;
        }
        .edit-area { height: 150px; resize: none; margin-top: 15px; }
        
        .join-btn {
            background: var(--red); color: #fff; border: none; font-family: 'Orbitron';
            padding: 12px 20px; cursor: pointer; text-transform: uppercase; font-weight: bold;
            transition: 0.3s;
        }
        .join-btn:hover { box-shadow: var(--neon-glow); transform: scale(1.02); }
    </style>
</head>
<body>

    <header class="admin-header">
        <div style="width: 100px;"></div> 
        <div class="brand-section">
            <img src="brand-name.png" alt="RUTHLESS SYSTEM" class="brand-img">
            <div class="social-row">
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </header>

    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="nav-group-label">Analytics</div>
            <button class="nav-btn white-accent" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            <button class="nav-btn white-accent" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>

            <div class="nav-group-label">Management</div>
            <div class="nav-scroll-container">
                <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand-arrows-alt"></i> ST Resize</button>
                <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools Manager</button>
                <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signal Connection</button>
                <button class="nav-btn" onclick="loadContent('Ads Network')"><i class="fas fa-shield-check"></i> Ads Network</button>
                <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-alt"></i> Social Media</button>
                <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
                <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-fire-alt"></i> Firebase</button>
                <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
            </div>
        </nav>

        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p>AUTHENTICATED SESSION: BINARY RUTHLESS TRADER</p>
            </div>
            <div id="mainDisplay">
                <div class="placeholder-card">SYSTEM READY. SELECT A MODULE.</div>
            </div>
        </main>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase safely
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // --- Core Navigation ---
        function loadContent(moduleName) {
            localStorage.setItem('activeModule', moduleName);
            
            // Update Active Buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim() === moduleName);
            });

            document.getElementById('panelHeader').innerHTML = `
                <h1>${moduleName}</h1>
                <p>MANAGING ${moduleName.toUpperCase()} MODULE SETTINGS.</p>
            `;

            const mainDisplay = document.getElementById('mainDisplay');

            switch (moduleName) {
                case 'Firebase':
                    renderFirebaseModule();
                    break;
                case 'Warning Note':
                    renderWarningNoteModule();
                    break;
                default:
                    mainDisplay.innerHTML = `<div class="placeholder-card">[ ${moduleName.toUpperCase()} MODULE LOADED ]</div>`;
            }
        }

        // --- Firebase Module ---
        function renderFirebaseModule() {
            const configs = JSON.parse(localStorage.getItem('fb_configs') || '[]');
            const activeIndex = localStorage.getItem('fb_active_index');

            let listHtml = configs.map((cfg, i) => `
                <div style="background:#0a0a0a; padding:15px; border:1px solid ${activeIndex == i ? 'var(--red)' : '#111'}; margin-bottom:8px; display:flex; justify-content:space-between;">
                    <span style="font-size:12px;">${cfg.projectId}</span>
                    <span style="color:${activeIndex == i ? '#00ff00' : '#444'}; font-size:10px;">${activeIndex == i ? 'ACTIVE' : 'SAVED'}</span>
                </div>
            `).join('') || '<p style="color:#333; font-size:12px; text-align:center;">No configs saved.</p>';

            document.getElementById('mainDisplay').innerHTML = `
                <div class="fb-card">
                    <h2 style="font-size:14px; color:var(--red); margin-bottom:15px;">ADD CONFIG</h2>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <input type="text" id="apiKey" class="fb-input" placeholder="API Key">
                        <input type="text" id="projectId" class="fb-input" placeholder="Project ID">
                    </div>
                    <button class="join-btn" onclick="saveFirebaseConfig()" style="width:100%; margin-top:15px;">Save & Connect</button>
                </div>
                <div class="fb-card">
                    <h2 style="font-size:14px; margin-bottom:15px;">HISTORY</h2>
                    ${listHtml}
                </div>
            `;
        }

        function saveFirebaseConfig() {
            const apiKey = document.getElementById('apiKey').value;
            const projectId = document.getElementById('projectId').value;
            if(!apiKey || !projectId) return alert("Fill fields!");

            let configs = JSON.parse(localStorage.getItem('fb_configs') || '[]');
            configs.push({apiKey, projectId});
            localStorage.setItem('fb_configs', JSON.stringify(configs));
            localStorage.setItem('fb_active_index', configs.length - 1);
            renderFirebaseModule();
        }

        // --- Warning Note Module ---
        function renderWarningNoteModule() {
            database.ref('site_settings/warning_note').once('value').then(snap => {
                const data = snap.val() || { content: '', scroll: false };
                document.getElementById('mainDisplay').innerHTML = `
                    <div class="warn-container">
                        <h2 style="font-size:14px; color:var(--red);">LIVE WARNING NOTE</h2>
                        <textarea id="noteEditor" class="edit-area">${data.content.replace(/<[^>]*>/g, '')}</textarea>
                        <div style="margin-top:20px; display:flex; gap:20px; align-items:center;">
                            <label><input type="checkbox" id="scrollToggle" ${data.scroll ? 'checked' : ''}> SCROLL</label>
                            <button class="join-btn" onclick="saveWarningNote()">PUBLISH TO CLOUD</button>
                        </div>
                    </div>
                `;
            });
        }

        function saveWarningNote() {
            const text = document.getElementById('noteEditor').value;
            const scroll = document.getElementById('scrollToggle').checked;

            let html = text.replace(/Risk/gi, '<span style="color:red; font-weight:bold;">Risk</span>')
                           .replace(/Money Management Tool/gi, '<span style="color:red; font-weight:bold;">Money Management Tool</span>');

            database.ref('site_settings/warning_note').set({
                content: html,
                scroll: scroll,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                Swal.fire({ icon: 'success', title: 'PUBLISHED', background: '#0a0a0a', color: '#fff', confirmButtonColor: '#f00' });
            });
        }

        window.onload = () => loadContent(localStorage.getItem('activeModule') || 'Views');
    </script>
</body>
</html>
