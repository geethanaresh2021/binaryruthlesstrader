<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --red: #ff0000;
            --white: #ffffff;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.4);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif;
        }

        body { display: flex; flex-direction: column; }

        /* --- Admin Header --- */
        .admin-header {
            width: 100%; background: #000; border-bottom: 2px solid var(--red);
            padding: 10px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }

        .brand-section { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .brand-img { max-width: 280px; filter: drop-shadow(0 0 10px var(--red)); transition: var(--transition); }

        .social-row { display: flex; gap: 20px; margin-top: 8px; }
        .social-row a { color: #fff; font-size: 16px; transition: var(--transition); }
        .social-row a:hover { color: var(--red); transform: scale(1.2); }

        .logout-btn {
            background: transparent; border: 1px solid var(--red); color: var(--red);
            padding: 8px 18px; font-family: 'Roboto Mono'; font-weight: bold;
            cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: var(--transition);
        }
        .logout-btn:hover { background: var(--red); color: #fff; box-shadow: var(--neon-glow); }

        /* --- Main Layout --- */
        .admin-wrapper { display: flex; flex: 1; overflow: hidden; }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; padding: 15px 10px; overflow-y: hidden;
        }

        .nav-scroll-container {
            display: flex; flex-direction: column; overflow-y: auto; max-height: 100%;
        }

        .nav-scroll-container::-webkit-scrollbar { width: 4px; }
        .nav-scroll-container::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }

        .nav-group-label {
            font-size: 10px; color: #444; margin: 20px 0 10px 10px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }

        .nav-btn {
            background: #0f0f0f; border: 1px solid #1a1a1a; color: #888;
            padding: 12px 15px; margin-bottom: 6px; text-align: left;
            font-family: 'Roboto Mono'; font-size: 12px; text-transform: uppercase;
            cursor: pointer; transition: var(--transition); display: flex;
            align-items: center; gap: 12px; border-radius: 4px;
        }

        .nav-btn i { width: 18px; color: var(--red); font-size: 14px; text-align: center; }
        .nav-btn.white-accent i { color: var(--white); }

        .nav-btn:hover, .nav-btn.active {
            background: #1a0000; color: #fff; border-color: var(--red);
            padding-left: 20px; box-shadow: inset 4px 0 0 var(--red);
        }
        .nav-btn.active { background: var(--red) !important; box-shadow: var(--neon-glow); }
        .nav-btn.active i { color: #fff; }

        /* --- Content Frame --- */
        .content-area {
            flex: 1; padding: 30px; 
            background: radial-gradient(circle at top right, #120000, #050505);
            overflow-y: auto;
        }

        .panel-header { border-left: 5px solid var(--red); padding-left: 20px; margin-bottom: 30px; }
        .panel-header h1 { font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }
        .panel-header p { font-family: 'Roboto Mono'; color: #555; font-size: 13px; margin-top: 5px; }

        /* --- Module Components --- */
        .module-card { background: #000; border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 800px; animation: fadeIn 0.3s ease; }
        .input-box { width: 100%; background: #080808; border: 1px solid #222; padding: 12px; color: #00ffcc; font-family: 'Roboto Mono'; font-weight: bold; margin-bottom: 15px; border-radius: 4px; outline: none; }
        .input-label { font-size: 10px; color: #666; margin-bottom: 5px; display: block; text-transform: uppercase; }
        .action-btn { width: 100%; padding: 15px; background: var(--red); border: none; color: #fff; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: var(--neon-glow); border-radius: 4px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="admin-header">
        <div style="width: 100px;"></div> 
        <div class="brand-section">
            <img src="brand-name.png" alt="RUTHLESS SYSTEM" class="brand-img">
            <div class="social-row">
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </header>

    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="nav-group-label">Analytics</div>
            <button class="nav-btn white-accent" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            <button class="nav-btn white-accent" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>

            <div class="nav-group-label">Management</div>
            <div class="nav-scroll-container">
                <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand-arrows-alt"></i> ST Resize</button>
                <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools Manager</button>
                <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signal Connection</button>
                <button class="nav-btn" onclick="loadContent('Ads Network')"><i class="fas fa-shield-check"></i> Ads Network Verify</button>
                <button class="nav-btn" onclick="loadContent('Ads Containers')"><i class="fas fa-box-open"></i> Ads Containers</button>
                <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-alt"></i> Social Media</button>
                <button class="nav-btn" onclick="loadContent('Brand Name')"><i class="fas fa-id-card"></i> Brand Name</button>
                <button class="nav-btn" onclick="loadContent('Affiliate')"><i class="fas fa-handshake"></i> Affiliate</button>
                <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
                <button class="nav-btn" onclick="loadContent('Join Section')"><i class="fas fa-user-plus"></i> Join</button>
                <button class="nav-btn" onclick="loadContent('Giveaway Winner')"><i class="fas fa-trophy"></i> Giveaway Winner</button>
                <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-fire-alt"></i> Firebase</button>
                <button class="nav-btn" onclick="loadContent('VPS')"><i class="fas fa-server"></i> VPS</button>
                <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
            </div>
        </nav>

        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p>AUTHENTICATED SESSION: BINARY RUTHLESS TRADER</p>
            </div>
            <div id="mainDisplay">
                </div>
        </main>
    </div>

    <script type="module">
        import { updateCloudConfig, saveFirebaseSettings } from './firebase-logic.js';
        window.updateCloudConfig = updateCloudConfig;
        window.saveFirebaseSettings = saveFirebaseSettings;
    </script>

    <script>
        let database;

        function loadContent(moduleName) {
            localStorage.setItem('activeModule', moduleName);
            
            // Update Sidebar UI
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim() === moduleName);
            });

            // Update Panel Header
            document.getElementById('panelHeader').innerHTML = `<h1>${moduleName}</h1><p>MANAGING ${moduleName.toUpperCase()} MODULE SETTINGS.</p>`;

            const mainDisplay = document.getElementById('mainDisplay');

            // --- 16 MODULE SWITCH LOGIC ---
            switch (moduleName) {
                case 'Views':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Live Traffic</label><h1 style="color:var(--red); font-size:40px;">24,850</h1><p style="color:#555;">Real-time User Count Active</p></div>`;
                    break;
                case 'Revenue':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Estimated Revenue (INR)</label><h1 style="color:#00ffcc; font-size:40px;">₹ 15,240.00</h1><button class="action-btn" style="margin-top:20px;">SYNC WITH ADS</button></div>`;
                    break;
                case 'ST Resize':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Main Container Width (px)</label><input type="text" id="screenWidth" class="input-box" value="1280"><label class="input-label">Disable Zoom (0/1)</label><input type="number" id="zoomDisable" class="input-box" value="1"><button class="action-btn" onclick="saveSTResize()">APPLY LAYOUT</button></div>`;
                    break;
                case 'Tools Manager':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Active Tool ID</label><input type="text" class="input-box" placeholder="Tool Name"><label class="input-label">Visibility</label><select class="input-box"><option>VISIBLE</option><option>HIDDEN</option></select><button class="action-btn" onclick="saveLogic()">SAVE TOOLS</button></div>`;
                    break;
                case 'Signal Connection':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Signal Source URL</label><input type="text" id="sigUrl" class="input-box" placeholder="https://api.signals.com"><label class="input-label">Platform</label><input type="text" id="sigPlat" class="input-box" value="QUOTEX"><button class="action-btn" onclick="saveSignalConn()">CONNECT LIVE</button></div>`;
                    break;
                case 'Ads Network':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Network API Key</label><input type="text" class="input-box" placeholder="ADS-XXXX-XXXX"><button class="action-btn" onclick="saveLogic()">VERIFY NETWORK</button></div>`;
                    break;
                case 'Ads Containers':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Refresh Interval (Seconds)</label><input type="number" id="adRefresh" class="input-box" value="30"><label class="input-label">Ad Unit Script</label><textarea id="adScript" class="input-box" rows="4"></textarea><button class="action-btn" onclick="saveAdsConfig()">UPDATE ADS</button></div>`;
                    break;
                case 'Social Media':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Telegram URL</label><input type="text" id="tgUrl" class="input-box" placeholder="t.me/yourlink"><label class="input-label">YouTube URL</label><input type="text" id="ytUrl" class="input-box" placeholder="youtube.com/c/..."><button class="action-btn" onclick="saveSocialLinks()">UPDATE SOCIALS</button></div>`;
                    break;
                case 'Brand Name':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Header Title</label><input type="text" id="brandTitle" class="input-box" value="BINARY RUTHLESS TRADER"><button class="action-btn" onclick="saveBrandName()">UPDATE BRAND</button></div>`;
                    break;
                case 'Affiliate':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Affiliate ID</label><input type="text" class="input-box" placeholder="RUTHLESS-001"><button class="action-btn" onclick="saveLogic()">SAVE AFFILIATE</button></div>`;
                    break;
                case 'Warning Note':
                    renderWarningNoteModule(); 
                    break;
                case 'Join Section':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">Button Text</label><input type="text" id="joinText" class="input-box" value="JOIN PREMIUM"><button class="action-btn" onclick="saveJoinSection()">UPDATE SECTION</button></div>`;
                    break;
                case 'Giveaway Winner':
                    renderGiveawayModule();
                    break;
                case 'Firebase':
                    renderFirebaseModule(); // Your existing logic
                    break;
                case 'VPS':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">VPS Server Status</label><h3 style="color:#00ff00;">ONLINE</h3><label class="input-label" style="margin-top:15px;">Target IP</label><input type="text" class="input-box" value="45.12.88.XX"><button class="action-btn" onclick="saveLogic()">RESTART SERVER</button></div>`;
                    break;
                case 'Security':
                    mainDisplay.innerHTML = `<div class="module-card"><label class="input-label">New Admin Password</label><input type="password" class="input-box" placeholder="******"><button class="action-btn" onclick="saveLogic()">UPDATE SECURITY</button></div>`;
                    break;
            }
        }

        // --- FIREBASE MODULE (ADVANCED 8-FIELD VERSION) ---
        function renderFirebaseModule() {
            const configs = JSON.parse(localStorage.getItem('firebaseConfigsList') || '[]');
            const activeConfigId = localStorage.getItem('activeFirebaseId');
            const mainDisplay = document.getElementById('mainDisplay');

            mainDisplay.innerHTML = `
                <div class="module-card">
                    <h2 style="font-size:12px; color:var(--red); margin-bottom:15px; letter-spacing:1px;">FIREBASE SETUP (8-FIELDS)</h2>
                    
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div><label class="input-label">API Key</label><input type="text" id="apiKey" class="input-box" placeholder="apiKey"></div>
                        <div><label class="input-label">Auth Domain</label><input type="text" id="authDomain" class="input-box" placeholder="authDomain"></div>
                        <div><label class="input-label">Database URL</label><input type="text" id="databaseURL" class="input-box" placeholder="https://..."></div>
                        <div><label class="input-label">Project ID</label><input type="text" id="projectId" class="input-box" placeholder="projectId"></div>
                        <div><label class="input-label">Storage Bucket</label><input type="text" id="storageBucket" class="input-box" placeholder="storageBucket"></div>
                        <div><label class="input-label">Messaging Sender ID</label><input type="text" id="messagingSenderId" class="input-box" placeholder="senderId"></div>
                        <div><label class="input-label">App ID</label><input type="text" id="appId" class="input-box" placeholder="appId"></div>
                        <div><label class="input-label">Measurement ID</label><input type="text" id="measurementId" class="input-box" placeholder="G-XXXXXX"></div>
                    </div>

                    <button class="action-btn" onclick="addNewFirebaseConfig()" style="margin-top:10px;">CONNECT DATABASE</button>
                    
                    <div style="margin-top:20px; padding:15px; background:#0a0a0a; border:1px solid #111; border-radius:4px;">
                        <label class="input-label">CONNECTION STATUS</label>
                        <div id="connectionStatus" style="font-family:'Roboto Mono'; font-size:14px; font-weight:bold; display:flex; align-items:center; gap:10px; color:${activeConfigId ? '#00ffcc' : '#ff0000'};">
                            <span style="height:10px; width:10px; border-radius:50%; background:${activeConfigId ? '#00ffcc' : '#ff0000'}; box-shadow: 0 0 10px ${activeConfigId ? '#00ffcc' : '#ff0000'};"></span>
                            ${activeConfigId ? 'CONNECTED: ' + activeConfigId : 'NOT CONNECTED'}
                        </div>
                    </div>

                    <hr style="border:0.5px solid #1a1a1a; margin:25px 0;">
                    
                    <h2 style="font-size:12px; color:#fff; margin-bottom:12px; letter-spacing:1px;">SAVED DATABASES</h2>
                    <div id="configList" style="display:flex; flex-direction:column; gap:10px;">
                        ${configs.length === 0 ? '<p style="color:#444; font-size:11px;">No databases saved yet.</p>' : ''}
                        ${configs.map(cfg => `
                            <div style="background:#080808; padding:12px; border:1px solid #1a1a1a; display:flex; justify-content:space-between; align-items:center; border-left: 4px solid ${activeConfigId === cfg.projectId ? '#00ffcc' : '#333'};">
                                <div>
                                    <div style="font-family:'Roboto Mono'; font-size:12px; color:#eee;">${cfg.projectId}</div>
                                    <div style="font-size:9px; color:#555;">${cfg.databaseURL.substring(0, 30)}...</div>
                                </div>
                                <div style="display:flex; gap:8px;">
                                    <button onclick="activateConfig('${cfg.projectId}')" style="background:transparent; color:#00ffcc; border:1px solid #00ffcc; padding:6px 10px; font-size:10px; font-family:'Roboto Mono'; cursor:pointer; border-radius:3px;">CONNECT</button>
                                    <button onclick="deleteConfig('${cfg.projectId}')" style="background:transparent; color:#ff0000; border:1px solid #ff0000; padding:6px 10px; font-size:10px; font-family:'Roboto Mono'; cursor:pointer; border-radius:3px;">DELETE</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        // --- GIVEAWAY WINNER MODULE (LIVE PREVIEW & CLOUD SYNC) ---
        function renderGiveawayModule() {
            const mainDisplay = document.getElementById('mainDisplay');
            // Fetch existing settings (optional: from localStorage or Cloud)
            const savedData = JSON.parse(localStorage.getItem('giveawayData') || '{"winner":"@User_Name", "scroll":true, "status":"VISIBLE"}');

            mainDisplay.innerHTML = `
                <div class="module-card">
                    <h2 style="font-size:12px; color:var(--red); margin-bottom:15px; letter-spacing:1px;">LIVE PREVIEW</h2>
                    
                    <div id="giveawayPreview" style="background:#0a0a0a; border:1px solid var(--red); height:60px; display:flex; align-items:center; overflow:hidden; position:relative; margin-bottom:25px; border-radius:4px;">
                        <div style="background:var(--red); color:#fff; height:100%; padding:0 15px; display:flex; align-items:center; font-size:12px; font-weight:900; z-index:2; position:absolute; left:0; box-shadow:10px 0 20px #000;">GIVEAWAY WINNER</div>
                        <div id="scrollWrapper" style="white-space:nowrap; padding-left:160px; color:#00ffcc; font-family:'Roboto Mono'; font-weight:bold; font-size:16px; ${savedData.scroll ? 'animation: scrollText 10s linear infinite;' : ''}">
                            CONGRATULATIONS TO <span id="previewName">${savedData.winner}</span> FOR WINNING THE PREMIUM GIVEAWAY!
                        </div>
                    </div>

                    <style>
                        @keyframes scrollText {
                            0% { transform: translateX(100%); }
                            100% { transform: translateX(-150%); }
                        }
                    </style>

                    <h2 style="font-size:12px; color:#fff; margin-bottom:15px;">ENTER DETAILS</h2>
                    <div style="display:flex; flex-direction:column; gap:15px;">
                        <div>
                            <label class="input-label">Winner Username / Text</label>
                            <input type="text" id="winnerName" class="input-box" value="${savedData.winner}" oninput="document.getElementById('previewName').innerText = this.value" placeholder="@username">
                        </div>

                        <div style="display:flex; align-items:center; gap:10px; background:#080808; padding:10px; border:1px solid #111;">
                            <input type="checkbox" id="scrollCheck" ${savedData.scroll ? 'checked' : ''} onchange="togglePreviewScroll(this.checked)">
                            <label class="input-label" style="margin:0; cursor:pointer;">ENABLE SMOOTH SCROLL (RIGHT TO LEFT)</label>
                        </div>

                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:10px;">
                            <button class="action-btn" style="background:#333; box-shadow:none;" onclick="document.getElementById('winnerName').focus()">EDIT</button>
                            <button class="action-btn" id="hideBtn" style="background:${savedData.status === 'HIDDEN' ? '#444' : '#660000'}; box-shadow:none;" onclick="toggleGiveawayVisibility()">${savedData.status === 'HIDDEN' ? 'SHOW' : 'HIDE'}</button>
                            <button class="action-btn" onclick="saveGiveawayToCloud()">SAVE & PUBLISH</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- GIVEAWAY LOGIC HELPERS ---
        function togglePreviewScroll(isScrolling) {
            const wrapper = document.getElementById('scrollWrapper');
            wrapper.style.animation = isScrolling ? 'scrollText 10s linear infinite' : 'none';
        }

        function toggleGiveawayVisibility() {
            const btn = document.getElementById('hideBtn');
            if (btn.innerText === 'HIDE') {
                btn.innerText = 'SHOW';
                btn.style.background = '#444';
            } else {
                btn.innerText = 'HIDE';
                btn.style.background = '#660000';
            }
        }

        function saveGiveawayToCloud() {
            const winnerText = document.getElementById('winnerName').value;
            const isScrolling = document.getElementById('scrollCheck').checked;
            const currentStatus = document.getElementById('hideBtn').innerText === 'HIDE' ? 'VISIBLE' : 'HIDDEN';

            const giveawayData = {
                winner: winnerText,
                scroll: isScrolling,
                status: currentStatus,
                timestamp: new Date().getTime()
            };

            // 1. Save to Local Memory
            localStorage.setItem('giveawayData', JSON.stringify(giveawayData));

            // 2. Sync to Firebase Cloud
            if (window.updateCloudConfig) {
                window.updateCloudConfig('site_settings/giveaway', giveawayData);
            }

            // Success Alert
            Swal.fire({
                icon: 'success',
                title: 'PUBLISHED TO HOME',
                text: 'Winner details are now live on the home page.',
                confirmButtonColor: '#ff0000',
                background: '#0a0a0a',
                color: '#fff'
            });
        }

        // --- CORE LOGIC FUNCTIONS ---
        function addNewFirebaseConfig() {
            const config = {
                apiKey: document.getElementById('apiKey').value,
                authDomain: document.getElementById('authDomain').value,
                databaseURL: document.getElementById('databaseURL').value,
                projectId: document.getElementById('projectId').value,
                storageBucket: document.getElementById('storageBucket').value,
                messagingSenderId: document.getElementById('messagingSenderId').value,
                appId: document.getElementById('appId').value,
                measurementId: document.getElementById('measurementId').value
            };

            if(!config.projectId || !config.apiKey || !config.databaseURL) {
                Swal.fire({ icon: 'error', title: 'MISSING DATA', text: 'Please fill Project ID, API Key, and Database URL.', background: '#0a0a0a', color: '#fff' });
                return;
            }

            let configs = JSON.parse(localStorage.getItem('firebaseConfigsList') || '[]');
            // Remove if duplicate exists
            configs = configs.filter(c => c.projectId !== config.projectId);
            configs.push(config);
            
            localStorage.setItem('firebaseConfigsList', JSON.stringify(configs));
            activateConfig(config.projectId);
        }

        function activateConfig(pid) {
            const configs = JSON.parse(localStorage.getItem('firebaseConfigsList') || '[]');
            const target = configs.find(c => c.projectId === pid);
            
            if(target) {
                localStorage.setItem('activeFirebaseId', pid);
                localStorage.setItem('firebaseConfig', JSON.stringify(target));
                
                // logic.js లో ఉన్న కనెక్షన్ ఫంక్షన్ ని పిలుస్తుంది
                if (window.saveFirebaseSettings) {
                    window.saveFirebaseSettings(target);
                }
                
                Swal.fire({
                    icon: 'success', 
                    title: 'SYSTEM ONLINE', 
                    text: `Connected to: ${pid}`,
                    background: '#0a0a0a', 
                    color: '#fff',
                    confirmButtonColor: '#ff0000'
                });
                renderFirebaseModule();
            }
        }

        function deleteConfig(pid) {
            Swal.fire({
                title: 'DELETE DATABASE?',
                text: "Credentials will be removed from local memory.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff0000',
                cancelButtonColor: '#333',
                background: '#050505',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    let configs = JSON.parse(localStorage.getItem('firebaseConfigsList') || '[]');
                    configs = configs.filter(c => c.projectId !== pid);
                    localStorage.setItem('firebaseConfigsList', JSON.stringify(configs));
                    
                    if(localStorage.getItem('activeFirebaseId') === pid) {
                        localStorage.removeItem('activeFirebaseId');
                        localStorage.removeItem('firebaseConfig');
                    }
                    renderFirebaseModule();
                }
            });
        }

        // --- WARNING NOTE MODULE ---
        function renderWarningNoteModule() {
            const mainDisplay = document.getElementById('mainDisplay');
            mainDisplay.innerHTML = `
                <div class="module-card">
                    <label class="input-label">WARNING TEXT</label>
                    <textarea id="noteEditor" class="input-box" rows="4">Warning: Trading has risk...</textarea>
                    <label class="input-label"><input type="checkbox" id="scrollToggle" checked> ENABLE SMOOTH SCROLL</label>
                    <button class="action-btn" onclick="saveWarningNote()">PUBLISH TO CLOUD</button>
                </div>
            `;
        }

        // --- CLOUD SYNC HELPERS ---
        function saveWarningNote() {
            const data = { content: document.getElementById('noteEditor').value, scroll: document.getElementById('scrollToggle').checked };
            window.updateCloudConfig('site_settings/warning_note', data);
            saveLogic();
        }

        function saveSTResize() {
            const data = { width: document.getElementById('screenWidth').value, noZoom: document.getElementById('zoomDisable').value };
            window.updateCloudConfig('site_settings/layout', data);
            saveLogic();
        }

        function saveBrandName() {
            window.updateCloudConfig('site_settings/brand', { title: document.getElementById('brandTitle').value });
            saveLogic();
        }

        function saveSocialLinks() {
            window.updateCloudConfig('site_settings/socials', { telegram: document.getElementById('tgUrl').value, youtube: document.getElementById('ytUrl').value });
            saveLogic();
        }

        function saveAdsConfig() {
            window.updateCloudConfig('site_settings/ads', { refresh: document.getElementById('adRefresh').value, script: document.getElementById('adScript').value });
            saveLogic();
        }

        function saveSignalConn() {
            window.updateCloudConfig('site_settings/signals', { url: document.getElementById('sigUrl').value, platform: document.getElementById('sigPlat').value });
            saveLogic();
        }

        function saveJoinSection() {
            window.updateCloudConfig('site_settings/join', { text: document.getElementById('joinText').value });
            saveLogic();
        }

        function saveLogic() {
            Swal.fire({
                icon: 'success',
                title: 'PUBLISHED',
                text: 'Cloud sync successful!',
                confirmButtonColor: '#ff0000',
                background: '#0a0a0a',
                color: '#fff'
            });
        }

        window.onload = () => {
            loadContent(localStorage.getItem('activeModule') || 'Views');
        };
    </script>
</body>
</html>
