<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin - Binary Ruthless</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
body { background: #000; color: #fff; padding: 20px; font-family: sans-serif; }
.card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #222; color: #00ffcc; border: 1px solid #444; }
button { padding: 10px 20px; cursor: pointer; background: #ff3344; color: white; border: none; border-radius: 5px; }
</style>
</head>
<body>
<div class="card">
    <h2>Settings Management</h2>
    <label>Warning Note:</label>
    <textarea id="editWarning"></textarea>
    <label>Footer Text:</label>
    <input type="text" id="editFooter">
    <button onclick="saveBranding()">Save Changes</button>
</div>
<div class="card">
    <h2>Security</h2>
    <label>New Access Password:</label>
    <input type="password" id="newAdminPassword">
    <button onclick="savePassword()">Update Password</button>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyA2ILDlxtYs2CT-2mJItRV1NApSIaH4t3g", authDomain: "binary-ruthless-trader-26654.firebaseapp.com", projectId: "binary-ruthless-trader-26654", storageBucket: "binary-ruthless-trader-26654.appspot.com", messagingSenderId: "533209261799", appId: "1:533209261799:web:a398ab21b0f913683ea442" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function saveBranding() {
        const w = document.getElementById('editWarning').value;
        const f = document.getElementById('editFooter').value;
        await db.collection('settings').doc('brandingControl').set({ warningText: w, footerText: f }, { merge: true });
        alert("Settings Saved Successfully!");
    }

    async function savePassword() {
        const p = document.getElementById('newAdminPassword').value;
        await db.collection('settings').doc('gatekeeperLock').set({ passkeyString: p }, { merge: true });
        alert("Password Updated!");
    }
</script>
</body>
</html>
