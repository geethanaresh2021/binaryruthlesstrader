<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --red: #ff0000;
            --dark-red: #8b0000;
            --green: #00ffcc;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fixed Layout for Tablet/Desktop */
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        html, body { 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif;
        }

        body { display: flex; flex-direction: column; }

        /* --- Admin Header --- */
        .admin-header {
            width: 100%;
            background: #000;
            border-bottom: 2px solid var(--red);
            padding: 10px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .brand-img {
            max-width: 280px;
            filter: drop-shadow(0 0 10px var(--red));
        }

        .social-row {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .social-row a {
            color: #fff;
            font-size: 16px;
            transition: var(--transition);
        }

        .social-row a:hover {
            color: var(--red);
            transform: scale(1.2);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 8px 18px;
            font-family: 'Roboto Mono';
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: var(--red);
            color: #fff;
            box-shadow: var(--neon-glow);
        }

        /* --- Main Layout --- */
        .admin-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            padding: 15px 10px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--red) #000;
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--red); }

        .nav-group-label {
            font-size: 10px;
            color: #444;
            margin: 15px 0 8px 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-btn {
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            color: #888;
            padding: 12px 15px;
            margin-bottom: 6px;
            text-align: left;
            font-family: 'Roboto Mono';
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 4px;
        }

        .nav-btn i {
            width: 18px;
            color: var(--red);
            font-size: 14px;
            text-align: center;
        }

        .nav-btn.new-btn i {
            color: var(--green); /* Highlights Views & Revenue */
        }

        .nav-btn:hover {
            background: #1a0000;
            color: #fff;
            border-color: var(--red);
            padding-left: 20px;
        }

        .nav-btn.active {
            background: var(--red);
            color: #fff !important;
            border-color: var(--red);
            box-shadow: var(--neon-glow);
        }

        /* --- Content Frame --- */
        .content-area {
            flex: 1;
            padding: 30px;
            background: radial-gradient(circle at top right, #120000, #050505);
            overflow-y: auto;
        }

        .panel-header {
            border-left: 5px solid var(--red);
            padding-left: 20px;
            margin-bottom: 30px;
        }

        .panel-header h1 {
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .panel-header p {
            font-family: 'Roboto Mono';
            color: #555;
            font-size: 13px;
            margin-top: 5px;
        }

        .placeholder-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed #222;
            padding: 50px;
            text-align: center;
            color: #333;
            font-family: 'Roboto Mono';
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <div style="width: 100px;"></div> <div class="brand-section">
            <img src="brand-name.png" alt="RUTHLESS SYSTEM" class="brand-img">
            <div class="social-row">
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>

        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </header>

    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="nav-group-label">Analytics</div>
            <button class="nav-btn new-btn" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            <button class="nav-btn new-btn" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>

            <div class="nav-group-label">Management</div>
            <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand-arrows-alt"></i> ST Resize</button>
            <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools Manager</button>
            <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signal Connection</button>
            <button class="nav-btn" onclick="loadContent('Ads Network')"><i class="fas fa-shield-check"></i> Ads Network Verify</button>
            <button class="nav-btn" onclick="loadContent('Ads Containers')"><i class="fas fa-box-open"></i> Ads Containers</button>
            <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-alt"></i> Social Media</button>
            <button class="nav-btn" onclick="loadContent('Brand Name')"><i class="fas fa-id-card"></i> Brand Name</button>
            <button class="nav-btn" onclick="loadContent('Affiliate')"><i class="fas fa-handshake"></i> Affiliate</button>
            <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
            <button class="nav-btn" onclick="loadContent('Join Section')"><i class="fas fa-user-plus"></i> Join</button>
            <button class="nav-btn" onclick="loadContent('Website SEO')"><i class="fas fa-search"></i> Website SEO</button>
            <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-fire-alt"></i> Firebase</button>
            <button class="nav-btn" onclick="loadContent('VPS')"><i class="fas fa-server"></i> VPS</button>
            <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
        </nav>

        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p>Select a module from the sidebar to start managing.</p>
            </div>

            <div id="mainDisplay">
                <div class="placeholder-card">
                    SYSTEM READY. AWAITING INPUT...
                </div>
            </div>
        </main>
    </div>

    <script>
        function loadContent(moduleName) {
            // Update Active Class
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => {
                if(btn.innerText.includes(moduleName)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Update Header
            document.getElementById('panelHeader').innerHTML = `
                <h1>${moduleName}</h1>
                <p>Managing ${moduleName} module settings and data.</p>
            `;

            // Placeholder for future logic
            document.getElementById('mainDisplay').innerHTML = `
                <div class="placeholder-card">
                    [ ${moduleName} MODULE LOADED ]<br>
                    <small style="color:#555">Functions for this module will be added in the next step.</small>
                </div>
            `;
        }
    </script>
</body>
</html>
