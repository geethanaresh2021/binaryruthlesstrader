<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ruthless Admin | Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --green: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 30px; }
        .nav-btn { background: #111; border: 1px solid #333; color: #fff; padding: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; }
        .nav-btn.active { border-color: var(--red); color: var(--red); }
        .panel { display: none; background: #0a0a0a; border: 1px solid #222; padding: 25px; border-radius: 8px; }
        .panel.active { display: block; }
        input, textarea { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--green); font-family: 'Roboto Mono'; margin-top: 10px; outline: none; }
        .save-btn { background: var(--red); border: none; color: #fff; padding: 15px 30px; margin-top: 20px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; }
        .toggle-row { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        /* Container design and constraints */
.ads-container {
    background: #000;
    border: 2px solid #ff0000;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
    overflow: hidden; /* Ad content container dati bayataki rakudadu */
    position: relative; 
    display: inline-block; /* Overlap avvakunda pakka pakkana untayi */
    vertical-align: top;
    margin: 10px;
}

/* Ad content strict sizing */
.ads-container * {
    max-width: 100% !important;
    max-height: 100% !important;
}
    </style>
</head>
<body>
    <h1 style="color:var(--red); border-bottom: 2px solid var(--red); padding-bottom: 10px; margin-bottom: 30px;">COMMAND CENTER</h1>
    
    <div class="nav">
        <button class="nav-btn active" onclick="tab('sig')">SIGNALS</button>
        <button class="nav-btn" onclick="tab('tool')">TOOLS</button>
        <button class="nav-btn" onclick="tab('ads')">ADS</button>
        <button class="nav-btn" onclick="tab('fb')">FIREBASE</button>
        <button class="nav-btn" onclick="tab('vps')">VPS</button>
        <button class="nav-btn" onclick="tab('ads-manager')">ADS CONTAINERS</button>
    </div>

    <div id="sig" class="panel active">
        <h2>SIGNAL MAPPING (MT5)</h2>
        <label>QUOTEX PATH:</label><input type="text" placeholder="binaryruthlesstrader.com/quotex">
        <div class="toggle-row">ENABLE: <input type="checkbox" checked style="width:20px;"></div>
        <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
        <label>TOXA PATH:</label><input type="text" placeholder="binaryruthlesstrader.com/toxa">
        <div class="toggle-row">ENABLE: <input type="checkbox" checked style="width:20px;"></div>
        <button class="save-btn">SAVE SIGNAL CONFIG</button>
    </div>

    <div id="tool" class="panel">
        <h2>TOOLS REGISTRY</h2>
        <input type="text" placeholder="Tool Name (e.g. Martingale)">
        <textarea placeholder="Paste Tool HTML Code Here..." style="height:200px;"></textarea>
        <div class="toggle-row">ENABLE IN DROPDOWN: <input type="checkbox" checked style="width:20px;"></div>
        <button class="save-btn">DEPLOY TOOL</button>
    </div>

    <div id="ads" class="panel">
    <h2>ADS SYSTEM</h2>
    <div style="background: #111; padding: 15px; border: 1px solid #333; margin-bottom: 20px;">
        <label style="font-size: 11px; color: #888;">SITE VERIFICATION CODE:</label>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <input type="text" id="verifyCode" placeholder="Paste verification code here..." style="margin-top: 0; flex: 1;">
            <button onclick="verifySite()" style="background: var(--green); color: #000; padding: 0 20px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer;">VERIFY</button>
        </div>
        <p id="verifyStatus" style="font-size: 10px; margin-top: 10px; color: #444;">Status: Not Verified</p>
    </div>
    <textarea id="adSnippet" placeholder="Paste Network Ad Snippet Here..." style="height:150px;"></textarea>
    <button class="save-btn" onclick="updateAds()">UPDATE ALL ADS</button>
</div>
    <div id="fb" class="panel">
    <h2>FIREBASE CONNECTION</h2>
    <textarea id="fbConfig" placeholder="Paste Firebase Config Object Here..." style="height:200px;"></textarea>
    <div id="fbStatus" style="margin-top: 10px; font-size: 11px; color: #444;">STATUS: DISCONNECTED</div>
    <button class="save-btn" onclick="connectFirebase()">CONNECT & SAVE DATABASE</button>
</div>

    <div id="vps" class="panel">
        <h2>VPS SERVER</h2>
        <input type="text" placeholder="Server IP">
        <input type="password" placeholder="SSH Password">
        <button class="save-btn">LINK SERVER</button>
    </div>

    <div id="ads-manager" class="panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>ADS MANAGER</h2>
        <button onclick="openAdModal()" style="background: var(--green); color: #000; border: none; padding: 10px 20px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 4px;">+ ADD NEW CONTAINER</button>
    </div>

    <div id="adList" style="display: flex; flex-direction: column; gap: 10px;">
        <p style="color: #444; font-size: 12px; font-family: 'Roboto Mono';">Loading ad containers...</p>
    </div>
</div>

    <div id="ads-editor" style="background: #000; border: 1px solid #ff0000; padding: 20px; color: #fff; font-family: 'Orbitron', sans-serif;">
    <h3 style="color: #ff0000;">ADS/CONTAINER SETTINGS</h3>
    
    <label>Container Name:</label><br>
    <input type="text" id="ad-name" style="background:#111; color:#00ffcc; border:1px solid #ff0000; padding:5px; margin-bottom:10px;"><br>

    <label>Width (px):</label>
    <input type="number" id="ad-width" style="background:#111; color:#00ffcc; border:1px solid #ff0000; padding:5px; font-weight:bold;"><br>

    <label>Height (px):</label>
    <input type="number" id="ad-height" style="background:#111; color:#00ffcc; border:1px solid #ff0000; padding:5px; font-weight:bold;"><br>

    <label>Ads Snippet (Code):</label><br>
    <textarea id="ad-snippet" rows="4" style="width:100%; background:#111; color:#fff; border:1px solid #ff0000;"></textarea><br>

    <div style="margin-top: 15px;">
        <button onclick="saveAdSettings()" style="background:#ff0000; color:#fff; padding:10px; cursor:pointer;">SAVE SETTINGS</button>
        <button onclick="resetAd()" style="background:#333; color:#fff; padding:10px;">RESET</button>
        <button onclick="toggleHide()" style="background:#555; color:#fff; padding:10px;">HIDE/SHOW</button>
    </div>
</div>

<div id="adModal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px;">
    <div style="background: #0a0a0a; border: 2px solid var(--red); padding: 25px; width: 100%; max-width: 500px; border-radius: 8px;">
        <h3 id="modalTitle" style="color: var(--red); margin-bottom: 20px;">ADD NEW AD</h3>
        <input type="hidden" id="editAdId">
        
        <div style="display: flex; gap: 10px;">
            <div style="flex:1;">
                <label style="font-size: 10px; color: #888;">WIDTH (px)</label>
                <input type="number" id="adWidth" placeholder="e.g. 300">
            </div>
            <div style="flex:1;">
                <label style="font-size: 10px; color: #888;">HEIGHT (px)</label>
                <input type="number" id="adHeight" placeholder="e.g. 250">
            </div>
        </div>

        <label style="font-size: 10px; color: #888; margin-top: 15px; display: block;">AD SNIPPET (HTML/JS)</label>
        <textarea id="adCode" style="height: 120px; font-size: 12px;" placeholder="Paste ad network code here..."></textarea>

        <div style="display: flex; gap: 10px; margin-top: 15px; align-items: center;">
            <label style="font-size: 12px;">HIDE AD:</label>
            <input type="checkbox" id="adHide" style="width: 20px; margin-top: 0;">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button onclick="saveAd()" class="save-btn" style="flex:2; margin-top:0;">SAVE CONTAINER</button>
            <button onclick="deleteAd()" id="deleteBtn" style="flex:1; background: #333; color: #fff; border: none; font-family: 'Orbitron'; cursor: pointer; display: none;">DELETE</button>
            <button onclick="closeAdModal()" style="flex:1; background: #222; color: #888; border: none; font-family: 'Orbitron'; cursor: pointer;">CANCEL</button>
        </div>
    </div>
</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // 1. Tab switching logic with Memory (Last unna tab ni gurthunchukuntundi)
    function tab(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    
    const targetPanel = document.getElementById(id);
    if(targetPanel) targetPanel.classList.add('active');
    
    // Tab switch ayinappudu button highlight logic
    const buttons = document.querySelectorAll('.nav-btn');
    buttons.forEach(btn => {
        if(btn.getAttribute('onclick').includes(`'${id}'`)) {
            btn.classList.add('active');
        }
    });

    // ADS MANAGER open ayinappudu list load avvali
    if(id === 'ads-manager') {
        loadAdsList();
    }

    localStorage.setItem('active_admin_tab', id);
}

    // 2. Firebase Connection Logic
    function connectFirebase() {
        const configInput = document.getElementById('fbConfig').value;
        const status = document.getElementById('fbStatus');
        try {
            const config = JSON.parse(configInput);
            if (!firebase.apps.length) {
                firebase.initializeApp(config);
            }
            firebase.database().ref(".info/connected").on("value", (snap) => {
                if (snap.val() === true) {
                    status.innerText = "STATUS: CONNECTED SUCCESSFULLY!";
                    status.style.color = "#00ffcc";
                    localStorage.setItem('ruthless_fb_config', configInput);
                    alert("FIREBASE CONNECTED!");
                } else {
                    status.innerText = "STATUS: CONNECTION FAILED";
                    status.style.color = "#ff0000";
                }
            });
        } catch (e) { 
            alert("INVALID JSON! Please check your Firebase config."); 
        }
    }

    // 3. Page Load Logic (Auto-Connect + Remember Last Tab)
    window.onload = function() {
        // --- Tab Memory Load ---
        const lastTab = localStorage.getItem('active_admin_tab');
        if (lastTab) {
            tab(lastTab); // Refresh ki mundu unna tab ke veltundi
        }

        // --- Firebase Auto-Connect ---
        const saved = localStorage.getItem('ruthless_fb_config');
        if(saved) {
            document.getElementById('fbConfig').value = saved;
            const status = document.getElementById('fbStatus');
            try {
                const config = JSON.parse(saved);
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                firebase.database().ref(".info/connected").on("value", (snap) => {
                    if (snap.val() === true) {
                        status.innerText = "STATUS: CONNECTED (AUTO)";
                        status.style.color = "#00ffcc";
                    } else {
                        status.innerText = "STATUS: RECONNECTING...";
                        status.style.color = "orange";
                    }
                });
            } catch (e) {
                console.log("Auto-connect failed.");
            }
        }
    };

    // Placeholder functions for other buttons
    function verifySite() { alert("CODE SUBMITTED!"); document.getElementById('verifyStatus').innerText = "Status: Code Active"; }
    function updateAds() { alert("ADS UPDATED!"); }

    // Modal handling
function openAdModal(adId = null) {
    document.getElementById('adModal').style.display = 'flex';
    const deleteBtn = document.getElementById('deleteBtn');
    
    if(adId) {
        // Edit Mode
        document.getElementById('modalTitle').innerText = "EDIT AD CONTAINER";
        document.getElementById('editAdId').value = adId;
        deleteBtn.style.display = 'block';
        
        // Fetch specific ad data from Firebase
        firebase.database().ref('ads/' + adId).once('value', (snap) => {
            const data = snap.val();
            document.getElementById('adWidth').value = data.width;
            document.getElementById('adHeight').value = data.height;
            document.getElementById('adCode').value = data.snippet;
            document.getElementById('adHide').checked = data.hidden;
        });
    } else {
        // Add Mode
        document.getElementById('modalTitle').innerText = "ADD NEW AD";
        document.getElementById('editAdId').value = "";
        document.getElementById('adWidth').value = "";
        document.getElementById('adHeight').value = "";
        document.getElementById('adCode').value = "";
        document.getElementById('adHide').checked = false;
        deleteBtn.style.display = 'none';
    }
}

function closeAdModal() { document.getElementById('adModal').style.display = 'none'; }

// Save to Firebase
function saveAd() {
    const id = document.getElementById('editAdId').value || Date.now();
    const adData = {
        width: document.getElementById('adWidth').value,
        height: document.getElementById('adHeight').value,
        snippet: document.getElementById('adCode').value,
        hidden: document.getElementById('adHide').checked,
        timestamp: Date.now()
    };

    firebase.database().ref('ads/' + id).set(adData).then(() => {
        alert("AD SAVED SUCCESSFULLY!");
        closeAdModal();
        loadAdsList(); // List refresh chesthundhi
    });
}

// Delete from Firebase
function deleteAd() {
    const id = document.getElementById('editAdId').value;
    if(confirm("ARE YOU SURE?")) {
        firebase.database().ref('ads/' + id).remove().then(() => {
            closeAdModal();
            loadAdsList();
        });
    }
}

// Load List in Admin Panel
function loadAdsList() {
    const listDiv = document.getElementById('adList');
    if (!firebase.apps.length) return; // Firebase connect kakapothe wait chesthundhi

    firebase.database().ref('ads').on('value', (snap) => {
        listDiv.innerHTML = "";
        const ads = snap.val();
        
        if(!ads) { 
            listDiv.innerHTML = "<p style='color:#444; padding:10px;'>NO ADS FOUND IN DATABASE.</p>"; 
            return; 
        }
        
        // Count chupinchadaniki
        const count = Object.keys(ads).length;
        const countDisplay = document.createElement('div');
        countDisplay.style = "color:var(--red); font-size:12px; margin-bottom:10px; font-family:'Roboto Mono';";
        countDisplay.innerText = `TOTAL CONTAINERS: ${count}`;
        listDiv.appendChild(countDisplay);

        Object.keys(ads).forEach(id => {
            const ad = ads[id];
            const item = document.createElement('div');
            item.style = "background:#111; padding:15px; border:1px solid #222; border-left:4px solid "+(ad.hidden ? '#333':'var(--red)')+"; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;";
            item.innerHTML = `
                <div>
                    <div style="font-size:12px; color:var(--green); font-weight:bold;">${ad.width} x ${ad.height} px</div>
                    <div style="font-size:10px; color:#555;">ID: ${id} ${ad.hidden ? '[HIDDEN]' : ''}</div>
                </div>
                <button onclick="openAdModal('${id}')" style="background:transparent; border:1px solid var(--red); color:var(--red); padding:5px 15px; font-family:'Orbitron'; font-size:10px; cursor:pointer;">EDIT / DELETE</button>
            `;
            listDiv.appendChild(item);
        });
    });
}

// Window Onload lo list load cheyadam marchipoku
// Patha window.onload lo loadAdsList(); ni add cheyi.
    let currentEditingId = ''; // Ee container edit chestunnamo store chestundi

// List lo unna container ni click chesinappudu idhi trigger avvali
function editAdContainer(id) {
    currentEditingId = id;
    let target = document.getElementById(id);
    
    // Existing values ni input boxes loki techukovali
    document.getElementById('ad-width').value = target.offsetWidth;
    document.getElementById('ad-height').value = target.offsetHeight;
    // Name and Snippet values database nundi vasthayi, for now general ga:
    document.getElementById('ad-name').value = "Editing: " + id;
}

function saveAdSettings() {
    if(!currentEditingId) return alert("Please select a container first!");

    let target = document.getElementById(currentEditingId);
    let newWidth = document.getElementById('ad-width').value;
    let newHeight = document.getElementById('ad-height').value;
    let snippet = document.getElementById('ad-snippet').value;

    // 1. Apply Size
    target.style.width = newWidth + 'px';
    target.style.height = newHeight + 'px';

    // 2. Inject Ad Snippet
    target.innerHTML = snippet;

    // 3. Prevent Overlap & Bounds
    target.style.overflow = 'hidden';
    
    alert("Saved Successfully! Layout locked.");
}

function toggleHide() {
    let target = document.getElementById(currentEditingId);
    target.style.display = (target.style.display === 'none') ? 'inline-block' : 'none';
}
    
</script>
</body>
</html>
