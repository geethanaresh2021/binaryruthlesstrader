<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --red: #ff0000;
            --white: #ffffff;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.4);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fixed Layout for Tablet/Desktop */
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif;
        }

        body { display: flex; flex-direction: column; }

        /* --- Admin Header --- */
        .admin-header {
            width: 100%; background: #000; border-bottom: 2px solid var(--red);
            padding: 10px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }

        .brand-section { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .brand-img { max-width: 280px; filter: drop-shadow(0 0 10px var(--red)); transition: var(--transition); }
        .brand-img:hover { transform: scale(1.02); }

        .social-row { display: flex; gap: 20px; margin-top: 8px; }
        .social-row a { color: #fff; font-size: 16px; transition: var(--transition); }
        .social-row a:hover { color: var(--red); transform: translateY(-2px) scale(1.2); }

        .logout-btn {
            background: transparent; border: 1px solid var(--red); color: var(--red);
            padding: 8px 18px; font-family: 'Roboto Mono'; font-weight: bold;
            cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: var(--transition);
        }
        .logout-btn:hover { background: var(--red); color: #fff; box-shadow: var(--neon-glow); }
        .logout-btn:active { transform: scale(0.95); }

        /* --- Main Layout --- */
        .admin-wrapper { display: flex; flex: 1; overflow: hidden; }

        /* --- Sidebar Navigation --- */
                /* --- Sidebar Navigation --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; padding: 15px 10px; overflow-y: hidden; /* Changed to hidden */
        }

        /* Logic for scrollable button container */
        .nav-scroll-container {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: 480px; /* Idi 10 buttons varaku kanipinchela set chesthundhi */
        }

        .nav-scroll-container::-webkit-scrollbar { width: 4px; }
        .nav-scroll-container::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }


        .nav-group-label {
            font-size: 10px; color: #444; margin: 20px 0 10px 10px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }

        .nav-btn {
            background: #0f0f0f; border: 1px solid #1a1a1a; color: #888;
            padding: 12px 15px; margin-bottom: 6px; text-align: left;
            font-family: 'Roboto Mono'; font-size: 12px; text-transform: uppercase;
            cursor: pointer; transition: var(--transition); display: flex;
            align-items: center; gap: 12px; border-radius: 4px; position: relative;
        }

        .nav-btn i { width: 18px; color: var(--red); font-size: 14px; text-align: center; transition: var(--transition); }

        /* White Accent for Analytics Group Icons */
        .nav-btn.white-accent i { color: var(--white); }

        .nav-btn:hover {
            background: #1a0000; color: #fff; border-color: var(--red);
            padding-left: 20px; box-shadow: inset 4px 0 0 var(--red);
        }
        .nav-btn:active { transform: scale(0.97); }

        .nav-btn.active {
            background: var(--red); color: #fff !important; border-color: var(--red);
            box-shadow: var(--neon-glow);
        }
        .nav-btn.active i { color: #fff; }

        /* --- Content Frame --- */
        .content-area {
            flex: 1; padding: 30px; 
            background: radial-gradient(circle at top right, #120000, #050505);
            overflow-y: auto;
        }

        .panel-header { border-left: 5px solid var(--red); padding-left: 20px; margin-bottom: 30px; }
        .panel-header h1 { font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }
        .panel-header p { font-family: 'Roboto Mono'; color: #555; font-size: 13px; margin-top: 5px; }

        .placeholder-card {
            background: rgba(255, 255, 255, 0.02); border: 1px dashed #222;
            padding: 50px; text-align: center; color: #333;
            font-family: 'Roboto Mono'; border-radius: 8px;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <div style="width: 100px;"></div> 
        <div class="brand-section">
            <img src="brand-name.png" alt="RUTHLESS SYSTEM" class="brand-img">
            <div class="social-row">
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </header>

    <div class="admin-wrapper">
                <nav class="sidebar">
            <div class="nav-group-label">Analytics</div>
            <button class="nav-btn white-accent" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            <button class="nav-btn white-accent" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>

            <div class="nav-group-label">Management</div>
            
            <div class="nav-scroll-container">
                <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand-arrows-alt"></i> ST Resize</button>
                <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools Manager</button>
                <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signal Connection</button>
                <button class="nav-btn" onclick="loadContent('Ads Network')"><i class="fas fa-shield-check"></i> Ads Network Verify</button>
                <button class="nav-btn" onclick="loadContent('Ads Containers')"><i class="fas fa-box-open"></i> Ads Containers</button>
                <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-alt"></i> Social Media</button>
                <button class="nav-btn" onclick="loadContent('Brand Name')"><i class="fas fa-id-card"></i> Brand Name</button>
                <button class="nav-btn" onclick="loadContent('Affiliate')"><i class="fas fa-handshake"></i> Affiliate</button>
                <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
                <button class="nav-btn" onclick="loadContent('Join Section')"><i class="fas fa-user-plus"></i> Join</button>
                <button class="nav-btn" onclick="loadContent('Website SEO')"><i class="fas fa-search"></i> Website SEO</button>
                <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-fire-alt"></i> Firebase</button>
                <button class="nav-btn" onclick="loadContent('VPS')"><i class="fas fa-server"></i> VPS</button>
                <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
            </div>
        </nav>


        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p>AUTHENTICATED SESSION: BINARY RUTHLESS TRADER</p>
            </div>

            <div id="mainDisplay">
                <div class="placeholder-card">
                    SYSTEM READY. SELECT A MODULE TO CONFIGURE.
                </div>
            </div>
        </main>
    </div>

    <script>
                function loadContent(moduleName) {
    localStorage.setItem('activeModule', moduleName);

    // Update Active Class
    const buttons = document.querySelectorAll('.nav-btn');
    buttons.forEach(btn => {
        btn.classList.toggle('active', btn.innerText.trim() === moduleName);
    });

    // Update Header
    document.getElementById('panelHeader').innerHTML = `
        <h1>${moduleName}</h1>
        <p>MANAGING ${moduleName.toUpperCase()} MODULE SETTINGS AND DATA.</p>
    `;

    const mainDisplay = document.getElementById('mainDisplay');

    if (moduleName === 'Firebase') {
        renderFirebaseModule();
    } else {
        mainDisplay.innerHTML = `
            <div class="placeholder-card">
                <i class="fas fa-sync fa-spin" style="color:var(--red); font-size:24px; margin-bottom:15px;"></i><br>
                [ ${moduleName.toUpperCase()} MODULE LOADED ]
            </div>
        `;
    }
}

function renderFirebaseModule() {
    const savedConfigs = JSON.parse(localStorage.getItem('fb_configs') || '[]');
    const activeIndex = localStorage.getItem('fb_active_index');

    let listHtml = savedConfigs.map((cfg, index) => `
        <div class="fb-list-item">
            <span><i class="fas fa-database" style="margin-right:10px;"></i> ${cfg.projectId}</span>
            <span class="status-indicator ${activeIndex == index ? 'status-online' : 'status-offline'}">
                ${activeIndex == index ? '● CONNECTED' : '○ DISCONNECTED'}
            </span>
        </div>
    `).join('');

    document.getElementById('mainDisplay').innerHTML = `
        <div class="firebase-card">
            <h3 style="margin-bottom:20px; font-size:14px; color:var(--red);">ADD NEW FIREBASE CONNECTION</h3>
            <div class="fb-input-group">
                <input type="text" id="apiKey" class="fb-input" placeholder="apiKey">
                <input type="text" id="authDomain" class="fb-input" placeholder="authDomain">
                <input type="text" id="projectId" class="fb-input" placeholder="projectId">
                <input type="text" id="storageBucket" class="fb-input" placeholder="storageBucket">
                <input type="text" id="messagingSenderId" class="fb-input" placeholder="messagingSenderId">
                <input type="text" id="appId" class="fb-input" placeholder="appId">
            </div>
            <button class="join-btn" onclick="connectFirebase()" style="width:200px;">CONNECT</button>
        </div>

        <div class="firebase-card">
            <h3 style="margin-bottom:15px; font-size:14px;">SAVED CONNECTIONS</h3>
            <div id="fbList">${listHtml || '<p style="color:#333; font-size:12px;">NO SAVED CONFIGURATIONS</p>'}</div>
        </div>
    `;
}

function connectFirebase() {
    const config = {
        apiKey: document.getElementById('apiKey').value,
        authDomain: document.getElementById('authDomain').value,
        projectId: document.getElementById('projectId').value,
        storageBucket: document.getElementById('storageBucket').value,
        messagingSenderId: document.getElementById('messagingSenderId').value,
        appId: document.getElementById('appId').value
    };

    if (!config.apiKey || !config.projectId) {
        alert("Please fill essential fields!");
        return;
    }

    let configs = JSON.parse(localStorage.getItem('fb_configs') || '[]');
    configs.push(config);
    
    localStorage.setItem('fb_configs', JSON.stringify(configs));
    localStorage.setItem('fb_active_index', configs.length - 1);
    
    // Auto-refresh UI
    renderFirebaseModule();
    alert("Firebase Connected Successfully!");
}


            // Refresh chesinappudu patha module ni load chesthundhi
        window.onload = function() {
            const lastModule = localStorage.getItem('activeModule');
            if (lastModule) {
                loadContent(lastModule);
            }
        };

    .firebase-card { background: #000; border: 1px solid #222; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
.fb-input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
.fb-input { background: #0a0a0a; border: 1px solid #333; padding: 12px; color: #00ffcc; font-family: 'Roboto Mono'; font-weight: bold; border-radius: 4px; }
.status-indicator { font-size: 12px; margin-top: 10px; font-family: 'Roboto Mono'; text-transform: uppercase; }
.status-online { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
.status-offline { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
.fb-list-item { background: #111; padding: 10px; border-left: 3px solid var(--red); margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    
    
    </script>
</body>
</html>
