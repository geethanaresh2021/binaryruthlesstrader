<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUTHLESS TERMINAL | ADMIN</title>
    <link rel="stylesheet" href="admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="admin-header">
        <div class="brand-section">
            <h2 class="brand-text">BINARY <span>RUTHLESS</span></h2>
        </div>
        <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
    </header>

    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="nav-scroll-container">
                <p class="nav-group-label">Analytics</p>
                <button class="nav-btn active" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
                <button class="nav-btn" onclick="loadContent('Revenue')"><i class="fas fa-indian-rupee-sign"></i> Revenue</button>

                <p class="nav-group-label">Core Settings</p>
                <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand"></i> ST Resize</button>
                <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools Manager</button>
                <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-wifi"></i> Signal Conn</button>
                <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-database"></i> Firebase</button>

                <p class="nav-group-label">Site Content</p>
                <button class="nav-btn" onclick="loadContent('Ads Containers')"><i class="fas fa-ad"></i> Ads Containers</button>
                <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-nodes"></i> Social Media</button>
                <button class="nav-btn" onclick="loadContent('Brand Name')"><i class="fas fa-id-card"></i> Brand Name</button>
                <button class="nav-btn" onclick="loadContent('Affiliate')"><i class="fas fa-link"></i> Affiliate</button>
                <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-triangle-exclamation"></i> Warning Note</button>
                <button class="nav-btn" onclick="loadContent('Join Section')"><i class="fas fa-right-to-bracket"></i> Join Section</button>
                <button class="nav-btn" onclick="loadContent('Giveaway Winner')"><i class="fas fa-trophy"></i> Giveaway</button>

                <p class="nav-group-label">System</p>
                <button class="nav-btn" onclick="loadContent('VPS')"><i class="fas fa-server"></i> VPS</button>
                <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-shield-halved"></i> Security</button>
                <button class="nav-btn" onclick="loadContent('Verify')"><i class="fas fa-check-double"></i> Verify</button>
            </div>
        </aside>

        <main class="content-area">
            <header class="panel-header" id="panelHeader">
                <h1>DASHBOARD</h1>
                <p>SYSTEM ONLINE // READY TO SYNC</p>
            </header>
            
            <div id="mainDisplay" class="display-container">
                </div>
        </main>
    </div>

    <script type="module" src="admin-script.js"></script>
</body>
</html>
