<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ruthless Admin | Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --green: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 30px; }
        .nav-btn { background: #111; border: 1px solid #333; color: #fff; padding: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; }
        .nav-btn.active { border-color: var(--red); color: var(--red); }
        .panel { display: none; background: #0a0a0a; border: 1px solid #222; padding: 25px; border-radius: 8px; }
        .panel.active { display: block; }
        input, textarea { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--green); font-family: 'Roboto Mono'; margin-top: 10px; outline: none; }
        .save-btn { background: var(--red); border: none; color: #fff; padding: 15px 30px; margin-top: 20px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; }
        .toggle-row { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <h1 style="color:var(--red); border-bottom: 2px solid var(--red); padding-bottom: 10px; margin-bottom: 30px;">COMMAND CENTER</h1>
    
    <div class="nav">
        <button class="nav-btn active" onclick="tab('sig')">SIGNALS</button>
        <button class="nav-btn" onclick="tab('tool')">TOOLS</button>
        <button class="nav-btn" onclick="tab('ads')">ADS</button>
        <button class="nav-btn" onclick="tab('fb')">FIREBASE</button>
        <button class="nav-btn" onclick="tab('vps')">VPS</button>
    </div>

    <div id="sig" class="panel active">
        <h2>SIGNAL MAPPING (MT5)</h2>
        <label>QUOTEX PATH:</label><input type="text" placeholder="binaryruthlesstrader.com/quotex">
        <div class="toggle-row">ENABLE: <input type="checkbox" checked style="width:20px;"></div>
        <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
        <label>TOXA PATH:</label><input type="text" placeholder="binaryruthlesstrader.com/toxa">
        <div class="toggle-row">ENABLE: <input type="checkbox" checked style="width:20px;"></div>
        <button class="save-btn">SAVE SIGNAL CONFIG</button>
    </div>

    <div id="tool" class="panel">
        <h2>TOOLS REGISTRY</h2>
        <input type="text" placeholder="Tool Name (e.g. Martingale)">
        <textarea placeholder="Paste Tool HTML Code Here..." style="height:200px;"></textarea>
        <div class="toggle-row">ENABLE IN DROPDOWN: <input type="checkbox" checked style="width:20px;"></div>
        <button class="save-btn">DEPLOY TOOL</button>
    </div>

    <div id="ads" class="panel">
        <h2>ADS SYSTEM</h2>
        
        <div style="background: #111; padding: 15px; border: 1px solid #333; margin-bottom: 20px; border-radius: 4px;">
            <label style="font-size: 11px; color: #888;">SITE VERIFICATION CODE:</label>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <input type="text" id="verifyCode" placeholder="Paste Ad Network verification code here..." style="margin-top: 0; flex: 1;">
                <button onclick="verifySite()" style="background: var(--green); color: #000; border: none; padding: 0 20px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 4px; font-size: 11px;">VERIFY</button>
            </div>
            <p id="verifyStatus" style="font-size: 10px; margin-top: 10px; color: #444; font-family: 'Roboto Mono'; text-transform: uppercase;">Status: Not Verified</p>
        </div>

        <hr style="border:0; border-top:1px solid #222; margin: 20px 0;">

        <label style="font-size: 11px; color: #888;">AD NETWORK SNIPPET (JS/HTML):</label>
        <textarea id="adSnippet" placeholder="Paste Network Ad Snippet (Scripts) Here..." style="height:150px;"></textarea>
        
        <button class="save-btn" onclick="updateAds()">UPDATE ALL ADS</button>
    </div>

    <script>
        function verifySite() {
            const code = document.getElementById('verifyCode').value;
            const status = document.getElementById('verifyStatus');
            
            if(code.trim() !== "") {
                status.innerText = "Status: Verification In Progress...";
                status.style.color = "var(--green)";
                
                // Ikkada nuvvu future lo Firebase logic add chesthe 
                // aa code ni permanent ga site lo inject cheyochu.
                setTimeout(() => {
                    alert("VERIFICATION CODE SUBMITTED SUCCESSFULLY");
                    status.innerText = "Status: Code Active";
                }, 1500);
            } else {
                alert("PLEASE ENTER A VALID CODE");
            }
        }

        function updateAds() {
            alert("AD SNIPPETS UPDATED SUCCESSFULLY");
        }
    </script>

    <div id="fb" class="panel">
        <h2>FIREBASE CONNECTION</h2>
        <textarea placeholder="Paste Firebase SDK JSON here..."></textarea>
        <button class="save-btn">CONNECT DATABASE</button>
    </div>

    <div id="vps" class="panel">
        <h2>VPS SERVER</h2>
        <input type="text" placeholder="Server IP">
        <input type="password" placeholder="SSH Password">
        <button class="save-btn">LINK SERVER</button>
    </div>

    <script>
        function tab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
