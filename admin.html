<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --red: #ff0000;
            --white: #ffffff;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.4);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        html, body { height: 100vh; width: 100vw; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; }
        body { display: flex; flex-direction: column; }

        /* Header */
        .admin-header { width: 100%; background: #000; border-bottom: 2px solid var(--red); padding: 10px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .brand-section { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .brand-img { max-width: 200px; filter: drop-shadow(0 0 10px var(--red)); }

        /* Main Wrapper */
        .admin-wrapper { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar & Buttons */
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 15px 10px; }
        .nav-group-label { font-size: 10px; color: #444; margin: 20px 0 10px 10px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        .nav-scroll-container { display: flex; flex-direction: column; overflow-y: auto; flex: 1; padding-right: 5px; }
        .nav-scroll-container::-webkit-scrollbar { width: 4px; }
        .nav-scroll-container::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }

        .nav-btn {
            background: #0f0f0f; border: 1px solid #1a1a1a; color: #888; padding: 12px 15px; margin-bottom: 6px;
            text-align: left; font-family: 'Roboto Mono'; font-size: 12px; cursor: pointer; border-radius: 4px;
            display: flex; align-items: center; gap: 12px; transition: var(--transition);
        }
        .nav-btn i { color: var(--red); width: 18px; font-size: 14px; text-align: center; }
        .nav-btn.white-accent i { color: var(--white); }
        .nav-btn:hover { background: #1a0000; color: #fff; border-color: var(--red); padding-left: 20px; }
        .nav-btn.active { background: var(--red); color: #fff !important; box-shadow: var(--neon-glow); }
        .nav-btn.active i { color: #fff; }

        /* Content Area */
        .content-area { flex: 1; padding: 30px; overflow-y: auto; background: radial-gradient(circle at top right, #120000, #050505); }
        .panel-header { border-left: 5px solid var(--red); padding-left: 20px; margin-bottom: 30px; }
        .panel-header h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Module Styling */
        .sig-card { background: #000; border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; }
        .sig-input { width: 100%; background: #080808; border: 1px solid #222; padding: 12px; color: #00ffcc; font-family: 'Roboto Mono'; font-weight: bold; margin-bottom: 15px; border-radius: 4px; }
        .radio-group { display: flex; gap: 20px; margin: 10px 0; font-family: 'Roboto Mono'; font-size: 13px; color: #fff; }
        .radio-group input { accent-color: var(--red); cursor: pointer; }
        .join-btn { background: var(--red); color: #fff; border: none; padding: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; border-radius: 4px; }
        .add-new-btn { margin-top: 20px; background: transparent; border: 1px dashed var(--red); color: var(--red); width: 100%; padding: 12px; cursor: pointer; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <header class="admin-header">
        <div style="width: 100px;"></div> 
        <div class="brand-section">
            <h2 style="color:var(--red); letter-spacing: 5px; font-size: 18px;">RUTHLESS SYSTEM</h2>
        </div>
        <button class="nav-btn" style="border-color:var(--red); color:var(--red)" onclick="location.reload()">RELOAD</button>
    </header>

    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="nav-group-label">Analytics</div>
            <button class="nav-btn white-accent" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
            <button class="nav-btn white-accent" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>

            <div class="nav-group-label">Management</div>
            <div class="nav-scroll-container">
                <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand-arrows-alt"></i> ST Resize</button>
                <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools Manager</button>
                <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signal Connection</button>
                <button class="nav-btn" onclick="loadContent('Ads Network')"><i class="fas fa-shield-check"></i> Ads Network Verify</button>
                <button class="nav-btn" onclick="loadContent('Ads Containers')"><i class="fas fa-box-open"></i> Ads Containers</button>
                <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-alt"></i> Social Media</button>
                <button class="nav-btn" onclick="loadContent('Brand Name')"><i class="fas fa-id-card"></i> Brand Name</button>
                <button class="nav-btn" onclick="loadContent('Affiliate')"><i class="fas fa-handshake"></i> Affiliate</button>
                <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
                <button class="nav-btn" onclick="loadContent('Join Section')"><i class="fas fa-user-plus"></i> Join</button>
                <button class="nav-btn" onclick="loadContent('Giveaway Winner')"><i class="fas fa-trophy"></i> Giveaway Winner</button>
                <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-fire-alt"></i> Firebase</button>
                <button class="nav-btn" onclick="loadContent('VPS')"><i class="fas fa-server"></i> VPS</button>
                <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
            </div>
        </nav>

        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p>AUTHENTICATED SESSION: BINARY RUTHLESS TRADER</p>
            </div>
            <div id="mainDisplay">
                <div style="text-align:center; color:#222; margin-top:100px;">[ SELECT A MODULE ]</div>
            </div>
        </main>
    </div>

<script>
// --- FIREBASE CONFIG (Your Real Config Here) ---
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    databaseURL: "YOUR_DATABASE_URL",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_ID",
    appId: "YOUR_APP_ID"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const database = firebase.database();

// --- NAVIGATION ---
function loadContent(moduleName) {
    localStorage.setItem('activeModule', moduleName);
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText.includes(moduleName));
    });

    document.getElementById('panelHeader').innerHTML = `
        <h1>${moduleName}</h1>
        <p>MANAGING ${moduleName.toUpperCase()} MODULE SETTINGS AND DATA.</p>
    `;

    // Routing Logic
    if (moduleName === 'Signal Connection') {
        renderSignalConnectionModule();
    } else if (moduleName === 'Firebase') {
        renderFirebaseModule();
    } else {
        document.getElementById('mainDisplay').innerHTML = `
            <div style="background:rgba(255,255,255,0.02); padding:50px; text-align:center; border:1px dashed #222; color:#333;">
                <i class="fas fa-sync fa-spin" style="color:var(--red); font-size:24px; margin-bottom:15px;"></i><br>
                [ ${moduleName.toUpperCase()} MODULE LOADED ]
            </div>`;
    }
}

// --- SIGNAL CONNECTION MODULE ---
function renderSignalConnectionModule() {
    const mainDisplay = document.getElementById('mainDisplay');
    mainDisplay.innerHTML = `
        <div class="sig-card">
            <h2 style="font-size: 14px; color: var(--red); margin-bottom: 20px;">SIGNAL CONNECTION MANAGER</h2>
            <select id="signalSelector" class="sig-input" onchange="loadSignalDetails(this.value)">
                <option value="">-- LOADING SIGNALS... --</option>
            </select>
            <div id="signalEditor" style="display:none; margin-top:20px; border-top: 1px solid #1a1a1a; padding-top: 20px;">
                <input type="hidden" id="currentSignalId">
                <label style="font-size:10px; color:#555;">EDIT NAME</label>
                <input type="text" id="sigName" class="sig-input">
                <label style="font-size:10px; color:#555;">ENTER URL</label>
                <input type="text" id="sigUrl" class="sig-input">
                <div class="radio-group">
                    <label><input type="radio" name="sigStatus" value="visible" id="statusVisible"> VISIBLE</label>
                    <label><input type="radio" name="sigStatus" value="hide" id="statusHide"> HIDE</label>
                </div>
                <button class="join-btn" onclick="saveSignal()">SAVE CHANGES</button>
            </div>
            <button class="add-new-btn" onclick="prepareAddNew()">+ ADD NEW SIGNAL</button>
        </div>
    `;

    database.ref('signals').on('value', (snapshot) => {
        const signals = snapshot.val() || {};
        let options = '<option value="">-- SELECT SIGNAL --</option>';
        for (let id in signals) {
            options += `<option value="${id}">${signals[id].name}</option>`;
        }
        const sel = document.getElementById('signalSelector');
        if(sel) sel.innerHTML = options;
    });
}

function loadSignalDetails(id) {
    if(!id) { document.getElementById('signalEditor').style.display='none'; return; }
    database.ref('signals/' + id).once('value').then((snap) => {
        const data = snap.val();
        document.getElementById('currentSignalId').value = id;
        document.getElementById('sigName').value = data.name;
        document.getElementById('sigUrl').value = data.url;
        document.getElementById(data.status === 'visible' ? 'statusVisible' : 'statusHide').checked = true;
        document.getElementById('signalEditor').style.display = 'block';
    });
}

function prepareAddNew() {
    document.getElementById('signalSelector').value = "";
    document.getElementById('currentSignalId').value = "sig_" + Date.now();
    document.getElementById('sigName').value = "";
    document.getElementById('sigUrl').value = "";
    document.getElementById('statusVisible').checked = true;
    document.getElementById('signalEditor').style.display = 'block';
}

function saveSignal() {
    const id = document.getElementById('currentSignalId').value;
    const name = document.getElementById('sigName').value;
    const url = document.getElementById('sigUrl').value;
    const status = document.querySelector('input[name="sigStatus"]:checked').value;

    if(!name || !url) return alert("Fill all fields");

    database.ref('signals/' + id).set({ name, url, status })
    .then(() => {
        Swal.fire({ icon: 'success', title: 'SIGNAL SAVED', background: '#000', color: '#fff', confirmButtonColor: '#f00' });
    });
}

function renderFirebaseModule() {
    document.getElementById('mainDisplay').innerHTML = `<div class="sig-card">FIREBASE MODULE READY</div>`;
}

window.onload = () => {
    const last = localStorage.getItem('activeModule') || 'Views';
    loadContent(last);
};
</script>
</body>
</html>
