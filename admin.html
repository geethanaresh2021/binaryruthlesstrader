<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Ruthless System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --red: #ff0000;
            --white: #ffffff;
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.4);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Basic Layout Settings */
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif;
        }
        body { display: flex; flex-direction: column; }

        /* Admin Header Styles */
        .admin-header {
            width: 100%; background: #000; border-bottom: 2px solid var(--red);
            padding: 10px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }
        .brand-section { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .brand-img { max-width: 280px; filter: drop-shadow(0 0 10px var(--red)); }

        .logout-btn {
            background: transparent; border: 1px solid var(--red); color: var(--red);
            padding: 8px 18px; font-family: 'Roboto Mono'; font-weight: bold;
            cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: var(--transition);
        }
        .logout-btn:hover { background: var(--red); color: #fff; box-shadow: var(--neon-glow); }

        /* Sidebar & Navigation Styles */
        .admin-wrapper { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; height: 100%; /* Full height */
        }

        /* Essential for Scrolling */
        .nav-scroll-container {
            flex: 1;
            overflow-y: auto; /* Enable scrolling */
            padding: 10px;
        }

        /* Custom Red Scrollbar */
        .nav-scroll-container::-webkit-scrollbar { width: 4px; }
        .nav-scroll-container::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }
        .nav-scroll-container::-webkit-scrollbar-track { background: #050505; }

        .nav-group-label {
            font-size: 10px; color: #444; margin: 20px 0 10px 10px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }

        .nav-btn {
            width: 100%; background: #0f0f0f; border: 1px solid #1a1a1a; color: #888;
            padding: 12px 15px; margin-bottom: 6px; text-align: left;
            font-family: 'Roboto Mono'; font-size: 12px; text-transform: uppercase;
            cursor: pointer; transition: var(--transition); display: flex;
            align-items: center; gap: 12px; border-radius: 4px;
        }
        .nav-btn i { width: 18px; color: var(--red); font-size: 14px; text-align: center; }
        .nav-btn.white-accent i { color: var(--white); }
        .nav-btn:hover { background: #1a0000; color: #fff; border-color: var(--red); padding-left: 20px; box-shadow: inset 4px 0 0 var(--red); }
        .nav-btn.active { background: var(--red); color: #fff !important; border-color: var(--red); box-shadow: var(--neon-glow); }

        /* Main Content Area */
        .content-area {
            flex: 1; padding: 30px; 
            background: radial-gradient(circle at top right, #120000, #050505);
            overflow-y: auto;
        }
        .panel-header { border-left: 5px solid var(--red); padding-left: 20px; margin-bottom: 30px; }
        .panel-header h1 { font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }
        .panel-header p { font-family: 'Roboto Mono'; color: #555; font-size: 13px; margin-top: 5px; }

        .placeholder-card {
            background: rgba(255, 255, 255, 0.02); border: 1px dashed #222;
            padding: 50px; text-align: center; color: #333;
            font-family: 'Roboto Mono'; border-radius: 8px;
        }

        /* Modules */
        .fb-card { background: #000; border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; }
        textarea { width:100%; height:150px; background:#080808; color:#00ffcc; border:1px solid #222; margin-top:15px; padding:15px; font-family:'Roboto Mono'; font-weight:bold; }
    </style>
</head>

<body>

    <header class="admin-header">
        <div style="width: 100px;"></div> 
        <div class="brand-section">
            <img src="brand-name.png" alt="RUTHLESS SYSTEM" class="brand-img">
        </div>
        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </header>

    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="nav-scroll-container">
                
                <div class="nav-group-label">Analytics</div>
                <button class="nav-btn white-accent" onclick="loadContent('Views')"><i class="fas fa-eye"></i> Views</button>
                <button class="nav-btn white-accent" onclick="loadContent('Revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>

                <div class="nav-group-label">Management</div>
                <button class="nav-btn" onclick="loadContent('ST Resize')"><i class="fas fa-expand-arrows-alt"></i> ST Resize</button>
                <button class="nav-btn" onclick="loadContent('Tools Manager')"><i class="fas fa-tools"></i> Tools Manager</button>
                <button class="nav-btn" onclick="loadContent('Signal Connection')"><i class="fas fa-plug"></i> Signal Connection</button>
                <button class="nav-btn" onclick="loadContent('Ads Network')"><i class="fas fa-shield-check"></i> Ads Network</button>
                <button class="nav-btn" onclick="loadContent('Ads Containers')"><i class="fas fa-box-open"></i> Ads Containers</button>
                <button class="nav-btn" onclick="loadContent('Social Media')"><i class="fas fa-share-alt"></i> Social Media</button>
                <button class="nav-btn" onclick="loadContent('Brand Name')"><i class="fas fa-id-card"></i> Brand Name</button>
                <button class="nav-btn" onclick="loadContent('Affiliate')"><i class="fas fa-handshake"></i> Affiliate</button>
                <button class="nav-btn" onclick="loadContent('Warning Note')"><i class="fas fa-exclamation-triangle"></i> Warning Note</button>
                <button class="nav-btn" onclick="loadContent('Join Section')"><i class="fas fa-user-plus"></i> Join</button>
                <button class="nav-btn" onclick="loadContent('Giveaway Winner')"><i class="fas fa-trophy"></i> Giveaway Winner</button>
                <button class="nav-btn" onclick="loadContent('Firebase')"><i class="fas fa-fire-alt"></i> Firebase</button>
                <button class="nav-btn" onclick="loadContent('VPS')"><i class="fas fa-server"></i> VPS</button>
                <button class="nav-btn" onclick="loadContent('Security')"><i class="fas fa-user-shield"></i> Security</button>
            </div>
        </nav>

        <main class="content-area">
            <div class="panel-header" id="panelHeader">
                <h1>Admin Dashboard</h1>
                <p>AUTHENTICATED SESSION: BINARY RUTHLESS TRADER</p>
            </div>

            <div id="mainDisplay">
                <div class="placeholder-card">
                    SYSTEM READY. SELECT A MODULE TO CONFIGURE.
                </div>
            </div>
        </main>
    </div>

    <script>
        let database;

        // Firebase Initialization
        function initFirebase() {
            const configs = JSON.parse(localStorage.getItem('fb_configs') || '[]');
            const activeIdx = localStorage.getItem('fb_active_index');
            if (configs.length > 0 && activeIdx !== null) {
                if (!firebase.apps.length) firebase.initializeApp(configs[activeIdx]);
                database = firebase.database();
            }
        }

        function loadContent(moduleName) {
            localStorage.setItem('activeModule', moduleName);

            // Update Sidebar Buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim() === moduleName);
            });

            // Update Header
            document.getElementById('panelHeader').innerHTML = `
                <h1>${moduleName}</h1>
                <p>MANAGING ${moduleName.toUpperCase()} MODULE SETTINGS AND DATA.</p>
            `;

            // Display Placeholder or Logic
            if(moduleName === 'Warning Note') {
                renderWarningNote();
            } else {
                document.getElementById('mainDisplay').innerHTML = `
                    <div class="placeholder-card">
                        <i class="fas fa-sync fa-spin" style="color:var(--red); font-size:24px; margin-bottom:15px;"></i><br>
                        [ ${moduleName.toUpperCase()} MODULE LOADED ]
                    </div>`;
            }
        }

        function renderWarningNote() {
            if(!database) {
                document.getElementById('mainDisplay').innerHTML = `<div class="fb-card" style="color:red; text-align:center;">FIREBASE NOT CONNECTED</div>`;
                return;
            }
            database.ref('site_settings/warning_note').once('value').then(snap => {
                const data = snap.val() || {content: ''};
                document.getElementById('mainDisplay').innerHTML = `
                    <div class="fb-card">
                        <h2 style="font-size:14px; color:var(--red);">EDIT WARNING NOTE (FIREBASE)</h2>
                        <textarea id="noteEditor">${data.content.replace(/<[^>]*>/g, '')}</textarea>
                        <button onclick="saveNote()" style="margin-top:20px; padding:12px 30px; background:var(--red); border:none; color:white; font-family:'Orbitron'; cursor:pointer; font-weight:bold;">PUBLISH LIVE</button>
                    </div>`;
            });
        }

        function saveNote() {
            const text = document.getElementById('noteEditor').value;
            let styledText = text.replace(/Risk/gi, '<span style="color:red; font-weight:bold;">Risk</span>');
            database.ref('site_settings/warning_note/content').set(styledText).then(() => alert("LIVE UPDATED!"));
        }

        window.onload = () => {
            initFirebase();
            loadContent(localStorage.getItem('activeModule') || 'Views');
        };
    </script>
</body>
</html>
