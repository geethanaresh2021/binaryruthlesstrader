<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Binary Ruthless Trader</title>
<style>
body{display:flex;margin:0;background:#050505;color:#fff;font-family:Arial, sans-serif;}
.sidebar{width:220px;background:#0a0a0a;padding:10px;overflow-y:auto;height:100vh;position:fixed;}
.sidebar button{width:100%;margin:5px 0;padding:10px;background:#111;color:#fff;border:none;cursor:pointer;text-align:left;}
.sidebar button:hover{background:var(--red);}
.content{margin-left:230px;padding:20px;flex:1;}
.module-section{display:none;background:#111;padding:20px;margin-bottom:15px;border-radius:8px;}
input,textarea{width:100%;margin:5px 0;padding:8px;background:#222;color:#fff;border:none;border-radius:4px;}
button.module-btn{margin-top:10px;background:var(--red);color:#fff;border-radius:4px;cursor:pointer;padding:8px 10px;}
button.module-btn:hover{opacity:0.9;}
</style>
</head>
<body>

<div class="sidebar">
<button onclick="loadContent('Views')">Views</button>
<button onclick="loadContent('Revenue')">Revenue</button>
<button onclick="loadContent('STResize')">ST Resize</button>
<button onclick="loadContent('ToolsManager')">Tools Manager</button>
<button onclick="loadContent('SignalConnection')">Signal</button>
<button onclick="loadContent('AdsNetwork')">Ads Network</button>
<button onclick="loadContent('AdsContainers')">Ads Containers</button>
<button onclick="loadContent('SocialMedia')">Social</button>
<button onclick="loadContent('BrandName')">Brand</button>
<button onclick="loadContent('Affiliate')">Affiliate</button>
<button onclick="loadContent('WarningNote')">Warning</button>
<button onclick="loadContent('JoinSection')">Join</button>
<button onclick="loadContent('Giveaway')">Giveaway</button>
<button onclick="loadContent('Firebase')">Firebase</button>
<button onclick="loadContent('VPS')">VPS</button>
<button onclick="loadContent('Security')">Security</button>
</div>

<div class="content" id="mainDisplay">
<!-- Modules will load here -->
</div>

<script>
// Load modules from modules.html
function loadContent(moduleId){
    const modules=document.querySelectorAll('.module-section');
    modules.forEach(m=>m.style.display='none');
    const target=document.getElementById(moduleId);
    if(target) target.style.display='block';
}

// Initial fetch of modules.html
fetch('modules.html').then(r=>r.text()).then(data=>{
    document.getElementById('mainDisplay').innerHTML=data;
});
</script>

<script src="logic.js"></script>
<script type="module" src="firebase-logic.js"></script>
</body>
</html>
