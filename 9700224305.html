<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; padding: 20px; }
        .card { background: #1a1a1a; padding: 20px; margin-bottom: 20px; border-left: 5px solid red; }
        .preview-window { width: 100%; height: 500px; background: #000; position: relative; border: 2px solid #333; margin-top: 10px; overflow: hidden; }
        .mobile-view { width: 375px; margin: 0 auto; }
        .revenue-inr { color: #00ffcc; font-size: 32px; font-weight: bold; font-family: 'Roboto Mono'; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        button { background: red; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. USERS & POSTS (Top)</h2>
        <div style="display: flex; gap: 20px;">
            <span>Unique Visitors: <b>1</b></span> | <span>Views: <b>120</b></span> | <span>Active: <b>5</b></span>
        </div>
    </div>

    <div class="card">
        <h2>2. ESTIMATED REVENUE</h2>
        <div class="revenue-inr">₹ <span id="rev">0.00</span></div>
        <small>Formula: (Ads x Refreshes / 1000) x CPM x Rate</small>
    </div>

    <div class="card">
        <h2>3. LIVE LAYOUT BUILDER</h2>
        <div class="controls">
            <button onclick="toggleView('desktop')">Desktop View</button>
            <button onclick="toggleView('mobile')" style="background: #444;">Mobile View</button>
            <button onclick="saveLayout()" style="background: green; margin-left: auto;">SAVE LAYOUT</button>
        </div>
        <div id="preview" class="preview-window">
            <div style="color:red; border:1px solid red; position:absolute; top:20px; left:20px; padding:10px;">LOGO (Move Me)</div>
            <div style="background:red; color:white; position:absolute; top:100px; left:20px; padding:10px;">JOIN BUTTON</div>
        </div>
    </div>

    <div class="card">
        <h2>4. AFFILIATE & ADS</h2>
        <label>Affiliate Link (Join Button):</label>
        <input type="text" id="affLink" placeholder="https://quotex.com/..." style="width:100%; padding:10px;">
        <br><br>
        <label>Today CPM ($):</label>
        <input type="number" id="cpm" value="1.50" style="padding:10px;">
    </div>

    <div class="card">
        <h2>5. SECURITY</h2>
        <label>Edit Secret Path:</label>
        <input type="text" value="9700224305" style="padding:10px;">
        <button>SAVE PATH</button>
    </div>

    <script>
        function toggleView(type) {
            const p = document.getElementById('preview');
            if(type === 'mobile') p.classList.add('mobile-view');
            else p.classList.remove('mobile-view');
        }

        function saveLayout() {
            const link = document.getElementById('affLink').value;
            localStorage.setItem('affiliate_link', link);
            alert("Layout and Affiliate Link Saved Successfully!");
        }

        // Simulating Revenue Calculation
        setInterval(() => {
            let activeAds = 4;
            let refreshes = 500;
            let cpm = document.getElementById('cpm').value;
            let rate = 83.50;
            let est = ((activeAds * refreshes) / 1000) * cpm * rate;
            document.getElementById('rev').innerText = est.toFixed(2);
        }, 2000);
    </script>
</body>
</html>
