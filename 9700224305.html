<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ruthless Admin Dashboard</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: 'Roboto Mono', monospace; padding: 20px; }
        .admin-card { background: #1a1a1a; border-left: 5px solid #ff0000; padding: 20px; margin-bottom: 20px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stat-box { background: #222; padding: 15px; text-align: center; border-radius: 4px; }
        .stat-val { font-size: 24px; color: #ff0000; display: block; }
        input, select, button { background: #222; border: 1px solid #444; color: #fff; padding: 10px; margin: 5px 0; width: 100%; }
        button { background: #ff0000; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; }
        button:hover { background: #cc0000; }
        .revenue-inr { color: #00ffcc; font-size: 35px; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>1. USERS & POSTS (Today)</h2>
        <div class="stat-grid">
            <div class="stat-box">Today Views<span class="stat-val" id="today-views">0</span></div>
            <div class="stat-box">Unique Visitors<span class="stat-val" id="unique-users">0</span></div>
            <div class="stat-box">Active Users<span class="stat-val" id="active-now">0</span></div>
            <div class="stat-box">Today Posts<span class="stat-val" id="today-posts">0</span></div>
        </div>
    </div>

    <div class="admin-card">
        <h2>2. ESTIMATED REVENUE</h2>
        <div class="revenue-inr">₹ <span id="inr-display">0.00</span></div>
    </div>

    <div class="admin-card">
        <h2>3. INDIVIDUAL ADS CONTROL</h2>
        <div id="ad-list">
            <div style="border-bottom: 1px solid #333; padding: 10px;">
                <label>Ad Slot 1 (Snippet/Size/Hide)</label>
                <input type="text" placeholder="Ad Snippet Code">
                <input type="text" placeholder="Size (e.g. 300x250)">
                <button style="width: auto;">HIDE</button>
                <button style="width: auto; background:#444;">SAVE</button>
            </div>
        </div>
        <button style="margin-top:10px;">+ ADD NEW AD CONTAINER</button>
    </div>

    <div class="admin-card">
        <h2>4. SECURITY & ACCESS</h2>
        <label>Edit Secret Path:</label>
        <input type="text" id="path-input" value="9700224305">
        <button onclick="updateSecretPath()">CHANGE & SAVE PATH</button>
        <hr>
        <label>Admin Password:</label>
        <input type="password" value="9700224305">
        <label><input type="checkbox"> Enable Login OTP (Phone: 9700224305)</label>
        <button>UPDATE SECURITY</button>
    </div>

    <div class="admin-card">
        <h2>5. SIGNALS & TOOLS</h2>
        <label>Signal Names (Separate with comma):</label>
        <input type="text" placeholder="e.g. quotex, toxa, binomo">
        <label>Tool HTML Code:</label>
        <textarea style="width:100%; height:100px; background:#222; color:white;"></textarea>
        <button>UPDATE FRONTEND</button>
    </div>

    <script>
        function updateSecretPath() {
            const newPath = document.getElementById('path-input').value;
            localStorage.setItem('ruthless_path', newPath);
            alert("Success! Now rename your file on GitHub to: " + newPath + ".html");
        }

        // Simulating Live INR Revenue fetch
        function calculateRevenue(usd) {
            const exchangeRate = 83.45; 
            document.getElementById('inr-display').innerText = (usd * exchangeRate).toFixed(2);
        }
        calculateRevenue(12.50); // Example $12.50
    </script>
</body>
</html>
