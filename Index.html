<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Ruthless Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 320px; text-align: center; border: 2px solid #ff0000; padding: 25px; box-shadow: 0 0 30px #ff0000; border-radius: 10px; background: rgba(0,0,0,0.9); }
        h1 { font-size: 18px; color: #ff0000; letter-spacing: 2px; }
        .box { background: #111; border: 1px dashed #00ffcc; padding: 15px; margin: 20px 0; border-radius: 5px; }
        #asset { font-size: 20px; margin-bottom: 10px; }
        #action { font-size: 35px; font-weight: 900; }
        .CALL { color: #00ffcc; text-shadow: 0 0 15px #00ffcc; }
        .PUT { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
        .SURESHOT { color: #ffff00; text-shadow: 0 0 15px #ffff00; }
        .expiry { font-family: 'Roboto Mono'; font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>LIVE RUTHLESS SIGNAL</h1>
    <div class="box">
        <div id="asset">WAITING...</div>
        <div id="action">--</div>
        <div class="expiry">TIME: <span id="time">--:--</span> | EXP: <span id="exp">--</span></div>
    </div>
</div>

<script>
    // ఇక్కడ మీ Firebase Database URL ఇవ్వండి
    const dbUrl = "YOUR_FIREBASE_DATABASE_URL_HERE/signals.json";

    async function fetchSignal() {
        try {
            const response = await fetch(dbUrl);
            const data = await response.json();
            if(data) {
                document.getElementById('asset').innerText = data.asset;
                document.getElementById('action').innerText = data.action;
                document.getElementById('action').className = data.action;
                document.getElementById('exp').innerText = data.expiry;
                document.getElementById('time').innerText = data.time;
            }
        } catch (e) { console.log("Waiting for signal..."); }
    }

    // ప్రతి 3 సెకన్లకు డేటా అప్‌డేట్ చేస్తుంది
    setInterval(fetchSignal, 3000);
    fetchSignal();
</script>
</body>
</html>
