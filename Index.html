<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --green: #00ffcc; --bg: #050505; --neon: 0 0 15px var(--red); --chrome: linear-gradient(180deg, #fff 0%, #b3b3b3 50%, #808080 100%); }
        
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; overflow-x: hidden;
            touch-action: none; /* Zoom prevention */
        }

        /* 1. Top Header Container - Full Width & Balanced */
        .header-container {
            width: 100%; padding: 20px 40px;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr; /* Left, Center, Right segments */
            align-items: center;
            border-bottom: 2px solid var(--red);
            background: #000;
        }

        /* Left: Logo */
        .header-left { display: flex; justify-content: flex-start; }
        .logo-img { width: 120px; height: auto; transition: transform 0.3s; }
        .logo-img:hover { transform: scale(1.05); }

        /* Center: Big Brand Name */
        .header-center { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .brand-name { 
            font-size: 42px; /* Pedda size */
            font-weight: 900; 
            background: var(--chrome); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 0 20px rgba(255,255,255,0.3); 
            letter-spacing: 2px;
        }
        .ruthless-text { 
            font-size: 18px; 
            color: var(--red); 
            text-shadow: var(--neon); 
            margin-top: -5px; 
            letter-spacing: 5px;
        }

        /* Right: Social Links */
        .header-right { display: flex; justify-content: flex-end; gap: 15px; }
        .social-links a { 
            color: #fff; text-decoration: none; font-size: 10px; 
            font-family: 'Roboto Mono'; border: 1px solid #333; 
            padding: 5px 10px; border-radius: 4px; transition: 0.3s;
        }
        .social-links a:hover { border-color: var(--red); color: var(--red); box-shadow: var(--neon); }

        /* 2. Main Content 3 Containers */
        .main-content {
            flex: 1; display: flex; justify-content: center; align-items: center;
            gap: 25px; width: 100%; padding: 40px 20px;
        }
        .small-container {
            width: 340px; height: 480px; background: #0a0a0a; border: 1px solid var(--red);
            padding: 25px; border-radius: 15px; box-shadow: var(--neon);
            display: flex; flex-direction: column; transition: 0.3s;
        }
        .small-container:hover { transform: translateY(-10px); box-shadow: 0 0 30px var(--red); }
        .small-container h3 { text-align: center; color: var(--red); margin-bottom: 20px; font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        input, select {
            width: 100%; padding: 12px; margin: 10px 0; background: #151515; 
            border: 1px solid #333; color: var(--green); border-radius: 5px; 
            font-family: 'Roboto Mono'; font-weight: bold;
        }

        .action-btn {
            background: var(--red); color: #fff; border: none; padding: 14px; 
            width: 100%; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; 
            font-weight: 900; margin-top: auto; transition: 0.3s;
        }
        .action-btn:hover { background: #fff; color: #000; transform: scale(1.02); }

        /* 3. Footer Container */
        .footer-container {
            width: 100%; padding: 15px 40px; background: #000; border-top: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Roboto Mono'; font-size: 10px; color: #444;
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="logo-img">
        </div>

        <div class="header-center">
            <div class="brand-name">BINARY</div>
            <div class="ruthless-text">RUTHLESS TRADER</div>
        </div>

        <div class="header-right">
            <div class="social-links">
                <a href="#">TG</a>
                <a href="#">YT</a>
                <a href="#">IG</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="small-container">
            <h3>LOGIN</h3>
            <input type="email" placeholder="EMAIL">
            <input type="password" placeholder="PASSWORD">
            <button class="action-btn">ACCESS PANEL</button>
        </div>

        <div class="small-container">
            <h3>SIGNUP</h3>
            <input type="email" placeholder="EMAIL">
            <select>
                <option>SELECT BROKER</option>
                <option>QUOTEX</option>
                <option>POCKET OPTION</option>
            </select>
            <button class="action-btn">CONTINUE</button>
        </div>

        <div class="small-container">
            <h3>VERIFY ID</h3>
            <input type="email" placeholder="EMAIL">
            <input type="text" placeholder="BROKER ID">
            <button class="action-btn">VERIFY NOW</button>
        </div>
    </main>

    <footer class="footer-container">
        <div>TRADING INVOLVES RISK.</div>
        <div>CONTACT US</div>
        <div>© BINARY RUTHLESS TRADER TM</div>
    </footer>

    <script>
        // Zoom Prevention Script
        document.addEventListener('wheel', e => e.ctrlKey && e.preventDefault(), { passive: false });
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && [61, 107, 173, 109, 187, 189].includes(e.keyCode)) e.preventDefault();
        });
    </script>
</body>
</html>
