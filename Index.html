<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Ruthless Trader | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --green: #00ffcc; --bg: #050505; --neon: 0 0 15px var(--red); }
        
        /* Fixed Layout: జూమ్ అవ్వకుండా మరియు స్క్రీన్ కదలకుండా లాక్ */
        html, body { 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; width: 100%; height: 100%; 
            position: fixed; overflow: hidden; touch-action: none;
        }

        /* 1. Top Header Container */
        .header-container {
            width: 100%; max-width: 1200px; padding: 15px 30px;
            display: flex; align-items: center; border-bottom: 2px solid var(--red);
            background: #000;
        }
        .logo-img { width: 180px; height: auto; margin-right: 20px; } /* మీ logo.png కోసం */
        .brand-info h1 { margin: 0; font-size: 26px; color: #fff; text-shadow: var(--neon); }
        .social-links { margin-top: 5px; }
        .social-links a { color: #888; text-decoration: none; font-size: 11px; margin-right: 15px; font-family: 'Roboto Mono'; transition: 0.3s; }
        .social-links a:hover { color: var(--red); }

        /* 2. Main Screen 3 Small Containers */
        .main-content {
            flex: 1; display: flex; justify-content: center; align-items: center;
            gap: 25px; width: 100%; padding: 20px;
        }
        .small-container {
            width: 340px; height: 480px; background: #0a0a0a; border: 1px solid var(--red);
            padding: 25px; border-radius: 15px; box-shadow: var(--neon);
            display: flex; flex-direction: column;
        }
        .small-container h3 { text-align: center; color: var(--red); margin-bottom: 20px; font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        input, select {
            width: 100%; padding: 12px; margin: 10px 0; background: #151515; 
            border: 1px solid #333; color: var(--green); border-radius: 5px; 
            font-family: 'Roboto Mono'; font-weight: bold; font-size: 14px;
        }

        .action-btn {
            background: var(--red); color: #fff; border: none; padding: 14px; 
            width: 100%; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; 
            font-weight: 900; margin-top: auto; transition: 0.3s; text-transform: uppercase;
        }
        .action-btn:hover { background: #fff; color: #000; }

        /* Signup Multi-step logic */
        #signupRules { display: none; font-size: 11px; font-family: 'Roboto Mono'; color: #ccc; line-height: 1.5; }

        /* 3. Bottom Horizontal Container */
        .footer-container {
            width: 100%; padding: 15px 40px; background: #000; border-top: 2px solid var(--red);
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Roboto Mono'; font-size: 11px; color: #555;
        }
    </style>
</head>
<body>

    <header class="header-container">
        <img src="logo.png" alt="Binary Ruthless Trader" class="logo-img">
        <div class="brand-info">
            <div class="social-links">
                <a href="#">TELEGRAM</a>
                <a href="#">YOUTUBE</a>
                <a href="#">INSTAGRAM</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        
        <div class="small-container">
            <h3>LOGIN</h3>
            <input type="email" id="loginEmail" placeholder="ENTER EMAIL">
            <input type="text" id="loginId" placeholder="ENTER ID">
            <button class="action-btn" onclick="handleLogin()">ENTER SYSTEM</button>
        </div>

        <div class="small-container">
            <h3>SIGNUP</h3>
            <div id="signupForm">
                <input type="email" id="regEmail" placeholder="ENTER EMAIL">
                <select id="brokerSelect">
                    <option value="">SELECT BROKER</option>
                    </select>
                <button class="action-btn" onclick="showRules()">CONTINUE</button>
            </div>
            
            <div id="signupRules">
                <p style="color: var(--green);">[ RULES & BONUS CODES ]</p>
                <div id="brokerRulesText">Rules load here...</div>
                <button class="action-btn" onclick="openAffiliate()">CONTINUE TO SIGNUP</button>
            </div>
        </div>

        <div class="small-container">
            <h3>VERIFY YOUR ID</h3>
            <input type="email" id="vEmail" placeholder="ENTER EMAIL">
            <input type="text" id="vBrokerId" placeholder="BROKER ACCOUNT ID">
            <button class="action-btn" onclick="verifyUser()">VERIFY NOW</button>
        </div>

    </main>

    <footer class="footer-container">
        <div>NOTE: Trading involves high risk. Invest only what you can afford to lose.</div>
        <div>CONTACT: Admin Support</div>
        <div>BINARY RUTHLESS TRADER TM</div>
    </footer>

    <script>
        // Zoom ని కీబోర్డ్ షార్ట్‌కట్‌ల ద్వారా కూడా ఆపడానికి
        document.addEventListener('wheel', (e) => e.ctrlKey && e.preventDefault(), { passive: false });
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && [61, 107, 173, 109, 187, 189].includes(e.keyCode)) e.preventDefault();
        });

        function showRules() {
            const broker = document.getElementById('brokerSelect').value;
            if(!broker) return alert("Please select a broker first!");
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('signupRules').style.display = 'block';
            document.getElementById('brokerRulesText').innerText = `Kindly use a new email for ${broker}. Deposit minimum $50 to get VIP signal access.`;
        }

        function verifyUser() {
            const id = document.getElementById('vBrokerId').value;
            if(id === "123") { // Example check
                alert("WELCOME TO THE CLAN! Access Granted.");
                window.location.href = "user.html";
            } else {
                alert("FALSE: Please kindly signup through our link.");
            }
        }

        function handleLogin() { window.location.href = "user.html"; }
    </script>
</body>
</html>
