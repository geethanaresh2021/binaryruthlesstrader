<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Ruthless Trader | Global Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --green: #00ffcc; --bg: #050505; --neon: 0 0 15px var(--red); }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; padding: 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 2px solid var(--red); background: #000; }
        .logo { color: var(--red); text-shadow: var(--neon); font-size: 1rem; }
        
        .panel { display: none; padding: 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Admin Layout */
        .admin-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .admin-card { background: #0a0a0a; border: 1px solid var(--green); padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,255,204,0.1); }
        h3 { color: var(--green); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; font-size: 14px; }

        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #151515; border: 1px solid #333; color: var(--green); border-radius: 5px; font-family: 'Roboto Mono'; box-sizing: border-box; }
        .btn { background: var(--red); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 5px; font-family: 'Orbitron'; margin-top: 5px; }
        .btn-green { background: var(--green); color: black; }

        /* Ad Preview Style */
        .ad-preview { border: 1px dashed #444; margin: 10px auto; display: flex; align-items: center; justify-content: center; background: #111; overflow: hidden; }
        
        /* User List */
        .user-item { display: flex; justify-content: space-between; background: #1a1a1a; padding: 8px; margin: 5px 0; border-radius: 4px; font-size: 12px; border-left: 3px solid var(--red); }
        .del-btn { color: var(--red); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <div id="admBtn" style="display:none;"><button class="btn" style="padding:5px 10px; font-size:10px;" onclick="toggleView()">ADMIN DASHBOARD</button></div>
        <div class="logo">RUTHLESS CHIEF PANEL</div>
    </div>

    <div id="loginPage" class="panel" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
        <div class="admin-card" style="width: 300px;">
            <h2 style="text-align:center; color:var(--red);">ACCESS</h2>
            <input type="text" id="uMail" placeholder="Admin Email">
            <input type="password" id="uPass" placeholder="Admin ID">
            <button class="btn" onclick="login()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="adminDashboard" class="panel">
        <div class="admin-container">
            
            <div class="admin-card">
                <h3>FIREBASE & SIGNALS</h3>
                <input type="text" id="fbUrl" placeholder="Firebase Realtime URL">
                <input type="text" id="assetIn" placeholder="Asset (EUR/USD)">
                <select id="actionIn"><option value="CALL">CALL</option><option value="PUT">PUT</option></select>
                <input type="text" id="expIn" placeholder="Expiry (1 MIN)">
                <button class="btn" onclick="pushSignal()">PUSH LIVE SIGNAL</button>
            </div>

            <div class="admin-card">
                <h3>AD BANNER CUSTOMIZER</h3>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="adW" placeholder="Width (px)" value="300">
                    <input type="number" id="adH" placeholder="Height (px)" value="100">
                </div>
                <textarea id="adScript" placeholder="Paste Ad Script Here"></textarea>
                <button class="btn btn-green" onclick="updateAds()">APPLY AD SETTINGS</button>
            </div>

            <div class="admin-card">
                <h3>USER MANAGEMENT</h3>
                <input type="text" id="newUserId" placeholder="Add User ID / Email">
                <button class="btn btn-green" onclick="addUser()">ADD USER</button>
                <div id="userList" style="margin-top:15px; max-height:150px; overflow-y:auto;">
                    </div>
            </div>

            <div class="admin-card">
                <h3>AFFILIATE & SOCIAL</h3>
                <input type="text" id="affLink" placeholder="Affiliate Signup Link">
                <input type="text" id="tgLink" placeholder="Telegram Link">
                <input type="text" id="toolLink" placeholder="Tools Page Link">
                <button class="btn" onclick="saveLinks()">SAVE ALL LINKS</button>
            </div>

        </div>
        <button class="btn" style="margin-top:30px; background:#222;" onclick="location.reload()">LOGOUT / REFRESH</button>
    </div>

    <script>
        const ADM_EMAIL = "geethanaresh2021@gmail.com";
        const ADM_ID = "9700224305";
        let users = ["Trader_01", "Ruthless_VIP"];

        function login() {
            if(document.getElementById('uMail').value === ADM_EMAIL && document.getElementById('uPass').value === ADM_ID) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.getElementById('admBtn').style.display = 'block';
                renderUsers();
            } else { alert("Access Denied!"); }
        }

        // --- User Logic ---
        function renderUsers() {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            users.forEach((u, index) => {
                list.innerHTML += `<div class="user-item"><span>${u}</span><span class="del-btn" onclick="removeUser(${index})">DELETE</span></div>`;
            });
        }
        function addUser() {
            let id = document.getElementById('newUserId').value;
            if(id) { users.push(id); renderUsers(); document.getElementById('newUserId').value = ""; }
        }
        function removeUser(index) { users.splice(index, 1); renderUsers(); }

        // --- Firebase Signal ---
        async function pushSignal() {
            let url = document.getElementById('fbUrl').value;
            if(!url) return alert("Firebase URL needed!");
            let data = {
                asset: document.getElementById('assetIn').value,
                action: document.getElementById('actionIn').value,
                expiry: document.getElementById('expIn').value,
                time: new Date().toLocaleTimeString()
            };
            try {
                const cleanUrl = url.endsWith('/') ? url.slice(0, -1) : url;
                await fetch(`${cleanUrl}/signals.json`, { method: 'PUT', body: JSON.stringify(data) });
                alert("Signal Pushed!");
            } catch(e) { alert("Firebase Error!"); }
        }

        // --- Ad Customizer ---
        function updateAds() {
            let w = document.getElementById('adW').value;
            let h = document.getElementById('adH').value;
            alert(`Ad Layout set to ${w}x${h}. Scripts integrated.`);
            // Logic to apply sizing to ad containers
        }

        function saveLinks() {
            alert("All Affiliate and Social links updated successfully!");
        }

        function toggleView() {
            alert("This will switch to User View Mode.");
        }
    </script>
</body>
</html>
