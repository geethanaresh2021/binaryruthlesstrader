<div id="admin-view" style="display: none;">
    <div class="admin-header">
        <h1 class="glow-red">RUTHLESS COMMAND CENTER</h1>
        <p class="status-tag">SYSTEM ONLINE</p>
    </div>

    <div class="admin-section">
        <h3><i class="fas fa-hand-holding-usd"></i> REVENUE ENGINE (₹ INR)</h3>
        <div class="revenue-display">
            <span class="currency">₹</span>
            <span id="live-revenue-val" class="neon-number">0.00</span>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>AVG CPM ($)</label>
                <input type="number" id="admin-cpm" value="1.50" step="0.01" class="ruthless-input">
            </div>
            <div class="input-group">
                <label>USD TO INR</label>
                <input type="number" id="admin-usd-rate" value="83.50" class="ruthless-input">
            </div>
        </div>
    </div>

    <div class="admin-section">
        <h3><i class="fas fa-drafting-compass"></i> LAYOUT BUILDER</h3>
        <div class="toggle-buttons">
            <button class="dash-btn" onclick="setCanvasMode('desktop')">DESKTOP</button>
            <button class="dash-btn btn-dark" onclick="setCanvasMode('mobile')">MOBILE</button>
        </div>
        <div class="action-buttons">
            <button class="dash-btn btn-green" onclick="saveMasterLayout()">SAVE ALL CHANGES</button>
        </div>
    </div>

    <div class="admin-section">
        <h3><i class="fas fa-link"></i> AFFILIATE & AD SLOTS</h3>
        <div class="input-group">
            <label>JOIN BUTTON URL (AFFILIATE)</label>
            <input type="text" id="admin-aff-link" placeholder="https://broker-link.com/register" class="ruthless-input">
        </div>
        <div class="input-group" style="margin-top:15px;">
            <label>AD SLOT 1 (HTML SNIPPET)</label>
            <textarea id="admin-ad-1" rows="3" class="ruthless-input" placeholder="Paste Adsterra/Propeller Code here..."></textarea>
        </div>
    </div>

    <div class="admin-section">
        <h3><i class="fas fa-user-lock"></i> SYSTEM SECURITY</h3>
        <div class="input-group">
            <label>SECRET ACCESS PATH</label>
            <input type="text" id="admin-path" value="9700224305" class="ruthless-input">
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="otp-status">
            <label for="otp-status">ENABLE MOBILE OTP PROTECTION</label>
        </div>
        <button class="dash-btn btn-red" onclick="exitAdmin()">EXIT COMMAND CENTER</button>
    </div>
</div>
